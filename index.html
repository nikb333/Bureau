<script type="text/babel" data-type="module">
const { useState, useRef, useMemo, useEffect, useCallback } = React;

const API = "";  // Same-origin — Pages Function proxies /api/* to the Worker
const ENTITIES = ["AU", "UK", "US", "CA"];
const SUPPLIERS = ["Soundbox", "Hecor", "Dawon", "Sunon"];
const CURRENCIES = ["USD", "RMB", "AUD", "CAD", "GBP", "EUR"];
const PAYMENT_TYPES = ["Deposit", "Release"];
const DOC_TYPES = [
  { id: "purchase_order", label: "Purchase Order", icon: "📄" },
  { id: "commercial_invoice", label: "Commercial Invoice", icon: "🧾" },
  { id: "remittance", label: "Bank Remittance", icon: "🏦" },
  { id: "freight_invoice", label: "Freight Invoice", icon: "🚢" },
];
const BANKS = [
  { id: "au-nab", label: "AU – NAB", entity: "AU", hint: "AU-NAB" },
  { id: "uk-hsbc", label: "UK – HSBC", entity: "UK", hint: "UK-HSBC" },
  { id: "us-chase", label: "US – Chase", entity: "US", hint: "US-Chase" },
  { id: "ca-rbc", label: "CA – RBC", entity: "CA", hint: "CA-RBC" },
];
const FX = { RMB: 6.91, USD: 1, AUD: 0.71, CAD: 0.73, GBP: 1.37, EUR: 1.19 };
const GDRIVE_BASE = "https://drive.google.com/drive/folders/";
const TABS = [
  { id: "orders", label: "Purchase Orders", icon: "📦" },
  { id: "payments", label: "Payments", icon: "💳" },
  { id: "clearing", label: "Intercompany", icon: "🔄" },
  { id: "forecast", label: "Cash Forecast", icon: "📊" },
];
const usd = v => "$" + Number(v || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = d => d ? new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "—";
const toUSD = (a, c) => c === "USD" ? a : a * (FX[c] || 1);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const pct = v => (v * 100).toFixed(1) + "%";
const getWeekStart = d => { const dt = new Date(d); const day = dt.getDay(); const diff = dt.getDate() - day + (day === 0 ? -6 : 1); dt.setDate(diff); dt.setHours(0,0,0,0); return dt; };
const fmtWeek = d => { const s = getWeekStart(d); const e = new Date(s); e.setDate(e.getDate() + 6); return `${s.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})} – ${e.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}`; };
const weekKey = d => getWeekStart(d).toISOString().slice(0, 10);

// API helpers
async function parseApiError(r, fallback){
  const raw = await r.text();
  let detail = raw;
  try {
    const parsed = JSON.parse(raw);
    detail = parsed?.error || parsed?.message || raw;
  } catch (_) {}
  detail = (detail || "").trim();
  return detail ? `${fallback} (${r.status}): ${detail}` : `${fallback} (${r.status})`;
}
async function apiGet(path) { const r = await fetch(API+path); if(!r.ok) throw new Error(await parseApiError(r,"API request failed")); return r.json(); }
async function apiPost(path, body) { const r = await fetch(API+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); if(!r.ok) throw new Error(await parseApiError(r,"API request failed")); return r.json(); }
async function apiPatch(path, body) { const r = await fetch(API+path,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); if(!r.ok) throw new Error(await parseApiError(r,"API request failed")); return r.json(); }
async function apiDelete(path) { const r = await fetch(API+path,{method:"DELETE"}); if(!r.ok) throw new Error(await parseApiError(r,"API request failed")); return r.json(); }
async function apiUploadFile(file, poRef, meta) { const f = new FormData(); f.append("file",file); f.append("poRef",poRef); if(meta){if(meta.docType)f.append("docType",meta.docType);if(meta.docDate)f.append("docDate",meta.docDate);if(meta.entity)f.append("entity",meta.entity);if(meta.bankLabel)f.append("bankLabel",meta.bankLabel);} const r = await fetch(API+"/api/drive/upload",{method:"POST",body:f}); if(!r.ok) throw new Error(await parseApiError(r,"Upload failed")); return r.json(); }

// Fuzzy match existing payment for remittance upload
function fuzzyMatchPayment(remittanceData, payments) {
  const amt = +(remittanceData.amount) || 0;
  const date = remittanceData.payment_date;
  const source = remittanceData.source_entity;
  if (!amt || !date || !source) return null;

  const dateObj = new Date(date);
  const matches = payments.filter(p => {
    // Match source entity
    if (p.sourceEntity !== source) return false;

    // Match amount (±5% tolerance)
    const pAmt = toUSD(p.amount, p.currency);
    const amtDiff = Math.abs(amt - pAmt) / pAmt;
    if (amtDiff > 0.05) return false;

    // Match date (±7 days tolerance)
    if (p.date) {
      const pDate = new Date(p.date);
      const daysDiff = Math.abs((dateObj - pDate) / (1000 * 60 * 60 * 24));
      if (daysDiff > 7) return false;
    }

    // Prefer payments without documents (docName not set)
    return true;
  });

  // Sort by closeness: first by amount difference, then by date difference
  matches.sort((a, b) => {
    const aDiff = Math.abs(amt - toUSD(a.amount, a.currency));
    const bDiff = Math.abs(amt - toUSD(b.amount, b.currency));
    return aDiff - bDiff;
  });

  return matches.length > 0 ? matches[0] : null;
}

// Expand each PO into deposit + release lines for remittance allocation.
// Each line is an independent payable — never the total.
function expandOrdersToLines(orders) {
  const lines=[];
  (orders||[]).forEach(o=>{
    const depAmtUSD=toUSD(o.depositAmt,o.currency);
    const relAmtUSD=toUSD(o.releaseAmt,o.currency);
    const depPaidUSD=toUSD(+(o.depositPaidAmt)||0,o.currency);
    const relPaidUSD=toUSD(+(o.releasePaidAmt)||0,o.currency);
    const depOutstanding=Math.max(depAmtUSD-depPaidUSD,0);
    const relOutstanding=Math.max(relAmtUSD-relPaidUSD,0);
    if(o.depositStatus!=="paid"&&depOutstanding>0.01)
      lines.push({...o,lineId:o.id+"-dep",lineType:"deposit",lineAmtUSD:depAmtUSD,outstanding:depOutstanding,hasBalance:true,
        depAmtUSD,relAmtUSD,depUnpaid:true,relUnpaid:o.releaseStatus!=="paid"});
    if(o.releaseStatus!=="paid"&&relOutstanding>0.01)
      lines.push({...o,lineId:o.id+"-rel",lineType:"release",lineAmtUSD:relAmtUSD,outstanding:relOutstanding,hasBalance:true,
        depAmtUSD,relAmtUSD,depUnpaid:o.depositStatus!=="paid",relUnpaid:true});
    // Single-amount PO (no deposit/release split) — treat as Release
    if(depAmtUSD<0.01&&relAmtUSD<0.01&&o.releaseStatus!=="paid"){
      const totUSD=toUSD(o.totalValue,o.currency);
      const totPaidUSD=toUSD(+(o.releasePaidAmt)||0,o.currency);
      const totOutstanding=Math.max(totUSD-totPaidUSD,0);
      if(totOutstanding>0.01)lines.push({...o,lineId:o.id+"-rel",lineType:"release",lineAmtUSD:totUSD,outstanding:totOutstanding,hasBalance:true,
        depAmtUSD:0,relAmtUSD:totUSD,depUnpaid:false,relUnpaid:true});
    }
  });
  return lines;
}

// Fuzzy search over expanded deposit/release lines.
function fuzzyMatchLines(input, lines) {
  if(!input||!input.trim()) return [];
  const clean=s=>(s||"").replace(/[\s\-_\.#,/\\()]+/g,"").toLowerCase(), extractNums=s=>(s||"").match(/\d+/g)||[];
  const q=clean(input),qNums=extractNums(input);
  return lines.map(l=>{
    let score=0,reason="";const rc=clean(l.ref),ic=clean(l.inv);
    if(rc===q||ic===q){score=100;reason="Exact";}
    else if(rc.includes(q)||ic.includes(q)){score=85;reason="Contains";}
    else if(q.includes(rc)||q.includes(ic)){score=80;reason="In input";}
    else if(qNums.length>0){const an=[...extractNums(l.ref),...extractNums(l.inv)];if(qNums.some(n=>an.includes(n))){score=75;reason="PO#";}}
    return{...l,score,reason};
  }).filter(l=>l.score>0).sort((a,b)=>b.score-a.score).slice(0,10);
}

// Legacy fuzzyMatchPO kept for ReviewScreen PO reference matching (returns one result per order).
function fuzzyMatchPO(input, orders, payments) {
  if (!input||!input.trim()) return [];
  const clean=s=>(s||"").replace(/[\s\-_\.#,/\\()]+/g,"").toLowerCase(), extractNums=s=>(s||"").match(/\d+/g)||[];
  const q=clean(input),qNums=extractNums(input);
  const paidMap={}; (payments||[]).forEach(p=>Object.entries(p.allocations||{}).forEach(([oid,amt])=>{paidMap[oid]=(paidMap[oid]||0)+amt;}));
  return orders.map(o=>{
    let score=0,reason="";const rc=clean(o.ref),ic=clean(o.inv);
    if(rc===q||ic===q){score=100;reason="Exact";}
    else if(rc.includes(q)||ic.includes(q)){score=85;reason="Contains";}
    else if(q.includes(rc)||q.includes(ic)){score=80;reason="In input";}
    else if(qNums.length>0){const an=[...extractNums(o.ref),...extractNums(o.inv)];if(qNums.some(n=>an.includes(n))){score=75;reason="PO#";}}
    const depAmtUSD=toUSD(o.depositAmt,o.currency),relAmtUSD=toUSD(o.releaseAmt,o.currency);
    const depPaidUSD=toUSD(+(o.depositPaidAmt)||0,o.currency),relPaidUSD=toUSD(+(o.releasePaidAmt)||0,o.currency);
    const depUnpaid=o.depositStatus!=="paid",relUnpaid=o.releaseStatus!=="paid";
    const outstanding=(depUnpaid?Math.max(depAmtUSD-depPaidUSD,0):0)+(relUnpaid?Math.max(relAmtUSD-relPaidUSD,0):0);
    const bal=outstanding>0.01;
    if(score>0&&bal)score+=5;
    const totalUSD=depAmtUSD+relAmtUSD;return{...o,score,reason,outstanding,totalUSD,hasBalance:bal,depAmtUSD,relAmtUSD,depUnpaid,relUnpaid};
  }).filter(o=>o.score>0).sort((a,b)=>b.score-a.score).slice(0,8);
}

// Doc parser — calls Worker /api/parse (server-side Anthropic call)
async function parseDoc(file) {
  const b64=await new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result.split(",")[1]);x.onerror=()=>j(new Error("fail"));x.readAsDataURL(file);});
  const mediaType=file.type||"application/pdf";
  const res=await fetch(API+"/api/parse",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:b64,media_type:mediaType})});
  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Parse error (${res.status}): ${errText}`);
  }
  return res.json();
}

          {isOver&&<span style={{fontWeight:700,color:"var(--rd)"}}>⚠ Exceeds balance by {usd(applied-fullAmt)}</span>}
          {isPartial&&<span><span style={{color:"var(--am)",fontWeight:600}}>{usd(afterThis)} remains after</span></span>}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"2px 24px",marginBottom:14,paddingTop:10,borderTop:"1px solid var(--bd)"}}>
        <span style={{fontSize:12,color:"var(--ac)",fontWeight:600,padding:"3px 0"}}>This remittance</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:14,color:"var(--ac)",textAlign:"right",padding:"3px 0"}}>{usd(applied)}</span>
        <span style={{fontSize:13,fontWeight:700,padding:"3px 0"}}>Balance after this payment</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:15,textAlign:"right",padding:"3px 0",color:isExact?"var(--gn)":isOver?"var(--rd)":"var(--am)"}}>{usd(Math.max(afterThis,0))}</span>
      </div>

      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <div style={{flex:1}}><div style={{fontSize:11,color:"var(--tx2)",marginBottom:4,fontWeight:600}}>Amount to apply from this remittance</div><input type="number" step="0.01" value={partialAmt} onChange={e=>setPartialAmt(e.target.value)} className="ri" style={{width:"100%",fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,borderColor:isOver?"var(--rd)":"var(--bd)"}} placeholder={usd(Math.min(remaining,fullAmt))}/></div>
        <button onClick={onPayPartial} className="btn btn-primary" style={{padding:"9px 16px",fontSize:13}} disabled={!(+(partialAmt)>0)}>Apply Partial</button>
        <button onClick={onPayFull} className="btn btn-primary" style={{padding:"9px 16px",fontSize:13,background:"var(--gn)"}}>Pay Full {usd(Math.min(remaining,outstandingAmt))}</button>
      </div>
      {isOver&&<div style={{marginTop:8,fontSize:11,fontWeight:600,background:"var(--rdb)",color:"var(--rd)",padding:"6px 10px",borderRadius:4}}>⚠ Amount exceeds the outstanding balance of {usd(outstandingAmt)}</div>}
      {isExact&&+(partialAmt)>0&&<div style={{marginTop:8,fontSize:11,fontWeight:700,background:"var(--gnb)",color:"var(--gn)",padding:"6px 10px",borderRadius:4}}>✓ This exactly covers the {selectedLine.lineType}</div>}
    </div>
  </div>;
}

// RemittanceAllocationUI — allocation is always against deposit OR release, never total
function RemittanceAllocationUI({parsed,ed,setEd,onConfirm,onCancel,fileName,orders,payments}){
  const sf=(k,v)=>setEd(p=>({...p,[k]:v}));
  const[allocs,setAllocs]=useState([]);const[search,setSearch]=useState("");
  const[selectedLine,setSelectedLine]=useState(null);const[partialAmt,setPartialAmt]=useState("");
  const payAmt=+(ed.amount)||0;
  const allocTotal=allocs.reduce((s,a)=>s+a.amount,0);const remaining=payAmt-allocTotal;

  // Expand orders into deposit/release lines
  const lines=useMemo(()=>expandOrdersToLines(orders),[orders]);
  const matches=useMemo(()=>search.trim()?fuzzyMatchLines(search,lines).filter(m=>!allocs.find(a=>a.lineId===m.lineId)):[],[search,lines,allocs]);

  // Auto-select on load: find matching line whose amount is closest to payment amount
  useEffect(()=>{
    const autoRef=ed?.po_references?.[0]||ed?.reference||"";
    if(autoRef&&!selectedLine&&lines.length>0){
      const candidates=fuzzyMatchLines(autoRef,lines);
      if(candidates.length>0&&candidates[0].score>=75){
        // Prefer the line whose outstanding amount best matches the payment
        const best=[...candidates].sort((a,b)=>Math.abs((a.outstanding||a.lineAmtUSD)-payAmt)-Math.abs((b.outstanding||b.lineAmtUSD)-payAmt))[0];
        setSelectedLine(best);setPartialAmt(Math.min(payAmt,best.outstanding||best.lineAmtUSD).toFixed(2));
      }
    }
  },[lines]);

  const selectLine=l=>{setSelectedLine(l);setPartialAmt(Math.min(remaining,l.outstanding||l.lineAmtUSD).toFixed(2));setSearch("");};
  const cancelSelect=()=>{setSelectedLine(null);setPartialAmt("");};
  const rmAlloc=lid=>setAllocs(p=>p.filter(a=>a.lineId!==lid));

  const buildAlloc=(l,amt)=>({orderId:l.id,lineId:l.lineId,lineType:l.lineType,ref:l.ref,supplier:l.supplier,inv:l.inv,region:l.region,lineAmtUSD:l.lineAmtUSD,outstanding:l.outstanding||l.lineAmtUSD,amount:amt,order:l});

  const payFull=()=>{
    if(!selectedLine)return;
    const amt=Math.min(remaining,selectedLine.lineAmtUSD);
    setAllocs(p=>[...p,buildAlloc(selectedLine,amt)]);setSelectedLine(null);setPartialAmt("");
  };
  const payPartial=()=>{
    if(!selectedLine)return;
    const amt=+(partialAmt)||0;
    if(amt<=0){alert("Enter a valid amount");return;}
    if(amt>selectedLine.lineAmtUSD+0.01){alert(`Amount exceeds ${selectedLine.lineType} of ${usd(selectedLine.lineAmtUSD)}`);return;}
    if(amt>remaining+0.01){alert(`Amount exceeds remaining payment of ${usd(remaining)}`);return;}
    setAllocs(p=>[...p,buildAlloc(selectedLine,amt)]);setSelectedLine(null);setPartialAmt("");
  };
  const handleConfirm=()=>{
    if(allocs.length===0){alert("Please allocate payment to at least one PO");return;}
    if(Math.abs(remaining)>0.01){alert(`Must allocate exact payment amount.\nRemaining: ${usd(remaining)}\n\n${remaining>0?"Add more lines or adjust amounts":"Remove allocations or reduce amounts"}`);return;}
    setEd(p=>({...p,_allocations:allocs}));onConfirm();
  };

  const LineBadge=({type})=><span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:type==="deposit"?"rgba(59,130,246,.15)":"rgba(16,185,129,.15)",color:type==="deposit"?"#2563eb":"#059669",letterSpacing:".04em"}}>{type==="deposit"?"DEPOSIT":"RELEASE"}</span>;

  return <div className="rc">
    <div className="rc-h"><div><div className="rc-t">Allocate Remittance</div><div className="rc-f">{fileName}</div></div><div style={{fontSize:13,color:"var(--tx2)"}}>Payment: <span className="mono" style={{fontWeight:700,color:"var(--tx)"}}>{usd(payAmt)}</span></div></div>

    <div className="rs-t">Payment Details</div>
    <div style={{padding:"0 22px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Source Entity</div><select value={ed.source_entity||""} onChange={e=>sf("source_entity",e.target.value)} className="ri"><option value="">Select...</option>{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></div>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Bank Account</div><select value={ed.bank_account_hint||""} onChange={e=>sf("bank_account_hint",e.target.value)} className="ri"><option value="">Auto...</option>{BANKS.map(b=><option key={b.id} value={b.hint}>{b.label}</option>)}</select></div>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Payment Date</div><input className="ri" type="date" value={ed.payment_date||""} onChange={e=>sf("payment_date",e.target.value)}/></div>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Amount</div><div style={{display:"flex",gap:8}}><input className="ri" style={{flex:1,fontFamily:"'JetBrains Mono',monospace"}} type="number" step="0.01" value={ed.amount||0} onChange={e=>sf("amount",e.target.value)}/><select value={ed.currency||"USD"} onChange={e=>sf("currency",e.target.value)} className="ri" style={{width:90}}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div></div>
    </div>

    <div className="rs-t">Allocate to Purchase Orders</div>
    <div style={{padding:"0 22px 16px"}}>
      {!selectedLine&&<input className="ri" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search PO ref, invoice, supplier..." style={{width:"100%",marginBottom:12}}/>}

      {!selectedLine&&search.trim()&&matches.length>0&&<div style={{marginBottom:16,maxHeight:220,overflow:"auto",border:"1px solid var(--bd)",borderRadius:"var(--r)"}}>
        {matches.slice(0,8).map(m=><div key={m.lineId} onClick={()=>selectLine(m)} style={{padding:"10px 14px",borderBottom:"1px solid var(--s2)",cursor:"pointer",transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background="var(--s2)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <RegionBadge region={m.region}/>
            <LineBadge type={m.lineType}/>
            <span style={{fontWeight:700,fontSize:13}}>{m.ref}</span>
            <span style={{fontSize:11,color:"var(--tx3)"}}>{m.inv} · {m.supplier}</span>
            <span style={{marginLeft:"auto",fontSize:13,fontWeight:700,color:Math.abs(m.lineAmtUSD-payAmt)<0.02?"var(--gn)":"var(--tx)"}}>{usd(m.lineAmtUSD)}</span>
          </div>
        </div>)}
      </div>}

      {selectedLine&&<LineMatchCard selectedLine={selectedLine} payAmt={payAmt} remaining={remaining} partialAmt={partialAmt} setPartialAmt={setPartialAmt} onPayFull={payFull} onPayPartial={payPartial} onCancel={cancelSelect}/>}

      {allocs.length>0&&<div style={{marginTop:16}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--tx3)",marginBottom:8}}>Allocated</div>
        {allocs.map(a=><AllocCard key={a.lineId} a={a} onRemove={()=>rmAlloc(a.lineId)}/>)}
      </div>}

      {allocs.length===0&&!selectedLine&&!search&&<div style={{textAlign:"center",padding:32,color:"var(--tx3)",background:"var(--s2)",borderRadius:"var(--r)",border:"1px dashed var(--bd2)"}}>Search a PO and select its deposit or release to allocate payment</div>}
    </div>

    <div style={{padding:"16px 22px",background:Math.abs(remaining)>0.01?"linear-gradient(135deg,#fef2f2,#fee)":"var(--s2)",borderTop:Math.abs(remaining)>0.01?"2px solid var(--rd)":"1px solid var(--bd)"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:6}}><span style={{fontWeight:600}}>Total Allocated:</span><span className="mono" style={{fontWeight:700}}>{usd(allocTotal)}</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:14}}><span style={{fontWeight:600}}>Remaining:</span><span className="mono" style={{fontWeight:700,color:Math.abs(remaining)<0.01?"var(--gn)":"var(--rd)"}}>{usd(remaining)}</span></div>
      {Math.abs(remaining)>0.01&&<div style={{fontSize:11,color:"var(--rd)",marginTop:6,fontWeight:600}}>⚠ Must allocate exact payment amount to confirm</div>}
    </div>

    <div className="rc-act"><button className="btn btn-ghost" onClick={onCancel}>Cancel</button><button className="btn btn-primary" onClick={handleConfirm} disabled={allocs.length===0||Math.abs(remaining)>0.01}>Confirm & Save</button></div>
  </div>;
}

// ReviewScreen
function ReviewScreen({parsed,ed,setEd,docType,onChangeDocType,onConfirm,onCancel,fileName,orders,payments}){
  const sf=(k,v)=>setEd(p=>({...p,[k]:v}));const cd=parsed?.confidence_details||{};const oc=parsed?.confidence||"medium";
  const switchDocType=newType=>{
    if(newType===docType)return;
    // Remap fields between doc types
    const d={...ed};
    if(newType==="purchase_order"){
      // Map from invoice/remittance fields into PO fields
      // No total_value — only deposit and release amounts matter
      if(!d.po_reference&&d.reference)d.po_reference=d.reference;
      if(!d.po_reference&&d.po_references?.[0])d.po_reference=d.po_references[0];
      if(!d.po_date&&d.payment_date)d.po_date=d.payment_date;
      if(!d.po_date&&d.invoice_date)d.po_date=d.invoice_date;
      if(d.po_date&&!d.deposit_due){d.deposit_due=d.po_date;const rd=new Date(d.po_date);rd.setDate(rd.getDate()+21);d.release_due=rd.toISOString().slice(0,10);}
      if(!d.destination_region&&d.source_entity)d.destination_region=d.source_entity;
    }else if(newType==="remittance"){
      // Never auto-fill amount from total_value — remittances pay deposit OR release, not total
      if(!d.payment_date&&d.po_date)d.payment_date=d.po_date;
      if(!d.po_references){const ref=d.po_reference||"";d.po_references=[ref];}
      if(!d.source_entity&&d.destination_region)d.source_entity=d.destination_region;
    }else{
      if(!d.total_amount&&d.total_value)d.total_amount=d.total_value;
      if(!d.total_amount&&d.amount)d.total_amount=d.amount;
      if(!d.po_reference&&d.po_references?.[0])d.po_reference=d.po_references[0];
    }
    setEd(d);
    if(onChangeDocType)onChangeDocType(newType);
  };
  const[multiPO,setMultiPO]=useState(false);const[allocs,setAllocs]=useState([]);
  const addAlloc=o=>{if(allocs.find(a=>a.orderId===o.id))return;setAllocs(p=>[...p,{orderId:o.id,ref:o.ref,amount:0}]);};
  const rmAlloc=oid=>setAllocs(p=>p.filter(a=>a.orderId!==oid));
  const setAllocAmt=(oid,amt)=>setAllocs(p=>p.map(a=>a.orderId===oid?{...a,amount:+(amt)||0}:a));
  const allocTotal=allocs.reduce((s,a)=>s+a.amount,0);const allocRemain=(+(ed?.amount)||0)-allocTotal;
  const[multiSearch,setMultiSearch]=useState("");const[showSearch,setShowSearch]=useState(false);
  const multiMatches=useMemo(()=>multiSearch.trim()?fuzzyMatchPO(multiSearch,orders,payments):[],[multiSearch,orders,payments]);
  const Row=({label,field,conf,children})=>{const c=conf||cd[field]||oc;return <div className="rr"><div className="rr-s"><ConfIcon level={c}/></div><div className="rr-l">{label}</div><div className="rr-i">{children}</div></div>;};
  const refInput=ed?.po_references?.[0]||ed?.reference||ed?.po_reference||"";
  const matches=useMemo(()=>(docType==="remittance"||docType==="commercial_invoice"||docType==="freight_invoice")?fuzzyMatchPO(refInput,orders,payments):[],[refInput,orders,payments,docType]);
  const handleConfirm=()=>{if(multiPO&&allocs.length>0){setEd(p=>({...p,_multiAllocs:allocs}));setTimeout(()=>onConfirm(),0);}else onConfirm();};

  return <div className="rc">
    <div className="rc-h"><div><div className="rc-t">Review Extracted Data</div><div className="rc-f">{fileName}</div></div><div className={`rc-c rc-c-${oc}`}>{oc==="high"?"✓ High Confidence":oc==="medium"?"? Check Fields":"⚠ Needs Review"}</div></div>
    <div className="rs-t">Document Type</div>
    <div className="rr"><div className="rr-s"><ConfIcon level="high"/></div><div className="rr-l">Type</div><div className="rr-i">{onChangeDocType?<select value={docType} onChange={e=>switchDocType(e.target.value)} className="ri">{DOC_TYPES.map(d=><option key={d.id} value={d.id}>{d.icon} {d.label}</option>)}</select>:<span className="badge badge-blue">{DOC_TYPES.find(d=>d.id===docType)?.icon} {DOC_TYPES.find(d=>d.id===docType)?.label}</span>}</div></div>

    {docType==="purchase_order"&&<>
      <div className="rs-t">Order Details</div>
      <Row label="Supplier" field="supplier"><select value={ed.supplier||""} onChange={e=>sf("supplier",e.target.value)} className="ri"><option value="">Select...</option>{SUPPLIERS.map(s=><option key={s}>{s}</option>)}</select></Row>
      <Row label="PO Reference" field="po_reference"><input className="ri" value={ed.po_reference||""} onChange={e=>sf("po_reference",e.target.value)} placeholder="PO-215"/></Row>
      <Row label="Invoice #" field="invoice_number"><input className="ri" value={ed.invoice_number||""} onChange={e=>sf("invoice_number",e.target.value)}/></Row>
      <Row label="PO Date" field="po_date"><input className="ri" type="date" value={ed.po_date||""} onChange={e=>{const v=e.target.value;sf("po_date",v);if(v){sf("deposit_due",v);const rd=new Date(v);rd.setDate(rd.getDate()+21);sf("release_due",rd.toISOString().slice(0,10));}}}/></Row>
      <Row label="Destination" field="destination_region"><select value={ed.destination_region||""} onChange={e=>sf("destination_region",e.target.value)} className="ri"><option value="">Select...</option>{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></Row>
      <div className="rs-t">Financials</div>
      <Row label="Currency" field="currency"><select value={ed.currency||"USD"} onChange={e=>sf("currency",e.target.value)} className="ri ri-sm">{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></Row>
      <Row label="Deposit Amount" field="deposit_amount"><input className="ri ri-n" type="number" step="0.01" value={ed.deposit_amount||0} onChange={e=>sf("deposit_amount",e.target.value)} placeholder="0 if single-payment PO"/></Row>

      <Row label="Release Due" conf={ed.release_due?"medium":"low"}><div style={{display:"flex",gap:8,alignItems:"center"}}><input className="ri" type="date" value={ed.release_due||""} onChange={e=>sf("release_due",e.target.value)} style={{flex:1}}/>{ed.release_due&&ed.po_date&&<span style={{fontSize:10,color:"var(--am)",fontWeight:600,whiteSpace:"nowrap"}}>PO date + 3 wks</span>}</div></Row>
      <Row label="Notes" conf="high"><input className="ri" value={ed.notes||""} onChange={e=>sf("notes",e.target.value)} placeholder="Optional"/></Row>
    </>}

    {docType==="remittance"&&<>
      <div className="rs-t">Payment Source</div>
      <Row label="Bank Account" field="bank_account_hint"><select value={ed.bank_account_hint||""} onChange={e=>sf("bank_account_hint",e.target.value)} className="ri"><option value="">Auto-detect...</option>{BANKS.map(b=><option key={b.id} value={b.hint}>{b.label}</option>)}</select></Row>
      <Row label="Paying Entity" field="source_entity"><select value={ed.source_entity||""} onChange={e=>sf("source_entity",e.target.value)} className="ri"><option value="">Select...</option>{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></Row>
      <div className="rs-t">Payment Details</div>
      <Row label="Amount" field="amount"><div className="ri-g"><input className="ri ri-n" type="number" step="0.01" value={ed.amount||0} onChange={e=>sf("amount",e.target.value)}/><select value={ed.currency||"USD"} onChange={e=>sf("currency",e.target.value)} className="ri ri-sm">{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div></Row>
      <Row label="Payment Date" field="payment_date"><input className="ri" type="date" value={ed.payment_date||""} onChange={e=>sf("payment_date",e.target.value)}/></Row>
      <Row label="Type" conf="high"><select value={ed.payment_type||"Deposit"} onChange={e=>sf("payment_type",e.target.value)} className="ri">{PAYMENT_TYPES.map(t=><option key={t}>{t}</option>)}</select></Row>
      {(()=>{const payAmt=+(ed.amount)||0;const bestMatch=matches.length>0&&matches[0].score>=75?matches[0]:null;if(!bestMatch||payAmt<100)return null;const depMatch=bestMatch.depUnpaid&&bestMatch.depAmtUSD>0.01&&Math.abs(payAmt-bestMatch.depAmtUSD)/bestMatch.depAmtUSD<0.15;const relMatch=bestMatch.relUnpaid&&bestMatch.relAmtUSD>0.01&&Math.abs(payAmt-bestMatch.relAmtUSD)/bestMatch.relAmtUSD<0.15;if(depMatch||relMatch){return <div style={{margin:"6px 22px 10px 66px",padding:"10px 14px",background:"linear-gradient(135deg,#eff4ff,#e0eaff)",border:"1px solid var(--ac)",borderRadius:"var(--r)",fontSize:12,color:"var(--ac)",fontWeight:600}}><span style={{marginRight:6}}>💡</span>{depMatch&&`Suggestion: Select "Deposit" — amount matches ${usd(bestMatch.depAmtUSD)}`}{!depMatch&&relMatch&&`Suggestion: Select "Release" — amount matches ${usd(bestMatch.relAmtUSD)}`}</div>;}return null;})()}
      <div className="rs-t">Match to Purchase Order</div>
      <Row label="PO Reference" field="po_references"><input className="ri" value={refInput} onChange={e=>sf("po_references",[e.target.value])} placeholder="Type PO# to search..."/></Row>
      {refInput.trim()&&matches.length>0&&<div className="mr">{matches.map(m=>{const payAmt=+(ed.amount)||0;const depClose=m.depUnpaid&&m.depAmtUSD>0.01&&payAmt>0&&Math.abs(payAmt-m.depAmtUSD)/m.depAmtUSD<0.15;const relClose=m.relUnpaid&&m.relAmtUSD>0.01&&payAmt>0&&Math.abs(payAmt-m.relAmtUSD)/m.relAmtUSD<0.15;return <div key={m.id} className={`mr-row ${m.score>=85?"mr-best":""}`} onClick={()=>sf("po_references",[m.ref])}><div className="mr-sw">{m.score>=85?<span className="ci ci-h">✓</span>:<span className="ci ci-m">⚠</span>}</div><div className="mr-info"><div className="mr-ref">{m.ref}</div><div className="mr-det">{m.inv} · {m.supplier} · <RegionBadge region={m.region}/></div><div style={{fontSize:10,color:"var(--tx3)",marginTop:3}}>{m.depUnpaid&&m.depAmtUSD>0.01&&<span style={{color:depClose?"var(--gn)":"var(--am)",fontWeight:600}}>Deposit {usd(m.depAmtUSD)}{depClose?" ✓":""}</span>}{m.depUnpaid&&m.depAmtUSD>0.01&&m.relUnpaid&&m.relAmtUSD>0.01&&" · "}{m.relUnpaid&&m.relAmtUSD>0.01&&<span style={{color:relClose?"var(--gn)":"var(--am)",fontWeight:600}}>Release {usd(m.relAmtUSD)}{relClose?" ✓":""}</span>}{!m.depUnpaid&&!m.relUnpaid&&<span style={{color:"var(--gn)"}}>Fully paid</span>}</div></div><div className="mr-amt">{m.hasBalance?<div className="mr-out" style={{fontWeight:700,fontSize:13}}>Owed: {usd(m.outstanding)}</div>:<div className="mr-fp">Fully paid</div>}</div><div className="mr-pct">{m.score}%</div></div>})}</div>}
      <Row label="Notes" conf="high"><input className="ri" value={ed.notes||""} onChange={e=>sf("notes",e.target.value)} placeholder="Optional"/></Row>
    </>}

    {(docType==="commercial_invoice"||docType==="freight_invoice")&&<>
      <div className="rs-t">Invoice Details</div>
      <Row label="Invoice #" field="invoice_number"><input className="ri" value={ed.invoice_number||""} onChange={e=>sf("invoice_number",e.target.value)}/></Row>
      <Row label="PO Reference" field="po_reference"><input className="ri" value={ed.po_reference||""} onChange={e=>sf("po_reference",e.target.value)}/></Row>
      <Row label="Amount" field="total_amount"><div className="ri-g"><input className="ri ri-n" type="number" step="0.01" value={ed.total_amount||0} onChange={e=>sf("total_amount",e.target.value)}/><select value={ed.currency||"USD"} onChange={e=>sf("currency",e.target.value)} className="ri ri-sm">{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div></Row>
      <Row label="Region" field="destination_region"><select value={ed.destination_region||""} onChange={e=>sf("destination_region",e.target.value)} className="ri"><option value="">Select...</option>{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></Row>
      <Row label="Notes" conf="high"><input className="ri" value={ed.notes||""} onChange={e=>sf("notes",e.target.value)}/></Row>
    </>}
    <div className="rc-act"><button className="btn btn-ghost" onClick={onCancel}>Cancel</button><button className="btn btn-primary" onClick={handleConfirm}>✓ Confirm & Save</button></div>
  </div>;
}

// InlineUploader
function InlineUploader({orders,setOrders,payments,setPayments,defaultDocType,onRefresh}){
  const[st,setSt]=useState("idle");const[file,setFile]=useState(null);const[parsed,setParsed]=useState(null);const[ed,setEd]=useState(null);const[docType,setDocType]=useState(defaultDocType);const[error,setError]=useState(null);
  const empty=dt=>dt==="purchase_order"?{doc_type:"purchase_order",supplier:"",po_reference:"",invoice_number:"",po_date:"",destination_region:"",currency:"USD",deposit_amount:0,release_amount:0,notes:"",confidence:"low"}:dt==="remittance"?{doc_type:"remittance",bank_account_hint:"",source_entity:"",payment_date:"",amount:0,currency:"USD",po_references:[""],payment_type:"Deposit",reference:"",notes:"",confidence:"low"}:{doc_type:dt||"commercial_invoice",supplier:"",invoice_number:"",po_reference:"",destination_region:"",currency:"USD",total_amount:0,notes:"",confidence:"low"};
  const handleFiles=async files=>{if(!files.length)return;const f=files[0];setFile(f);setSt("parsing");setError(null);try{const r=await parseDoc(f);setDocType(r.doc_type||defaultDocType);setParsed(r);const edData={...r};if((r.doc_type||defaultDocType)==="purchase_order"&&r.po_date&&!r.deposit_due){edData.deposit_due=r.po_date;const rd=new Date(r.po_date);rd.setDate(rd.getDate()+21);edData.release_due=rd.toISOString().slice(0,10);}/* Normalize supplier to known list (case-insensitive) */const matchedSupplier=SUPPLIERS.find(s=>s.toLowerCase()===(r.supplier||"").toLowerCase())||"";if(matchedSupplier)edData.supplier=matchedSupplier;/* Default notes to supplier name only */if(r.doc_type!=="remittance"){edData.notes=matchedSupplier||r.supplier||"";}setEd(edData);setSt("review");}catch(e){setError("Parse failed: "+e.message);setDocType(defaultDocType);setEd(empty(defaultDocType));setSt("review");}};
  const confirm=async()=>{const dt=docType,d=ed;setSt("saving");try{
    if(dt==="purchase_order"){await apiPost("/api/orders",{region:d.destination_region||"US",ref:d.po_reference||"",inv:d.invoice_number||"",supplier:d.supplier||"",currency:d.currency||"USD",depositAmt:+(d.deposit_amount)||0,depositStatus:+(d.deposit_amount)>0?"due":"paid",depositDue:d.deposit_due||"",releaseAmt:+(d.release_amount)||0,releaseStatus:"unpaid",releaseDue:d.release_due||"",poDate:d.po_date||"",notes:d.notes||""});if(file&&d.po_reference)try{await apiUploadFile(file,d.po_reference,{docType:"purchase_order",docDate:d.po_date||new Date().toISOString().slice(0,10)});}catch(e){}}
    else if(dt==="remittance"){
      const bm={"AU-NAB":"au-nab","UK-HSBC":"uk-hsbc","US-Chase":"us-chase","CA-RBC":"ca-rbc"};
      const allocs=d._allocations||[];
      const orderIds=allocs.map(a=>a.orderId);
      const allocations={};
      allocs.forEach(a=>{allocations[a.orderId]=a.amount;});

      // Payment type is always Deposit or Release — never Full Amount
      const lineTypes=[...new Set(allocs.map(a=>a.lineType).filter(Boolean))];
      const paymentType=lineTypes[0]==="deposit"?"Deposit":"Release";

      await apiPost("/api/payments",{
        orderIds,
        allocations,
        bankAccount:bm[d.bank_account_hint]||"us-chase",
        sourceEntity:d.source_entity||"US",
        amount:+(d.amount)||0,
        currency:d.currency||"USD",
        date:d.payment_date||new Date().toISOString().slice(0,10),
        type:paymentType,
        notes:d.notes||"",
        docName:file?.name
      });

      // Upload file to first PO's folder
      if(file&&allocs.length>0){
        try{await apiUploadFile(file,allocs[0].ref,{docType:"remittance",docDate:d.payment_date||new Date().toISOString().slice(0,10),entity:d.source_entity||"",bankLabel:d.bank_account_hint||""});}catch(e){}
      }
    }
    else{if(file&&d.po_reference)try{await apiUploadFile(file,d.po_reference,{docType:dt||"commercial_invoice",docDate:d.invoice_date||d.po_date||new Date().toISOString().slice(0,10)});}catch(e){}}
    if(onRefresh)await onRefresh();setSt("done");setTimeout(()=>{setSt("idle");setFile(null);setParsed(null);setEd(null);setError(null);},2000);
  }catch(e){setError("Save failed: "+e.message);setSt("review");}};
  const reset=()=>{setSt("idle");setFile(null);setParsed(null);setEd(null);};
  if(st==="idle")return <DropZone compact onFiles={handleFiles} label="Drop a document to upload and parse"/>;
  if(st==="parsing")return <div className="il-p"><div className="spinner"/><span>Parsing {file?.name}...</span></div>;
  if(st==="saving")return <div className="il-p"><div className="spinner"/><span>Saving...</span></div>;
  if(st==="done")return <div className="il-d"><span className="ci ci-h" style={{width:28,height:28,fontSize:16}}>✓</span><span>Saved</span></div>;
  if(st==="review"&&docType==="remittance")return <>{error&&<div className="err">{error}</div>}<RemittanceAllocationUI parsed={parsed} ed={ed} setEd={setEd} onConfirm={confirm} onCancel={reset} fileName={file?.name} orders={orders} payments={payments}/></>;
  return <>{error&&<div className="err">{error}</div>}<ReviewScreen parsed={parsed} ed={ed} setEd={setEd} docType={docType} onChangeDocType={setDocType} onConfirm={confirm} onCancel={reset} fileName={file?.name} orders={orders} payments={payments}/></>;
}

// RowUploadModal — per-PO upload: doc goes to Drive, optional payment record
function RowUploadModal({order,onClose,onRefresh}){
  const[st,setSt]=useState("pick");const[file,setFile]=useState(null);const[docType,setDocType]=useState("document");
  const[parsing,setParsing]=useState(false);const[saving,setSaving]=useState(false);const[error,setError]=useState(null);
  const[payForm,setPayForm]=useState({amount:0,currency:order.currency||"USD",date:"",type:"Deposit",source:order.region||"",bank:""});
  const[createPayment,setCreatePayment]=useState(!(order.depositStatus==="paid"&&order.releaseStatus==="paid"));
  const fRef=useRef();
  const pf=(k,v)=>setPayForm(p=>({...p,[k]:v}));
  const selectedLinePaid=payForm.type==="Release"?order.releaseStatus==="paid":payForm.type==="Full Amount"?(order.depositStatus==="paid"&&order.releaseStatus==="paid"):order.depositStatus==="paid";

  const handleFile=async f=>{
    setFile(f);
    if(docType==="remittance"){
      setParsing(true);setError(null);
      try{
        const r=await parseDoc(f);
        setPayForm(p=>({...p,amount:+(r.amount)||p.amount,currency:r.currency||p.currency,date:r.payment_date||p.date,source:r.source_entity||p.source,type:r.payment_type||p.type}));
      }catch(e){/* AI parse failed, user fills manually */}
      setParsing(false);
    }
    setSt("confirm");
  };

  const upload=async()=>{
    setSaving(true);setError(null);
    try{
      // Always upload file to this PO's Drive folder
      if(file&&order.ref){
        const uploadMeta={docType:docType||"document",docDate:new Date().toISOString().slice(0,10)};
        if(docType==="remittance"){uploadMeta.entity=payForm.source||order.region||"";uploadMeta.bankLabel=payForm.bank||"";}
        await apiUploadFile(file,order.ref,uploadMeta);
      }

      // If remittance, optionally record payment (supporting-doc-only mode avoids duplicate entries)
      if(docType==="remittance"&&createPayment){
        const bm={"AU-NAB":"au-nab","UK-HSBC":"uk-hsbc","US-Chase":"us-chase","CA-RBC":"ca-rbc"};
        const bankId=bm[payForm.bank]||BANKS.find(b=>b.entity===payForm.source)?.id||"us-chase";
        const alloc={};alloc[order.id]=+(payForm.amount)||0;
        await apiPost("/api/payments",{
          orderIds:[order.id],allocations:alloc,
          bankAccount:bankId,sourceEntity:payForm.source||order.region||"US",
          amount:+(payForm.amount)||0,currency:payForm.currency||"USD",
          date:payForm.date||new Date().toISOString().slice(0,10),
          type:payForm.type,notes:"",docName:file?.name
        });
      }
      if(onRefresh)await onRefresh();
      onClose();
    }catch(e){setError("Upload failed: "+e.message);setSaving(false);}
  };

  return <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={onClose}>
    <div style={{background:"var(--wh)",borderRadius:"var(--r2)",maxWidth:480,width:"90%",padding:24}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><div style={{fontWeight:700,fontSize:15}}>Upload to {order.ref}</div><div style={{fontSize:12,color:"var(--tx3)"}}>{order.supplier} · <RegionBadge region={order.region}/></div></div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"var(--tx3)"}}>✕</button>
      </div>

      {error&&<div className="err">{error}</div>}

      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--tx3)",marginBottom:6}}>Upload Type</div>
        <div style={{display:"flex",gap:8}}>
          <button className={`bg-btn ${docType==="document"?"bg-act":""}`} onClick={()=>setDocType("document")} style={{flex:1,padding:"10px 12px",borderRadius:6,border:"1px solid var(--bd)"}}>📄 Document</button>
          <button className={`bg-btn ${docType==="remittance"?"bg-act":""}`} onClick={()=>setDocType("remittance")} style={{flex:1,padding:"10px 12px",borderRadius:6,border:"1px solid var(--bd)"}}>🏦 Payment Remittance</button>
        </div>
      </div>

      {docType==="remittance"&&<div style={{marginBottom:16,border:"1px solid var(--bd)",borderRadius:"var(--r2)",overflow:"hidden"}}>
        <div style={{padding:"8px 14px",background:"var(--s2)",borderBottom:"1px solid var(--bd)",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--tx3)"}}>PO Invoice Summary — {order.ref}</div>
        <div style={{padding:"12px 14px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {(order.depositAmt||0)>0&&<div style={{padding:"10px 12px",borderRadius:"var(--r)",background:order.depositStatus==="paid"?"var(--gnb)":"var(--amb)",border:`1px solid ${order.depositStatus==="paid"?"var(--gnbd)":"var(--ambd)"}`}}><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:order.depositStatus==="paid"?"var(--gn)":"var(--am)",marginBottom:4}}>Deposit</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:15}}>{usd(toUSD(order.depositAmt,order.currency))}</div><div style={{fontSize:10,color:"var(--tx3)",marginTop:2}}>{order.currency} {(order.depositAmt).toLocaleString()} · {order.depositStatus==="paid"?"✓ Paid":"Unpaid"}</div></div>}
          {(order.releaseAmt||0)>0&&<div style={{padding:"10px 12px",borderRadius:"var(--r)",background:order.releaseStatus==="paid"?"var(--gnb)":"var(--amb)",border:`1px solid ${order.releaseStatus==="paid"?"var(--gnbd)":"var(--ambd)"}`}}><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:order.releaseStatus==="paid"?"var(--gn)":"var(--am)",marginBottom:4}}>Release</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:15}}>{usd(toUSD(order.releaseAmt,order.currency))}</div><div style={{fontSize:10,color:"var(--tx3)",marginTop:2}}>{order.currency} {(order.releaseAmt).toLocaleString()} · {order.releaseStatus==="paid"?"✓ Paid":"Unpaid"}</div></div>}
        </div>
      </div>}

      {docType==="remittance"&&<div style={{marginBottom:16,padding:"11px 12px",border:"1px solid var(--bd)",borderRadius:"var(--r)",background:createPayment?"var(--s2)":"#f8fafc"}}>
        <label style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer"}}>
          <input type="checkbox" checked={createPayment} onChange={e=>setCreatePayment(e.target.checked)} style={{marginTop:2}}/>
          <div>
            <div style={{fontSize:12,fontWeight:700}}>Create payment ledger entry from this remittance</div>
            <div style={{fontSize:11,color:"var(--tx3)",marginTop:2}}>Turn this off to upload as supporting evidence only (no new payment added).</div>
          </div>
        </label>
        {selectedLinePaid&&createPayment&&<div style={{marginTop:8,fontSize:11,fontWeight:600,color:"var(--am)",background:"var(--amb)",border:"1px solid var(--ambd)",padding:"6px 8px",borderRadius:6}}>⚠ This PO line is already marked paid. Consider disabling payment creation to avoid duplicate allocation.</div>}
      </div>}

      {st==="pick"&&<>
        <div className="dropzone dz-compact" onClick={()=>fRef.current?.click()}>
          <div className="dz-ci"><span>📎</span><span>Drop file or click to select</span></div>
        </div>
        <input ref={fRef} type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(f)handleFile(f);e.target.value="";}}/>
      </>}

      {st==="confirm"&&<>
        <div style={{padding:"10px 14px",background:"var(--s2)",borderRadius:"var(--r)",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>📄</span>
          <div><div style={{fontWeight:600,fontSize:13}}>{file?.name}</div><div style={{fontSize:11,color:"var(--tx3)"}}>→ Drive folder for {order.ref}</div></div>
        </div>

        {parsing&&<div className="il-p"><div className="spinner"/><span>Parsing with AI...</span></div>}

        {docType==="remittance"&&!parsing&&<div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--tx3)",marginBottom:8}}>Payment Details</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:3}}>Amount</div><div style={{display:"flex",gap:6}}><input className="ri" type="number" step="0.01" value={payForm.amount} onChange={e=>pf("amount",e.target.value)} style={{flex:1,fontFamily:"'JetBrains Mono',monospace"}}/><select className="ri" value={payForm.currency} onChange={e=>pf("currency",e.target.value)} style={{width:70}}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div></div>
            <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:3}}>Date</div><input className="ri" type="date" value={payForm.date} onChange={e=>pf("date",e.target.value)}/></div>
            <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:3}}>Type</div><select className="ri" value={payForm.type} onChange={e=>pf("type",e.target.value)}>{PAYMENT_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
            <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:3}}>Source Entity</div><select className="ri" value={payForm.source} onChange={e=>pf("source",e.target.value)}>{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></div>
            <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:3}}>Bank</div><select className="ri" value={payForm.bank} onChange={e=>pf("bank",e.target.value)}><option value="">Auto</option>{BANKS.map(b=><option key={b.id} value={b.hint}>{b.label}</option>)}</select></div>
          </div>
          {+(payForm.amount)>0&&(()=>{
            const depInv=toUSD(order.depositAmt||0,order.currency);
            const relInv=toUSD(order.releaseAmt||0,order.currency);
            const depPaid=toUSD(+(order.depositPaidAmt)||0,order.currency);
            const relPaid=toUSD(+(order.releasePaidAmt)||0,order.currency);
            const invoiceAmt=payForm.type==="Deposit"?depInv:payForm.type==="Release"?relInv:depInv+relInv;
            const prevPaid=payForm.type==="Deposit"?depPaid:payForm.type==="Release"?relPaid:depPaid+relPaid;
            const tgt=Math.max(invoiceAmt-prevPaid,0);
            const amt=+(payForm.amount);
            const isExact=tgt>0&&Math.abs(amt-tgt)<0.02;
            const isOver=amt>tgt+0.01;
            const bar=isOver?"var(--rd)":isExact?"var(--gn)":"var(--ac)";
            return <div style={{marginTop:10,border:`2px solid ${isOver?"var(--rd)":isExact?"var(--gnbd)":"var(--bd)"}`,borderRadius:"var(--r)",padding:"12px 14px",background:isOver?"var(--rdb)":isExact?"var(--gnb)":"var(--s2)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"3px 16px",marginBottom:8}}>
                <span style={{fontSize:11,color:"var(--tx3)",fontWeight:600}}>{payForm.type} Invoice Total</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,textAlign:"right"}}>{usd(invoiceAmt)}</span>
                {prevPaid>0.01&&<><span style={{fontSize:11,color:"var(--tx3)"}}>Previously paid</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600,textAlign:"right",color:"var(--gn)"}}>{usd(prevPaid)}</span></>}
                {prevPaid>0.01&&<><span style={{fontSize:11,color:"var(--tx3)",fontWeight:600}}>Outstanding balance</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,textAlign:"right",color:"var(--am)"}}>{usd(tgt)}</span></>}
                <span style={{fontSize:11,color:"var(--tx3)"}}>This payment</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,textAlign:"right",color:bar}}>{usd(amt)}</span>
                <hr style={{gridColumn:"1/-1",border:"none",borderTop:"1px solid var(--bd)",margin:"3px 0"}}/>
                <span style={{fontSize:12,fontWeight:700}}>Balance remaining</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,textAlign:"right",color:isExact?"var(--gn)":isOver?"var(--rd)":"var(--am)"}}>{usd(Math.max(tgt-amt,0))}</span>
              </div>
              <div style={{height:8,background:"var(--s3)",borderRadius:4,overflow:"hidden",marginBottom:4}}><div style={{height:"100%",width:`${tgt>0?Math.min(amt/tgt*100,100):0}%`,background:bar,borderRadius:4,transition:"width .3s"}}/></div>
              <div style={{fontSize:11,color:"var(--tx3)",display:"flex",justifyContent:"space-between"}}>
                <span>{tgt>0?(amt/tgt*100).toFixed(1):0}% covered</span>
                {isExact&&<span style={{color:"var(--gn)",fontWeight:700}}>✓ Exact match</span>}
                {!isExact&&!isOver&&tgt>0&&<span style={{color:"var(--am)",fontWeight:600}}>Partial — {usd(tgt-amt)} remains</span>}
                {isOver&&<span style={{color:"var(--rd)",fontWeight:700}}>⚠ Exceeds by {usd(amt-tgt)}</span>}
              </div>
            </div>;
          })()}
        </div>}

        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button className="btn btn-ghost" onClick={()=>{setSt("pick");setFile(null);}}>Back</button>
          <button className="btn btn-primary" onClick={upload} disabled={saving}>{saving?<><span className="spinner" style={{width:14,height:14,borderWidth:2,marginRight:6}}/>Saving...</>:docType==="remittance"?(createPayment?"Upload & Record Payment":"Upload Supporting Document"):"Upload to Drive"}</button>
        </div>
      </>}
    </div>
  </div>;
}

// Convert orders to payment line items
function ordersToLineItems(orders){
  const items=[];
  orders.forEach(o=>{
    const hasDep=o.depositAmt>0;
    const hasRel=o.releaseAmt>0;
    const depPaidAmt=+(o.depositPaidAmt)||0;
    const relPaidAmt=+(o.releasePaidAmt)||0;
    const depOutstanding=Math.max(o.depositAmt-depPaidAmt,0);
    const relOutstanding=Math.max(o.releaseAmt-relPaidAmt,0);
    if(hasDep&&hasRel){
      items.push({...o,lineType:"Deposit",lineAmount:o.depositAmt,lineStatus:o.depositStatus,lineDue:o.depositDue,linePaid:o.depositPaid,lineKey:o.id+"-dep",linePaidAmt:depPaidAmt,lineOutstanding:depOutstanding});
      items.push({...o,lineType:"Release",lineAmount:o.releaseAmt,lineStatus:o.releaseStatus,lineDue:o.releaseDue,linePaid:o.releasePaid,lineKey:o.id+"-rel",linePaidAmt:relPaidAmt,lineOutstanding:relOutstanding});
    }else if(hasDep){
      items.push({...o,lineType:"Deposit",lineAmount:o.depositAmt,lineStatus:o.depositStatus,lineDue:o.depositDue,linePaid:o.depositPaid,lineKey:o.id+"-dep",linePaidAmt:depPaidAmt,lineOutstanding:depOutstanding});
    }else if(hasRel){

    }else{
      // Single-amount PO — treat as Release
      items.push({...o,lineType:"Release",lineAmount:o.totalValue,lineStatus:o.releaseStatus||"unpaid",lineDue:o.releaseDue||"",linePaid:o.releasePaid||"",lineKey:o.id+"-rel",linePaidAmt:relPaidAmt,lineOutstanding:Math.max(o.totalValue-relPaidAmt,0)});
    }
  });
  return items;
}

function IntercompanyTab({orders,payments}){
  const[sort,setSort]=useState({key:"date",dir:"desc"});
  const ts=key=>setSort(s=>({key,dir:s.key===key&&s.dir==="asc"?"desc":"asc"}));
  const si=key=>sort.key===key?(sort.dir==="asc"?" ↑":" ↓"):"";
  const sortTxns=txns=>[...txns].sort((a,b)=>{const d=sort.dir==="asc"?1:-1;if(sort.key==="date")return((a.date||"")>(b.date||"")?1:-1)*d;if(sort.key==="po")return((a.poRef||"")>(b.poRef||"")?1:-1)*d;if(sort.key==="from")return((a.sourceEntity||"")>(b.sourceEntity||"")?1:-1)*d;if(sort.key==="to")return((a.dest||"")>(b.dest||"")?1:-1)*d;if(sort.key==="amount")return((a.amount||0)-(b.amount||0))*d;return 0;});
  const icMap={};payments.forEach(p=>{if(!p.sourceEntity||!p.orderIds)return;(p.orderIds||[]).forEach(oid=>{const o=orders.find(x=>x.id===oid);if(!o||!o.region||!p.sourceEntity||p.sourceEntity===o.region)return;const k=[p.sourceEntity,o.region].sort().join("-");if(!icMap[k])icMap[k]={e1:p.sourceEntity<o.region?p.sourceEntity:o.region,e2:p.sourceEntity<o.region?o.region:p.sourceEntity,net:0,txns:[]};const amt=(p.allocations||{})[oid]||p.amount;icMap[k].net+=amt*(p.sourceEntity<o.region?1:-1);icMap[k].txns.push({date:p.date,poRef:o.ref,sourceEntity:p.sourceEntity,dest:o.region,amount:amt});});});
  const pairs=Object.values(icMap);const totalIC=pairs.reduce((s,p)=>s+Math.abs(p.net),0);
  return <>
    <div className="ph"><div><h2>Intercompany Clearing</h2><p className="ps">Auto-detected when payment source ≠ PO destination</p></div></div>

    {!pairs.length?<div className="es"><div style={{fontSize:36,marginBottom:12}}>🔄</div><p>No intercompany clearing needed</p></div>
    :pairs.map((pr,i)=><div key={i} className="icc"><div className="ic-p"><RegionBadge region={pr.e1}/><span className="ic-a">{pr.net>=0?"→ owes →":"← owed ←"}</span><RegionBadge region={pr.e2}/><span className="ic-amt mono">{usd(Math.abs(pr.net))}</span></div>
    <table><thead><tr><th className="srt" onClick={()=>ts("date")}>Date{si("date")}</th><th className="srt" onClick={()=>ts("po")}>PO{si("po")}</th><th className="srt" onClick={()=>ts("from")}>From{si("from")}</th><th className="srt" onClick={()=>ts("to")}>To{si("to")}</th><th className="srt" onClick={()=>ts("amount")}>Amount{si("amount")}</th></tr></thead><tbody>{sortTxns(pr.txns).map((t,j)=><tr key={j}><td>{fmtDate(t.date)}</td><td className="cb">{t.poRef}</td><td><RegionBadge region={t.sourceEntity}/></td><td><RegionBadge region={t.dest}/></td><td className="mono">{usd(t.amount)}</td></tr>)}</tbody></table></div>)}
  </>;

function ForecastTab({orders}){
  const weeks={};orders.forEach(o=>{const add=(d,a,paidAmt,st,label)=>{if(!d)return;const u=toUSD(a,o.currency);const paid=toUSD(paidAmt,o.currency);const outstanding=Math.max(u-paid,0);const wk=weekKey(d);if(!weeks[wk])weeks[wk]={paid:0,due:0,over:0,total:0,items:[]};weeks[wk].total+=u;if(st==="paid")weeks[wk].paid+=u;else{weeks[wk].paid+=paid;if(new Date(d)<new Date())weeks[wk].over+=outstanding;else weeks[wk].due+=outstanding;}weeks[wk].items.push({ref:o.ref,region:o.region,amount:u,paidAmt:paid,outstanding,status:st,label,date:d});};add(o.depositDue,o.depositAmt,+(o.depositPaidAmt)||0,o.depositStatus,"Deposit");add(o.releaseDue,o.releaseAmt,+(o.releasePaidAmt)||0,o.releaseStatus,"Release");});
  const sortedWeeks=Object.entries(weeks).sort(([a],[b])=>a.localeCompare(b));let cumul=0;
  const withCumul=sortedWeeks.map(([wk,d])=>{cumul+=d.total;return[wk,d,cumul];});
  const[expanded,setExpanded]=useState({});const toggle=wk=>setExpanded(p=>({...p,[wk]:!p[wk]}));
  return <>
    <div className="ph"><div><h2>Cash Forecast</h2><p className="ps">Weekly payment obligations</p></div></div>
    <div className="fw">{withCumul.map(([wk,d,cum])=><div key={wk} className="wk-row">
      <div className="wk-header" onClick={()=>toggle(wk)} style={{cursor:"pointer"}}><div className="wk-date">{fmtWeek(wk)} <span className="wk-count">({d.items.length})</span></div><div className="wk-nums"><span className="mono">{usd(d.total)}</span><span className="wk-cum mono">Σ {usd(cum)}</span></div></div>
      <div className="bt"><div className="bf bg" style={{width:d.total>0?pct(d.paid/d.total):"0%"}}/><div className="bf br" style={{width:d.total>0?pct(d.over/d.total):"0%"}}/><div className="bf ba" style={{width:d.total>0?pct(d.due/d.total):"0%"}}/></div>
      <div className="fl"><span><span className="dot dg"/>Paid: {usd(d.paid)}</span>{d.over>0&&<span><span className="dot dr"/>Overdue: {usd(d.over)}</span>}<span><span className="dot da"/>Due: {usd(d.due)}</span></div>
      {expanded[wk]&&<div className="wk-items">{d.items.sort((a,b)=>a.date.localeCompare(b.date)).map((it,i)=><div key={i} className="wk-item"><RegionBadge region={it.region}/><span className="cb" style={{flex:1}}>{it.ref}</span><span className="badge badge-grey" style={{fontSize:10}}>{it.label}</span><StatusBadge status={it.status} dueDate={it.date}/><span className="mono" style={{minWidth:90,textAlign:"right"}}>{usd(it.amount)}</span>{it.status!=="paid"&&it.paidAmt>0.01&&<span className="mono" style={{minWidth:90,textAlign:"right",color:"var(--rd)",fontSize:11}}>({usd(it.outstanding)} due)</span>}</div>)}</div>}
    </div>)}</div>
  </>;
}

// App
function App(){
  const[tab,setTab]=useState("orders");const[orders,setOrders]=useState([]);const[payments,setPayments]=useState([]);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);const[sideUpload,setSideUpload]=useState(false);const[lastRefresh,setLastRefresh]=useState(null);const[showHelp,setShowHelp]=useState(false);
  const loadData=useCallback(async()=>{try{setLoading(true);setError(null);const data=await apiGet("/api/all");setOrders(data.orders||[]);setPayments(data.payments||[]);setLastRefresh(new Date());}catch(e){setError(e.message);}finally{setLoading(false);};},[]);
  useEffect(()=>{loadData();},[loadData]);
  const refresh=useCallback(async()=>{try{const data=await apiGet("/api/all");setOrders(data.orders||[]);setPayments(data.payments||[]);setLastRefresh(new Date());}catch(e){console.error("Refresh failed:",e);}},[]);
  if(loading)return <div className="loading-screen"><div className="spinner"/><span style={{fontSize:15,color:"var(--tx2)"}}>Loading Bureau Ops...</span></div>;
  if(error)return <div className="loading-screen"><div style={{fontSize:48}}>⚠️</div><div style={{fontSize:15,color:"var(--rd)",maxWidth:400,textAlign:"center"}}>{error}</div><button className="btn btn-primary" onClick={loadData}>Retry</button></div>;
  return <div className="app">
    <div className="sidebar"><div className="sidebar-logo"><h1>Bureau Ops</h1><span>Logistics & Payments</span></div>
    <nav className="sidebar-nav">{TABS.map(t=><button key={t.id} className={`ni ${tab===t.id?"act":""}`} onClick={()=>setTab(t.id)}><span className="nic">{t.icon}</span><span>{t.label}</span></button>)}</nav>
    <div className="sidebar-upload"><button className="sidebar-upload-btn" onClick={()=>setSideUpload(!sideUpload)}><span style={{fontSize:18}}>⬆</span><span>Upload Doc</span></button></div>
    <div className="sf"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{orders.length} POs · {payments.length} payments</span><div style={{display:"flex",gap:6,alignItems:"center"}}><a href="https://docs.google.com/spreadsheets/d/1a_j_qCDWF9y8LUfT3iq-R5ZzydID-A36/edit?gid=17854855#gid=17854855&fvid=547760767" target="_blank" rel="noopener" style={{background:"#34a853",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,fontSize:13,cursor:"pointer",fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",textDecoration:"none"}} title="Open Google Sheet">📊</a><button onClick={()=>setShowHelp(true)} style={{background:"var(--ac)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,fontSize:14,cursor:"pointer",fontWeight:700}} title="Backend guide & troubleshooting">?</button></div></div>{lastRefresh&&<div style={{marginTop:4,cursor:"pointer"}} onClick={refresh} title="Click to refresh">🔄 {lastRefresh.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</div>}</div></div>
    <main className="mn">
      {sideUpload&&<div className="us" style={{marginBottom:24}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontWeight:700,fontSize:14}}>Quick Upload</span><button className="btn btn-ghost" style={{padding:"4px 10px",fontSize:11}} onClick={()=>setSideUpload(false)}>✕ Close</button></div><InlineUploader orders={orders} payments={payments} defaultDocType="purchase_order" onRefresh={refresh}/></div>}
      {tab==="orders"&&<OrdersTab orders={orders} payments={payments} onRefresh={refresh}/>}
      {tab==="payments"&&<PaymentsTab orders={orders} payments={payments} onRefresh={refresh}/>}
      {tab==="clearing"&&<IntercompanyTab orders={orders} payments={payments}/>}
      {tab==="forecast"&&<ForecastTab orders={orders}/>}
    </main>
    {showHelp&&<HelpModal onClose={()=>setShowHelp(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
