// Build Gmail compose URL for payment confirmation email
function buildPaymentEmailUrl({poRefs, amount, currency, paymentDate, reference, supplier}) {
  const poList = (poRefs || []).filter(Boolean);
  const poDisplay = poList.length ? poList.join(", ") : "N/A";
  const poHashList = poList.map(r => "#" + r.replace(/^PO-?/i, "")).join(", ");
  const fmtAmt = (currency || "USD") + " " + Number(amount || 0).toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});
  const dateParts = (paymentDate || "").split("-");
  const fmtDt = dateParts.length === 3 ? `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}` : paymentDate || "";
  const subject = `Bureau - Payment Confirmation - ${poDisplay}`;
  const body = `Hi${supplier ? " " + supplier : ""},\n\nI'm writing to confirm that payment for Purchase Order${poList.length > 1 ? "s" : ""} ${poHashList || poDisplay} has been processed.\nPlease find the payment receipt/remittance attached.\n\nPayment details:\n- Amount: ${fmtAmt}\n- Date of payment: ${fmtDt}\n- Payment method: Bank transfer${reference ? "\n- Reference number: " + reference : ""}\n\nKindly confirm once the funds have been received.\n\nBest regards`;
  return `https://mail.google.com/mail/?view=cm&fs=1&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

// API helpers
async function parseApiError(r, fallback){
  const raw = await r.text();
  let detail = raw;
  try {
    const parsed = JSON.parse(raw);
    detail = parsed?.error || parsed?.message || raw;
  } catch (_) {}
  detail = (detail || "").trim();
  return detail ? `${fallback} (${r.status}): ${detail}` : `${fallback} (${r.status})`;
}

// Fuzzy match existing payment for remittance upload
function fuzzyMatchPayment(remittanceData, payments) {
  const amt = +(remittanceData.amount) || 0;
  const date = remittanceData.payment_date;
  const source = remittanceData.source_entity;
  if (!amt || !date || !source) return null;

  const dateObj = new Date(date);
  const matches = payments.filter(p => {
    // Match source entity
    if (p.sourceEntity !== source) return false;

    // Match amount (±5% tolerance)
    const pAmt = toUSD(p.amount, p.currency);
    const amtDiff = Math.abs(amt - pAmt) / pAmt;
    if (amtDiff > 0.05) return false;

    // Match date (±7 days tolerance)
    if (p.date) {
      const pDate = new Date(p.date);
      const daysDiff = Math.abs((dateObj - pDate) / (1000 * 60 * 60 * 24));
      if (daysDiff > 7) return false;
    }

    // Prefer payments without documents (docName not set)
    return true;
  });

  // Sort by closeness: first by amount difference, then by date difference
  matches.sort((a, b) => {
    const aDiff = Math.abs(amt - toUSD(a.amount, a.currency));
    const bDiff = Math.abs(amt - toUSD(b.amount, b.currency));
    return aDiff - bDiff;
  });

  return matches.length > 0 ? matches[0] : null;
}

// Expand each PO into deposit + release lines for remittance allocation.
// Each line is an independent payable — never the total.
// If includePaid=true, also include paid lines (for re-allocation workflows).
function expandOrdersToLines(orders, includePaid) {
  const lines=[];
  (orders||[]).forEach(o=>{
    const depAmtUSD=toUSD(o.depositAmt,o.currency);
    const relAmtUSD=toUSD(o.releaseAmt,o.currency);
    const depPaidUSD=toUSD(+(o.depositPaidAmt)||0,o.currency);
    const relPaidUSD=toUSD(+(o.releasePaidAmt)||0,o.currency);
    const depOutstanding=Math.max(depAmtUSD-depPaidUSD,0);
    const relOutstanding=Math.max(relAmtUSD-relPaidUSD,0);
    const depIsPaid=o.depositStatus==="paid";
    const relIsPaid=o.releaseStatus==="paid";
    if((!depIsPaid&&depOutstanding>0.01)||(includePaid&&depIsPaid&&depAmtUSD>0.01))
      lines.push({...o,lineId:o.id+"-dep",lineType:"deposit",lineAmtUSD:depAmtUSD,outstanding:depIsPaid?0:depOutstanding,hasBalance:!depIsPaid&&depOutstanding>0.01,isPaid:depIsPaid,
        depAmtUSD,relAmtUSD,depUnpaid:!depIsPaid,relUnpaid:!relIsPaid});
    if((!relIsPaid&&relOutstanding>0.01)||(includePaid&&relIsPaid&&relAmtUSD>0.01))
      lines.push({...o,lineId:o.id+"-rel",lineType:"release",lineAmtUSD:relAmtUSD,outstanding:relIsPaid?0:relOutstanding,hasBalance:!relIsPaid&&relOutstanding>0.01,isPaid:relIsPaid,
        depAmtUSD,relAmtUSD,depUnpaid:!depIsPaid,relUnpaid:!relIsPaid});
    // Single-amount PO (no deposit/release split) — treat as Release
    if(depAmtUSD<0.01&&relAmtUSD<0.01&&(!relIsPaid||(includePaid&&o.totalValue>0))){
      const totUSD=toUSD(o.totalValue,o.currency);
      const totPaidUSD=toUSD(+(o.releasePaidAmt)||0,o.currency);
      const totOutstanding=relIsPaid?0:Math.max(totUSD-totPaidUSD,0);
      if(totOutstanding>0.01||includePaid)lines.push({...o,lineId:o.id+"-rel",lineType:"release",lineAmtUSD:totUSD,outstanding:totOutstanding,hasBalance:totOutstanding>0.01,isPaid:relIsPaid,
        depAmtUSD:0,relAmtUSD:totUSD,depUnpaid:false,relUnpaid:!relIsPaid});
    }
  });
  return lines;
}

// Fuzzy search over expanded deposit/release lines.
function fuzzyMatchLines(input, lines) {
  if(!input||!input.trim()) return [];
  const clean=s=>(s||"").replace(/[\s\-_\.#,/\\()]+/g,"").toLowerCase();
  const extractNums=s=>(s||"").match(/\d+/g)||[];
  const q=clean(input),qNums=extractNums(input);
  const tokens=input.toLowerCase().split(/[\s\-_\.#,/\\()]+/).filter(t=>t.length>=2);
  return lines.map(l=>{
    let score=0,reason="";
    const rc=clean(l.ref),ic=clean(l.inv),sc=clean(l.supplier||"");
    if(rc===q||ic===q){score=100;reason="Exact";}
    else if(rc.includes(q)||ic.includes(q)){score=85;reason="Contains";}
    else if(q.includes(rc)||q.includes(ic)){score=80;reason="In input";}
    else if(sc&&(sc.includes(q)||q.includes(sc))){score=78;reason="Supplier";}
    // Token matching — any token in ref/inv/supplier
    if(score===0&&tokens.length>0){
      const best=tokens.reduce((b,t)=>{
        if(rc.includes(t)||ic.includes(t))return Math.max(b,76);
        if(sc.includes(t))return Math.max(b,72);
        return b;
      },0);
      if(best>0){score=best;reason="Token";}
    }
    // Number matching — exact then substring
    if(score===0&&qNums.length>0){
      const an=[...extractNums(l.ref),...extractNums(l.inv)];
      if(qNums.some(n=>an.includes(n))){score=75;reason="PO#";}
      else{
        const refInv=(l.ref||"")+(l.inv||"");
        if(qNums.some(n=>n.length>=2&&refInv.includes(n))){score=73;reason="Partial#";}
        else if(an.some(n=>n.length>=3&&qNums.some(qn=>n.includes(qn)&&qn.length>=2))){score=70;reason="Partial#";}
      }
    }
    return{...l,score,reason};
  }).filter(l=>l.score>0).sort((a,b)=>b.score-a.score).slice(0,15);
}

        if(sc.includes(t))return Math.max(b,72);

      },0);
      if(best>0){score=best;reason="Token";}
    }
    if(score===0&&qNums.length>0){
      const an=[...extractNums(o.ref),...extractNums(o.inv)];

      }

    const depAmtUSD=toUSD(o.depositAmt,o.currency),relAmtUSD=toUSD(o.releaseAmt,o.currency);

// Compress images before sending to reduce upload size and speed up parsing
async function compressImage(file, maxDim=1600, quality=0.8) {
  if (file.type === "application/pdf") return null; // PDFs can't be resized in browser
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let {width:w, height:h} = img;
      if (w <= maxDim && h <= maxDim && file.size < 500000) { resolve(null); return; } // already small
      const scale = Math.min(maxDim/w, maxDim/h, 1);
      w = Math.round(w*scale); h = Math.round(h*scale);
      const c = document.createElement("canvas"); c.width=w; c.height=h;
      const ctx = c.getContext("2d"); ctx.drawImage(img,0,0,w,h);
      c.toBlob(blob => {
        if (!blob) { resolve(null); return; }
        resolve(new File([blob], file.name, {type: "image/jpeg"}));
      }, "image/jpeg", quality);
    };
    img.onerror = () => resolve(null);
    img.src = URL.createObjectURL(file);
  });
}

// Doc parser — calls Worker /api/parse (server-side Anthropic call)
async function parseDoc(file) {
  // Compress images to speed up upload
  const compressed = await compressImage(file).catch(()=>null);
  const sendFile = compressed || file;
  const b64=await new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result.split(",")[1]);x.onerror=()=>j(new Error("fail"));x.readAsDataURL(sendFile);});
  const mediaType=sendFile.type||"application/pdf";
  const res=await fetch(API+"/api/parse",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:b64,media_type:mediaType})});
  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Parse error (${res.status}): ${errText}`);
  }
  return res.json();
}

// Inline edit cell for table rows — click pen icon to edit, auto-saves on blur/enter
function InlineEditCell({value,orderId,field,type,options,onSave,displayValue,mono,className,style}){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState(value||"");
  const[saving,setSaving]=useState(false);
  const ref=useRef();
  useEffect(()=>{setVal(value||"");},[value]);
  useEffect(()=>{if(editing&&ref.current){ref.current.focus();if(type!=="date"&&type!=="select"&&ref.current.select)ref.current.select();}},  [editing]);
  const commit=async()=>{
    if(val===value){setEditing(false);return;}
    setSaving(true);
    try{await onSave(orderId,field,val);setEditing(false);}catch(e){alert("Save failed: "+e.message);}finally{setSaving(false);}
  };
  const handleKey=e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setVal(value||"");setEditing(false);}};
  if(editing){
    const inputStyle={fontSize:12,padding:"3px 6px",border:"1px solid var(--ac)",borderRadius:4,outline:"none",fontFamily:mono?"'JetBrains Mono',monospace":"'DM Sans',sans-serif",width:"100%",boxSizing:"border-box"};
    if(type==="select")return <select ref={ref} value={val} onChange={e=>{setVal(e.target.value);}} onBlur={commit} onKeyDown={handleKey} style={inputStyle}>{(options||[]).map(o=><option key={o} value={o}>{o}</option>)}</select>;
    return <input ref={ref} type={type||"text"} value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={handleKey} style={inputStyle}/>;
  }
  const show=displayValue||value;
  return <span className={"iec "+(className||"")} style={style} onClick={()=>setEditing(true)}>
    <span style={mono?{fontFamily:"'JetBrains Mono',monospace",fontSize:12}:{}}>{show||<span style={{color:"var(--tx3)",fontStyle:"italic",fontSize:11}}>—</span>}</span>
    {saving?<span className="spinner" style={{width:10,height:10,borderWidth:1.5}}/>:<span className="iec-pen">✏️</span>}
  </span>;
}

function DropZone({onFiles,compact,label}){const[drag,setDrag]=useState(false);const fRef=useRef();const dzRef=useRef();
  // Handle paste events (Ctrl+V screenshots) — skip if user is typing in an input/textarea
  useEffect(()=>{
    const handler=e=>{
      const tag=document.activeElement?.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT")return;
      const items=e.clipboardData?.items;if(!items)return;
      const files=[];
      for(let i=0;i<items.length;i++){if(items[i].type.startsWith("image/")){const f=items[i].getAsFile();if(f){const named=new File([f],"pasted-image-"+new Date().toISOString().slice(0,19).replace(/[T:]/g,"-")+".png",{type:f.type});files.push(named);}}}
      if(files.length>0){e.preventDefault();onFiles(files);}
    };
    document.addEventListener("paste",handler);
    return()=>document.removeEventListener("paste",handler);
  },[onFiles]);
  return <div ref={dzRef} className={`dropzone ${compact?"dz-compact":""} ${drag?"dz-active":""}`} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);onFiles(Array.from(e.dataTransfer?.files||[]));}} onClick={()=>fRef.current?.click()}><input ref={fRef} type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" multiple style={{display:"none"}} onChange={e=>{onFiles(Array.from(e.target.files||[]));e.target.value="";}}/>{compact?<div className="dz-ci"><span>📎</span><span>{label||"Drop files, paste screenshot, or click to upload"}</span></div>:<><div style={{fontSize:36,marginBottom:10}}>📎</div><div style={{fontSize:15,fontWeight:600,marginBottom:4}}>{label||"Drop documents here"}</div><div style={{fontSize:12,color:"var(--tx3)"}}>PDF, PNG, or JPG — drop, paste (Ctrl+V), or click to select</div></>}</div>;}

function HelpModal({onClose}){return <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={onClose}><div style={{background:"var(--wh)",borderRadius:"var(--r2)",maxWidth:700,width:"90%",maxHeight:"90vh",overflow:"auto",padding:32}} onClick={e=>e.stopPropagation()}><h2 style={{marginBottom:20}}>📚 Bureau Ops — System Guide</h2><div style={{fontSize:14,lineHeight:1.6}}><h3 style={{marginTop:0,marginBottom:10}}>🏗️ Architecture</h3><div style={{background:"var(--s2)",padding:16,borderRadius:8,marginBottom:16,fontFamily:"'JetBrains Mono',monospace",fontSize:12,lineHeight:1.8}}>Dashboard (Cloudflare Pages)<br/>↓ API calls<br/>Worker (bureau.nik-d88.workers.dev)<br/>↓ reads/writes<br/>Google Sheets ("Bureau Ops Data")<br/>+<br/>Google Drive ("Supplier purchase orders")</div><h3 style={{marginTop:20,marginBottom:10}}>🔗 Key Links</h3><ul style={{marginLeft:20,marginBottom:16}}><li><strong>Dashboard:</strong> <a href="https://bureau.pages.dev" target="_blank" rel="noopener" style={{color:"var(--ac)"}}>https://bureau.pages.dev</a> (auto-deploys from GitHub)</li><li><strong>Worker API:</strong> <a href="https://bureau.nik-d88.workers.dev/api/health" target="_blank" rel="noopener" style={{color:"var(--ac)"}}>https://bureau.nik-d88.workers.dev</a> (check /api/health)</li><li><strong>GitHub Repo:</strong> <a href="https://github.com/nikb333/Bureau" target="_blank" rel="noopener" style={{color:"var(--ac)"}}>https://github.com/nikb333/Bureau</a> (private)</li><li><strong>Google Sheet:</strong> Search for "Bureau Ops Data" in Google Drive (2 tabs: Orders, Payments)</li><li><strong>Document Storage:</strong> Search for "Supplier purchase orders" folder in Google Drive</li></ul><h3 style={{marginTop:20,marginBottom:10}}>📊 How It Works</h3><p style={{marginBottom:10}}>This dashboard manages purchase orders and payments across 4 Bureau entities (AU, UK, US, CA). The entire system is intentionally simple:</p><ol style={{marginLeft:20,marginBottom:16}}><li><strong>Google Sheets = Database</strong> — All data is stored in a flat Google Sheet. Anyone can open it and edit data directly if the dashboard breaks.</li><li><strong>Cloudflare Worker = API</strong> — Thin API layer that reads/writes the sheet and manages file uploads to Google Drive.</li><li><strong>Single HTML File</strong> — The entire dashboard is one self-contained HTML file with no build step. Just React + Babel from CDN.</li></ol><h3 style={{marginTop:20,marginBottom:10}}>🗄️ Google Sheets Database</h3><p style={{marginBottom:10}}><strong>Sheet Name:</strong> "Bureau Ops Data"<br/><strong>Tabs:</strong> Orders | Payments</p><p style={{marginBottom:10}}><strong>Orders tab columns:</strong><br/>ID, Region, Ref, Invoice, Supplier, Currency, Total Value, Deposit Amt, Deposit Status, Deposit Due, Deposit Paid, Release Amt, Release Status, Release Due, Release Paid, Notes, Drive Folder ID, Created, Updated, PO Date</p><p style={{marginBottom:20}}><strong>Payments tab columns:</strong><br/>ID, Bank Account, Source Entity, Amount, Currency, Payment Date, Payment Type, Order IDs, Allocations (JSON), Notes, Doc Name, Created</p><h3 style={{marginTop:20,marginBottom:10}}>📁 Google Drive Storage</h3><p style={{marginBottom:10}}><strong>Folder:</strong> "Supplier purchase orders"<br/><strong>Structure:</strong> Supplier folders → PO folders → Documents</p><p style={{marginBottom:20}}>Each PO gets its own folder under the supplier. The folder ID is stored in the Orders sheet.</p><h3 style={{marginTop:20,marginBottom:10}}>🔧 Troubleshooting</h3><p style={{marginBottom:8}}><strong>Dashboard not loading?</strong></p><ul style={{marginLeft:20,marginBottom:12}}><li>Check Worker status: visit <a href="https://bureau.nik-d88.workers.dev/api/health" target="_blank" rel="noopener" style={{color:"var(--ac)"}}>/api/health</a></li><li>Clear browser cache (Ctrl+Shift+R)</li><li>Open Google Sheets directly: search "Bureau Ops Data"</li></ul><p style={{marginBottom:8}}><strong>Data looks wrong?</strong></p><ul style={{marginLeft:20,marginBottom:12}}><li>Open the Google Sheet and verify data manually</li><li>Check the "Updated" column to see when data changed</li><li>All dates are YYYY-MM-DD format</li></ul><p style={{marginBottom:8}}><strong>Documents not uploading?</strong></p><ul style={{marginLeft:20,marginBottom:12}}><li>Check Google Drive "Supplier purchase orders" folder</li><li>Verify service account has Editor access</li><li>Check browser console for errors (F12)</li></ul><h3 style={{marginTop:20,marginBottom:10}}>🔑 Manual Access</h3><p style={{marginBottom:10}}>If you need to make changes directly:</p><ul style={{marginLeft:20,marginBottom:10}}><li><strong>View/edit data:</strong> Open "Bureau Ops Data" sheet in Google Drive</li><li><strong>View/upload docs:</strong> Open "Supplier purchase orders" folder in Google Drive</li><li><strong>API access:</strong> Use the Worker endpoints (GET /api/orders, GET /api/payments, etc.)</li><li><strong>Code changes:</strong> Push to GitHub main branch → auto-deploys in ~30 seconds</li></ul></div><div style={{marginTop:24,textAlign:"right"}}><button className="btn btn-primary" onClick={onClose}>Got it</button></div></div></div>;}

// EditOrderModal — click-to-edit fields with auto-save, paid/unpaid toggle
function EditOrderModal({order,payments,onSave,onRefresh,onClose}){
  const loading=useLoading();
  const[ed,setEd]=useState({...order});const[saving,setSaving]=useState(false);
  const[uploadFile,setUploadFile]=useState(null);const[uploading,setUploading]=useState(false);const[uploaded,setUploaded]=useState(false);
  const[markPaidNote,setMarkPaidNote]=useState("");const[markPaidTarget,setMarkPaidTarget]=useState(null);
  // Calculate actual payment record totals for this order
  const paymentTotals=useMemo(()=>{
    const t={deposit:0,release:0};
    (payments||[]).forEach(p=>{
      const allocs=p.allocations||{};
      if(!(p.orderIds||[]).includes(order.id))return;
      const a=allocs[order.id];
      if(a&&typeof a==="object"&&!Array.isArray(a)){t.deposit+=+(a.deposit)||0;t.release+=+(a.release)||0;}
      else{const flat=+(a)||+(p.amount)||0;if(p.type==="Deposit"||p.type==="Full Amount")t.deposit+=flat;if(p.type==="Release"||p.type==="Full Amount")t.release+=flat;}
    });
    return{deposit:+t.deposit.toFixed(2),release:+t.release.toFixed(2)};
  },[payments,order.id]);
  const upRef=useRef();
  const sf=(k,v)=>setEd(p=>({...p,[k]:v}));
  // Auto-save a single field
  const saveField=async(field,value)=>{
    setSaving(true);
    try{
      const patch={[field]:value};
      if(field==="depositPaid")patch.depositStatus=value?"paid":(ed.depositDue?"due":"unpaid");
      if(field==="releasePaid")patch.releaseStatus=value?"paid":(ed.releaseDue?"due":"unpaid");
      if(field==="depositPaidAmt"){const amt=+(value)||0;if(amt<=0){patch.depositStatus=ed.depositDue?"due":"unpaid";patch.depositPaid="";}else if(amt>=(+(ed.depositAmt)||0)-0.01){patch.depositStatus="paid";if(!ed.depositPaid)patch.depositPaid=new Date().toISOString().slice(0,10);}else{patch.depositStatus="partial";}}
      if(field==="releasePaidAmt"){const amt=+(value)||0;if(amt<=0){patch.releaseStatus=ed.releaseDue?"due":"unpaid";patch.releasePaid="";}else if(amt>=(+(ed.releaseAmt)||0)-0.01){patch.releaseStatus="paid";if(!ed.releasePaid)patch.releasePaid=new Date().toISOString().slice(0,10);}else{patch.releaseStatus="partial";}}
      await apiPatch(`/api/orders/${encodeURIComponent(order.id)}`,patch);
      sf(field,value);
      if(onRefresh)try{await onRefresh();}catch(e){}
    }catch(e){alert("Save failed: "+e.message);}finally{setSaving(false);}
  };
  // Mark paid with required note — also sets paidAmt to invoice amount so reconciliation doesn't override
  const markPaid=async(target)=>{
    if(!markPaidNote.trim()){alert("Please add a note explaining why this is being manually marked as paid.");return;}
    setSaving(true);loading.show(`Marking ${target} as paid...`);
    const today=new Date().toISOString().slice(0,10);
    const notePrefix=`[Manual mark paid - ${target}] `;
    const newNotes=((ed.notes||"")?(ed.notes+"; "):"")+notePrefix+markPaidNote.trim();
    try{
      const patch={notes:newNotes};
      if(target==="deposit"||target==="both"){patch.depositStatus="paid";patch.depositPaid=ed.depositPaid||today;patch.depositPaidAmt=+(ed.depositAmt)||0;}
      if(target==="release"||target==="both"){patch.releaseStatus="paid";patch.releasePaid=ed.releasePaid||today;patch.releasePaidAmt=+(ed.releaseAmt)||0;}
      await apiPatch(`/api/orders/${encodeURIComponent(order.id)}`,patch);
      sf("notes",newNotes);
      if(target==="deposit"||target==="both"){sf("depositStatus","paid");sf("depositPaid",ed.depositPaid||today);sf("depositPaidAmt",+(ed.depositAmt)||0);}
      if(target==="release"||target==="both"){sf("releaseStatus","paid");sf("releasePaid",ed.releasePaid||today);sf("releasePaidAmt",+(ed.releaseAmt)||0);}
      setMarkPaidTarget(null);setMarkPaidNote("");
      await onSave();
    }catch(e){alert("Mark paid failed: "+e.message);}finally{setSaving(false);loading.hide();}
  };
  const doUpload=async f=>{setUploadFile(f);setUploading(true);loading.show("Uploading document...");try{await apiUploadFile(f,order.ref,{docType:"document",docDate:new Date().toISOString().slice(0,10),entity:order.region||""});setUploaded(true);}catch(e){alert("Upload failed: "+e.message);}finally{setUploading(false);loading.hide();}};
  const depIsPaid=ed.depositStatus==="paid"||!!ed.depositPaid;
  const relIsPaid=ed.releaseStatus==="paid"||!!ed.releasePaid;
  const depUnpaid=!depIsPaid&&+(ed.depositAmt)>0;
  const relUnpaid=!relIsPaid&&+(ed.releaseAmt)>0;
  // Editable field component for the modal
  const EF=({label,field,value,type,options,mono,displayValue})=>{
    const[editing,setEditing]=useState(false);
    const[val,setVal]=useState(value||"");
    const[fieldSaving,setFieldSaving]=useState(false);
    const iRef=useRef();
    useEffect(()=>{setVal(value||"");},[value]);
    useEffect(()=>{if(editing&&iRef.current){iRef.current.focus();if(type!=="date"&&type!=="select"&&iRef.current.select)iRef.current.select();}},[editing]);
    const commit=async()=>{
      if(val===(value||"")){setEditing(false);return;}
      setFieldSaving(true);
      try{await saveField(field,val);sf(field,val);setEditing(false);}catch(e){alert("Save failed: "+e.message);}finally{setFieldSaving(false);}
    };
    const handleKey=e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setVal(value||"");setEditing(false);}};
    if(editing){
      const inputStyle={fontSize:14,padding:"6px 10px",border:"1px solid var(--ac)",borderRadius:6,outline:"none",fontFamily:mono?"'JetBrains Mono',monospace":"'DM Sans',sans-serif",width:"100%",boxSizing:"border-box"};
      return <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
        {label&&<span className="em-field-label">{label}</span>}
        <div style={{flex:1}}>
          {type==="select"?<select ref={iRef} value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={handleKey} style={inputStyle}>{options?.includes("")||<option value="">—</option>}{(options||[]).map(o=><option key={o} value={o}>{o}</option>)}</select>
          :<input ref={iRef} type={type||"text"} value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={handleKey} style={inputStyle}/>}
        </div>
        {fieldSaving&&<span className="spinner" style={{width:14,height:14,borderWidth:2}}/>}
      </div>;
    }
    const show=displayValue||value;
    return <div className="em-field" onClick={()=>setEditing(true)}>
      {label&&<span className="em-field-label">{label}</span>}
      {show?<span className={mono?"em-field-value":"em-field-value"} style={mono?{fontFamily:"'JetBrains Mono',monospace"}:{}}>{show}</span>:<span className="em-field-empty">Not set — click to edit</span>}
      {fieldSaving?<span className="spinner" style={{width:12,height:12,borderWidth:2}}/>:<span className="em-pen">✏️</span>}
    </div>;
  };
  // Paid/unpaid toggle that auto-saves
  const PaidToggle=({isPaid,target})=>{
    const togglePaid=async()=>{
      if(isPaid){
        // Switching to unpaid — clear status, paid date, and paidAmt (let reconciliation recalculate from payment records)
        setSaving(true);
        try{
          if(target==="deposit"){
            await apiPatch(`/api/orders/${encodeURIComponent(order.id)}`,{depositStatus:"unpaid",depositPaid:"",depositPaidAmt:0});
            sf("depositStatus","unpaid");sf("depositPaid","");sf("depositPaidAmt",0);
          }else{
            await apiPatch(`/api/orders/${encodeURIComponent(order.id)}`,{releaseStatus:"unpaid",releasePaid:"",releasePaidAmt:0});
            sf("releaseStatus","unpaid");sf("releasePaid","");sf("releasePaidAmt",0);
          }
          if(onRefresh)try{await onRefresh();}catch(e){}
        }catch(e){alert("Save failed: "+e.message);}finally{setSaving(false);}
      }else{
        // Switching to paid — require a note
        setMarkPaidTarget(target);
      }
    };
    return <div className="paid-toggle">
      <button className={`pt-unpaid ${!isPaid?"pt-active":""}`} onClick={()=>{if(isPaid)togglePaid();}}>Unpaid</button>
      <button className={`pt-paid ${isPaid?"pt-active":""}`} onClick={()=>{if(!isPaid)togglePaid();}}>Paid</button>
    </div>;
  };
  return <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={onClose}><div style={{background:"var(--wh)",borderRadius:"var(--r2)",maxWidth:600,width:"90%",maxHeight:"90vh",overflow:"auto",padding:24}} onClick={e=>e.stopPropagation()}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{margin:0}}>Edit Order: {ed.ref||order.ref}</h2>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        {order.driveFolderId&&<a href={GDRIVE_BASE+order.driveFolderId} target="_blank" rel="noopener" style={{fontSize:12,color:"var(--ac)",textDecoration:"none",fontWeight:600}}>📁 Drive</a>}
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--tx3)",padding:"4px 8px"}}>✕</button>
      </div>
    </div>
    <div style={{fontSize:11,color:"var(--tx3)",marginBottom:16}}>Click any field to edit — saves automatically</div>

    <div style={{display:"grid",gap:2}}>
      <EF label="Region" field="region" value={ed.region} type="select" options={ENTITIES}/>
      <EF label="PO Ref" field="ref" value={ed.ref}/>
      <EF label="Invoice" field="inv" value={ed.inv} mono/>
      <EF label="Supplier" field="supplier" value={ed.supplier} type="select" options={SUPPLIERS}/>
      <EF label="PO Date" field="poDate" value={ed.poDate} type="date" displayValue={fmtDate(ed.poDate)}/>
      <EF label="Currency" field="currency" value={ed.currency||"USD"} type="select" options={CURRENCIES}/>
    </div>

    {/* Unified payment breakdown — all linked payments with per-stage allocations */}
    {(()=>{
      const depAmt=+(ed.depositAmt)||0,relAmt=+(ed.releaseAmt)||0;
      const depPaid=+(ed.depositPaidAmt)||0,relPaid=+(ed.releasePaidAmt)||0;
      const depPct=depAmt>0?Math.min(depPaid/depAmt*100,100):0;
      const relPct=relAmt>0?Math.min(relPaid/relAmt*100,100):0;
      // Find all payments linked to this order with their deposit/release breakdown
      const linkedPmts=(payments||[]).filter(p=>(p.orderIds||[]).includes(order.id)).map(p=>{
        const a=(p.allocations||{})[order.id];
        let dep=0,rel=0;
        if(a&&typeof a==="object"&&!Array.isArray(a)){dep=+(a.deposit)||0;rel=+(a.release)||0;}
        else{const flat=+(a)||+(p.amount)||0;if(p.type==="Deposit")dep=flat;else if(p.type==="Release")rel=flat;else{dep=flat;rel=flat;}}
        return{...p,depAlloc:dep,relAlloc:rel};
      });
      const unlinkAlloc=async(p,stage)=>{
        const amt=stage==="deposit"?p.depAlloc:p.relAlloc;
        const label=stage==="deposit"?"deposit":"release";
        if(!confirm(`Remove ${(amt).toLocaleString()} ${p.currency||"USD"} ${label} allocation from payment ${p.id}?`))return;
        loading.show("Removing allocation...");
        try{
          const newAllocs={...(p.allocations||{})};
          const cur=newAllocs[order.id];
          if(cur&&typeof cur==="object"){
            const updated={...cur,[stage]:0};
            if((+(updated.deposit)||0)<=0&&(+(updated.release)||0)<=0){delete newAllocs[order.id];}
            else{newAllocs[order.id]=updated;}
          }else{delete newAllocs[order.id];}
          const remainingOids=Object.keys(newAllocs);
          const newOids=remainingOids.length>0?[...new Set([...(p.orderIds||[]).filter(id=>id!==order.id),...remainingOids])]:(p.orderIds||[]).filter(id=>id!==order.id);
          await apiPatch("/api/payments/"+encodeURIComponent(p.id),{orderIds:newOids,allocations:newAllocs});
          const paidField=stage==="deposit"?"depositPaidAmt":"releasePaidAmt";
          const curPaid=stage==="deposit"?depPaid:relPaid;
          await saveField(paidField,Math.max(0,+(curPaid-amt).toFixed(2)));
          if(onRefresh)await onRefresh();
        }catch(e){alert("Failed: "+e.message);}finally{loading.hide();}
      };
      const ProgressBar=({paid,total,pct})=>total>0?<div style={{marginBottom:6}}><div style={{height:6,background:"var(--bd)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:pct>=100?"var(--gn)":pct>0?"var(--ac)":"transparent",borderRadius:3,transition:"width .3s"}}/></div><div style={{fontSize:10,color:"var(--tx3)",marginTop:2}}>{usd(toUSD(paid,ed.currency||"USD"))} of {usd(toUSD(total,ed.currency||"USD"))} paid ({Math.round(pct)}%)</div></div>:null;
      const AllocRow=({p,stage})=>{const amt=stage==="deposit"?p.depAlloc:p.relAlloc;if(amt<=0)return null;return <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 10px",background:"var(--wh)",borderRadius:4,marginBottom:3,border:"1px solid var(--bd)",fontSize:12}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span className="mono" style={{fontWeight:700,minWidth:90}}>{(amt).toLocaleString()}</span>
          <span style={{color:"var(--tx3)",fontSize:11}}>{p.currency||"USD"}</span>
          <span style={{color:"var(--tx3)",fontSize:11}}>{fmtDate(p.date)}</span>
          <span style={{color:"var(--tx3)",fontSize:10,opacity:.7}}>{p.id}</span>
        </div>
        <button onClick={()=>unlinkAlloc(p,stage)} style={{fontSize:10,padding:"3px 10px",borderRadius:4,border:"1px solid var(--rd)",background:"#fef2f2",color:"var(--rd)",cursor:"pointer",fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>Remove</button>
      </div>;};
      return <>
      {/* Deposit */}
      <div style={{marginTop:16,padding:14,background:depIsPaid?"#f0fdf4":"var(--s2)",borderRadius:"var(--r)",border:`1px solid ${depIsPaid?"#bbf7d0":"var(--bd)"}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--tx3)"}}>Deposit</span>
            <StatusBadge status={depIsPaid?"paid":(ed.depositDue?"due":"unpaid")} dueDate={ed.depositDue}/>
          </div>
          {depAmt>0&&<PaidToggle isPaid={depIsPaid} target="deposit"/>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div><div style={{fontSize:10,color:"var(--tx3)",fontWeight:600,marginBottom:2}}>INVOICE AMOUNT</div><EF label="" field="depositAmt" value={ed.depositAmt} type="number" mono displayValue={ed.depositAmt?(+(ed.depositAmt)).toLocaleString():null}/></div>
          <div><div style={{fontSize:10,color:"var(--tx3)",fontWeight:600,marginBottom:2}}>AMOUNT PAID</div><EF label="" field="depositPaidAmt" value={ed.depositPaidAmt||"0"} type="number" mono displayValue={(depPaid).toLocaleString()}/></div>
        </div>
        <ProgressBar paid={depPaid} total={depAmt} pct={depPct}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <EF label="Due Date" field="depositDue" value={ed.depositDue} type="date" displayValue={fmtDate(ed.depositDue)}/>
          <EF label="Paid Date" field="depositPaid" value={ed.depositPaid} type="date" displayValue={fmtDate(ed.depositPaid)}/>
        </div>
        {linkedPmts.some(p=>p.depAlloc>0)&&<div style={{marginTop:10,borderTop:"1px solid var(--bd)",paddingTop:8}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--tx3)",marginBottom:6}}>PAYMENT ALLOCATIONS TO DEPOSIT</div>
          {linkedPmts.filter(p=>p.depAlloc>0).map(p=><AllocRow key={p.id} p={p} stage="deposit"/>)}
        </div>}
      </div>

      {/* Release */}
      <div style={{marginTop:10,padding:14,background:relIsPaid?"#f0fdf4":"var(--s2)",borderRadius:"var(--r)",border:`1px solid ${relIsPaid?"#bbf7d0":"var(--bd)"}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--tx3)"}}>Release</span>
            <StatusBadge status={relIsPaid?"paid":(ed.releaseDue?"due":"unpaid")} dueDate={ed.releaseDue}/>
          </div>
          {relAmt>0&&<PaidToggle isPaid={relIsPaid} target="release"/>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div><div style={{fontSize:10,color:"var(--tx3)",fontWeight:600,marginBottom:2}}>INVOICE AMOUNT</div><EF label="" field="releaseAmt" value={ed.releaseAmt} type="number" mono displayValue={ed.releaseAmt?(+(ed.releaseAmt)).toLocaleString():null}/></div>

// EditPaymentModal — edit payment type, amount, allocations, date
function EditPaymentModal({payment,orders,onSave,onClose}){
  const loading=useLoading();
  const[ed,setEd]=useState({...payment});
  const[saving,setSaving]=useState(false);
  const sf=(k,v)=>setEd(p=>({...p,[k]:v}));
  const go=id=>orders.find(o=>o.id===id);

  // Parse allocations
  const allocs=ed.allocations||{};
  const linkedOrders=(ed.orderIds||[]).map(oid=>{
    const o=go(oid);
    const a=allocs[oid];
    const depAlloc=(a&&typeof a==="object")?(+(a.deposit)||0):((ed.type==="Deposit"||ed.type==="Full Amount")?(+(a)||0):0);
    const relAlloc=(a&&typeof a==="object")?(+(a.release)||0):((ed.type==="Release"||ed.type==="Full Amount")?(+(a)||0):0);
    return{oid,order:o,ref:o?.ref||oid,region:o?.region||"",depAlloc,relAlloc};
  });

  const savePayment=async()=>{
    setSaving(true);loading.show("Saving payment...");
    try{
      // Rebuild allocations from form
      const newAllocs={};
      linkedOrders.forEach(lo=>{
        newAllocs[lo.oid]={deposit:lo.depAlloc,release:lo.relAlloc};
      });
      // Determine payment type from allocations
      const hasDep=linkedOrders.some(lo=>lo.depAlloc>0.01);
      const hasRel=linkedOrders.some(lo=>lo.relAlloc>0.01);
      const newType=hasDep&&hasRel?"Mixed":hasDep?"Deposit":"Release";
      await apiPatch(`/api/payments/${encodeURIComponent(payment.id)}`,{
        amount:+(ed.amount)||0,currency:ed.currency||"USD",
        date:ed.date||"",type:newType,
        bankAccount:ed.bankAccount||"",sourceEntity:ed.sourceEntity||"",
        allocations:newAllocs,notes:ed.notes||"",docName:ed.docName||""
      });
      await onSave();
    }catch(e){alert("Save failed: "+e.message);}finally{setSaving(false);loading.hide();}
  };

  const updateAlloc=(oid,stage,val)=>{
    const amt=+(val)||0;
    setEd(prev=>{
      const newAllocs={...(prev.allocations||{})};
      const cur=newAllocs[oid];
      if(cur&&typeof cur==="object"){
        newAllocs[oid]={...cur,[stage]:amt};
      }else{
        newAllocs[oid]={deposit:stage==="deposit"?amt:0,release:stage==="release"?amt:0};
      }
      return{...prev,allocations:newAllocs};
    });
    // Also update linkedOrders view
    const lo=linkedOrders.find(l=>l.oid===oid);
    if(lo){if(stage==="deposit")lo.depAlloc=amt;else lo.relAlloc=amt;}
  };

  const totalAlloc=linkedOrders.reduce((s,lo)=>s+lo.depAlloc+lo.relAlloc,0);
  const payAmt=+(ed.amount)||0;
  const diff=payAmt-totalAlloc;

  return <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={onClose}><div style={{background:"var(--wh)",borderRadius:"var(--r2)",maxWidth:600,width:"90%",maxHeight:"90vh",overflow:"auto",padding:24}} onClick={e=>e.stopPropagation()}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{margin:0}}>Edit Payment</h2>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--tx3)",padding:"4px 8px"}}>✕</button>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Source Entity</div><select value={ed.sourceEntity||""} onChange={e=>sf("sourceEntity",e.target.value)} className="ri">{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></div>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Bank Account</div><select value={ed.bankAccount||""} onChange={e=>sf("bankAccount",e.target.value)} className="ri">{BANKS.map(b=><option key={b.id} value={b.id}>{b.label}</option>)}</select></div>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Payment Date</div><input className="ri" type="date" value={ed.date||""} onChange={e=>sf("date",e.target.value)}/></div>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Amount</div><div style={{display:"flex",gap:8}}><input className="ri" style={{flex:1,fontFamily:"'JetBrains Mono',monospace"}} type="number" step="0.01" value={ed.amount||0} onChange={e=>sf("amount",e.target.value)}/><select value={ed.currency||"USD"} onChange={e=>sf("currency",e.target.value)} className="ri" style={{width:80}}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div></div>
    </div>

    {/* Allocations */}
    <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--tx3)",marginBottom:8}}>Allocations to POs</div>
    {linkedOrders.map(lo=>{
      const o=lo.order;
      return <div key={lo.oid} style={{padding:12,marginBottom:8,background:"var(--s2)",borderRadius:"var(--r)",border:"1px solid var(--bd)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <RegionBadge region={lo.region}/>
          <span style={{fontWeight:700,fontSize:13}}>{lo.ref}</span>
          {o&&<span style={{fontSize:11,color:"var(--tx3)"}}>{o.inv} · {o.supplier}</span>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div>
            <div style={{fontSize:11,color:"var(--tx3)",marginBottom:4}}>Deposit {o?<span className="mono" style={{fontSize:10}}>(inv: {(+(o.depositAmt)||0).toLocaleString()})</span>:""}</div>
            <input className="ri" type="number" step="0.01" value={lo.depAlloc||0} onChange={e=>updateAlloc(lo.oid,"deposit",e.target.value)} style={{width:"100%",fontFamily:"'JetBrains Mono',monospace"}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--tx3)",marginBottom:4}}>Release {o?<span className="mono" style={{fontSize:10}}>(inv: {(+(o.releaseAmt)||0).toLocaleString()})</span>:""}</div>
            <input className="ri" type="number" step="0.01" value={lo.relAlloc||0} onChange={e=>updateAlloc(lo.oid,"release",e.target.value)} style={{width:"100%",fontFamily:"'JetBrains Mono',monospace"}}/>
          </div>
        </div>
      </div>;
    })}

    {/* Allocation summary */}
    <div style={{padding:"10px 14px",marginBottom:16,background:Math.abs(diff)<0.01?"#ecfdf5":diff<0?"#fef2f2":"#eff6ff",borderRadius:"var(--r)",border:`1px solid ${Math.abs(diff)<0.01?"var(--gnbd)":diff<0?"var(--rd)":"var(--ac)"}`}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
        <span>Total Allocated: <span className="mono" style={{fontWeight:700}}>{usd(totalAlloc)}</span></span>
        <span>Payment: <span className="mono" style={{fontWeight:700}}>{usd(payAmt)}</span></span>
      </div>
      {Math.abs(diff)>0.01&&<div style={{fontSize:11,color:diff<0?"var(--rd)":"var(--am)",marginTop:4,fontWeight:600}}>{diff>0?`${usd(diff)} unallocated`:`${usd(Math.abs(diff))} over-allocated`}</div>}
    </div>

    {/* Notes */}
    <div style={{marginBottom:16}}>
      <div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Notes</div>
      <input className="ri" value={ed.notes||""} onChange={e=>sf("notes",e.target.value)} style={{width:"100%"}}/>
    </div>

    <div style={{display:"flex",gap:12,justifyContent:"flex-end"}}>
      <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={savePayment} disabled={saving}>{saving?"Saving...":"Save Changes"}</button>
    </div>
  </div></div>;
}

// ── Accounting-style line match card ──
function LineMatchCard({selectedLine,payAmt,remaining,partialAmt,setPartialAmt,onPayFull,onPayPartial,onCancel}){
  const LineBadge=({type})=><span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:type==="deposit"?"rgba(59,130,246,.15)":"rgba(16,185,129,.15)",color:type==="deposit"?"#2563eb":"#059669",letterSpacing:".04em"}}>{type==="deposit"?"DEPOSIT":"RELEASE"}</span>;
  const invoiceAmt=selectedLine.lineAmtUSD;
  const outstandingAmt=selectedLine.outstanding||invoiceAmt;
  const prevPaid=Math.max(invoiceAmt-outstandingAmt,0);
  const fullAmt=outstandingAmt;
  const applied=+(partialAmt)>0?+(partialAmt):Math.min(remaining,fullAmt);
  const afterThis=fullAmt-applied;
  const coveragePct=fullAmt>0?Math.min(applied/fullAmt,1):0;
  const isExact=Math.abs(applied-fullAmt)<0.02;
  const isOver=applied>fullAmt+0.01;
  const isPartial=applied<fullAmt-0.01&&!isOver;
  const barColor=isOver?"var(--rd)":isExact?"var(--gn)":"var(--ac)";

  return <div style={{border:`2px solid ${isOver?"var(--rd)":isExact?"var(--gnbd)":"var(--bd2)"}`,borderRadius:"var(--r2)",marginBottom:16,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",background:"var(--s2)",borderBottom:"1px solid var(--bd)"}}>
      <RegionBadge region={selectedLine.region}/><LineBadge type={selectedLine.lineType}/>
      <span style={{fontWeight:700,fontSize:14}}>{selectedLine.ref}</span>
      <span style={{fontSize:12,color:"var(--tx2)"}}>{selectedLine.inv} · {selectedLine.supplier}</span>
      <button onClick={onCancel} style={{marginLeft:"auto",background:"none",border:"none",color:"var(--tx3)",cursor:"pointer",fontSize:22,lineHeight:1,padding:"0 4px"}}>×</button>
    </div>

    <div style={{padding:"18px 20px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"2px 24px",marginBottom:14}}>
        <span style={{fontSize:11,color:"var(--tx3)",fontWeight:600,textTransform:"uppercase",letterSpacing:".04em",padding:"4px 0"}}>{selectedLine.lineType==="deposit"?"Deposit":"Release"} Invoice Total</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:15,textAlign:"right",padding:"4px 0"}}>{usd(invoiceAmt)}</span>
        {prevPaid>0.01&&<><span style={{fontSize:12,color:"var(--tx3)",padding:"4px 0"}}>Previously paid</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:"var(--gn)",fontWeight:600,textAlign:"right",padding:"4px 0"}}>{usd(prevPaid)}</span></>}
        <div style={{gridColumn:"1/-1",borderTop:"2px solid var(--bd)",margin:"4px 0"}}/>
        <span style={{fontSize:13,fontWeight:700,padding:"4px 0"}}>Outstanding Balance</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:16,color:"var(--am)",textAlign:"right",padding:"4px 0"}}>{usd(fullAmt)}</span>
      </div>

      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--tx3)",marginBottom:5}}><span style={{fontWeight:600}}>This remittance covers</span><span style={{fontWeight:700,color:barColor}}>{(coveragePct*100).toFixed(1)}%</span></div>
        <div style={{height:10,background:"var(--s3)",borderRadius:5,overflow:"hidden",marginBottom:5}}><div style={{height:"100%",width:`${Math.min(coveragePct*100,100)}%`,background:barColor,borderRadius:5,transition:"width .35s ease"}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--tx3)"}}>
          <span>Applying: <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:barColor}}>{usd(applied)}</span></span>
          {isExact&&<span style={{fontWeight:700,color:"var(--gn)"}}>✓ Full payment</span>}
          {isOver&&<span style={{fontWeight:700,color:"var(--rd)"}}>⚠ Exceeds balance by {usd(applied-fullAmt)}</span>}
          {isPartial&&<span><span style={{color:"var(--am)",fontWeight:600}}>{usd(afterThis)} remains after</span></span>}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"2px 24px",marginBottom:14,paddingTop:10,borderTop:"1px solid var(--bd)"}}>
        <span style={{fontSize:12,color:"var(--ac)",fontWeight:600,padding:"3px 0"}}>This remittance</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:14,color:"var(--ac)",textAlign:"right",padding:"3px 0"}}>{usd(applied)}</span>
        <span style={{fontSize:13,fontWeight:700,padding:"3px 0"}}>Balance after this payment</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:15,textAlign:"right",padding:"3px 0",color:isExact?"var(--gn)":isOver?"var(--rd)":"var(--am)"}}>{usd(Math.max(afterThis,0))}</span>
      </div>

      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <div style={{flex:1}}><div style={{fontSize:11,color:"var(--tx2)",marginBottom:4,fontWeight:600}}>Amount to apply from this remittance</div><input type="number" step="0.01" value={partialAmt} onChange={e=>setPartialAmt(e.target.value)} className="ri" style={{width:"100%",fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,borderColor:isOver?"var(--rd)":"var(--bd)"}} placeholder={usd(Math.min(remaining,fullAmt))}/></div>

      {isExact&&+(partialAmt)>0&&<div style={{marginTop:8,fontSize:11,fontWeight:700,background:"var(--gnb)",color:"var(--gn)",padding:"6px 10px",borderRadius:4}}>✓ This exactly covers the {selectedLine.lineType}</div>}
    </div>
  </div>;
}

// ── Allocated card with mini progress bar ──
function AllocCard({a,onRemove}){

      <div style={{display:"flex",gap:16,fontSize:12,color:"var(--tx2)",marginBottom:6}}><span>Outstanding: <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"var(--tx)"}}>{usd(outAmt)}</span></span><span>→ Applying: <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:barColor}}>{usd(a.amount)}</span></span>{isPartial?<span>→ Remaining: <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"var(--am)"}}>{usd(outAmt-a.amount)}</span></span>:<span style={{color:"var(--gn)",fontWeight:600}}>→ Fully covered ✓</span>}</div>
      <div style={{height:6,background:"var(--s3)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(coverPct*100,100)}%`,background:barColor,borderRadius:3}}/></div>
    </div>
  </div>;
