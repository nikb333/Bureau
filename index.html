// RemittanceAllocationUI — allocation is always against deposit OR release, never total
function RemittanceAllocationUI({parsed,ed,setEd,onConfirm,onCancel,cancelLabel,fileName,orders,payments}){
  const sf=(k,v)=>setEd(p=>({...p,[k]:v}));
  const[allocs,setAllocs]=useState([]);const[search,setSearch]=useState("");
  const[expandedPartial,setExpandedPartial]=useState(null);const[partialAmt,setPartialAmt]=useState("");
  const payAmt=+(ed.amount)||0;
  const allocTotal=allocs.reduce((s,a)=>s+a.amount,0);const remaining=payAmt-allocTotal;
  const allocPct=payAmt>0?Math.min(allocTotal/payAmt,1):0;

  // Expand orders into deposit/release lines — include paid lines so user can re-allocate
  const lines=useMemo(()=>expandOrdersToLines(orders,true),[orders]);

  // Group lines by PO for display — only show POs with unpaid lines not already allocated
  const allocatedLineIds=useMemo(()=>new Set(allocs.map(a=>a.lineId)),[allocs]);
  const groupedResults=useMemo(()=>{
    let filtered=lines.filter(l=>!allocatedLineIds.has(l.lineId));
    if(search.trim()){
      const scored=fuzzyMatchLines(search,filtered);
      // Get unique order IDs from scored results, preserving score order
      const seen=new Set();const orderedIds=[];
      scored.forEach(s=>{if(!seen.has(s.id)){seen.add(s.id);orderedIds.push(s.id);}});
      // Group: for each matched order, include all its unpaid lines
      return orderedIds.slice(0,12).map(oid=>{
        const oLines=filtered.filter(l=>l.id===oid);
        return{id:oid,ref:oLines[0]?.ref,inv:oLines[0]?.inv,supplier:oLines[0]?.supplier,region:oLines[0]?.region,lines:oLines};
      }).filter(g=>g.lines.length>0);
    }
    return [];
  },[search,lines,allocatedLineIds]);

  const buildAlloc=(l,amt)=>({orderId:l.id,lineId:l.lineId,lineType:l.lineType,ref:l.ref,supplier:l.supplier,inv:l.inv,region:l.region,lineAmtUSD:l.lineAmtUSD,outstanding:l.outstanding||l.lineAmtUSD,amount:amt,order:l});

  const quickPayFull=l=>{
    const out=l.isPaid?l.lineAmtUSD:(l.outstanding||l.lineAmtUSD);
    const amt=Math.min(remaining,out);
    if(amt<0.01)return;
    setAllocs(p=>[...p,buildAlloc(l,amt)]);setExpandedPartial(null);setPartialAmt("");
  };
  const applyPartial=l=>{
    const amt=+(partialAmt)||0;const out=l.isPaid?l.lineAmtUSD:(l.outstanding||l.lineAmtUSD);
    if(amt<=0){alert("Enter a valid amount");return;}
    if(amt>out+0.01){alert(`Amount exceeds ${l.isPaid?"invoice":"outstanding"} balance of ${usd(out)}`);return;}
    if(amt>remaining+0.01){alert(`Amount exceeds remaining payment of ${usd(remaining)}`);return;}
    setAllocs(p=>[...p,buildAlloc(l,amt)]);setExpandedPartial(null);setPartialAmt("");
  };
  const rmAlloc=lid=>setAllocs(p=>p.filter(a=>a.lineId!==lid));

  // Auto-match on load
  useEffect(()=>{
    const autoRef=ed?.po_references?.[0]||ed?.reference||"";
    if(autoRef&&lines.length>0&&allocs.length===0){setSearch(autoRef);}
  },[lines]);

  const handleConfirm=()=>{
    if(allocs.length===0){alert("Please allocate payment to at least one PO");return;}
    if(Math.abs(remaining)>0.01){alert(`Must allocate exact payment amount.\nRemaining: ${usd(remaining)}\n\n${remaining>0?"Add more POs or adjust amounts":"Remove allocations or reduce amounts"}`);return;}
    // Pass merged ed data directly to onConfirm — React state updates are async
    // so reading item.ed in confirmCurrent would miss _allocations if we only used setEd
    const mergedEd={...ed,_allocations:allocs};
    setEd(p=>({...p,_allocations:allocs}));
    onConfirm(mergedEd);
  };

  const LineBadge=({type})=><span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:type==="deposit"?"rgba(59,130,246,.15)":"rgba(16,185,129,.15)",color:type==="deposit"?"#2563eb":"#059669",letterSpacing:".04em"}}>{type==="deposit"?"DEPOSIT":"RELEASE"}</span>;

  return <div className="rc">
    <div className="rc-h"><div><div className="rc-t">Allocate Remittance</div><div className="rc-f">{fileName}</div></div><div style={{fontSize:13,color:"var(--tx2)"}}>Payment: <span className="mono" style={{fontWeight:700,color:"var(--tx)"}}>{usd(payAmt)}</span></div></div>

    <div className="rs-t">Payment Details</div>
    <div style={{padding:"0 22px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Source Entity</div><select value={ed.source_entity||""} onChange={e=>sf("source_entity",e.target.value)} className="ri"><option value="">Select...</option>{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></div>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Bank Account</div><select value={ed.bank_account_hint||""} onChange={e=>sf("bank_account_hint",e.target.value)} className="ri"><option value="">Auto...</option>{BANKS.map(b=><option key={b.id} value={b.hint}>{b.label}</option>)}</select></div>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Payment Date</div><input className="ri" type="date" value={ed.payment_date||""} onChange={e=>sf("payment_date",e.target.value)}/></div>
      <div><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Amount</div><div style={{display:"flex",gap:8}}><input className="ri" style={{flex:1,fontFamily:"'JetBrains Mono',monospace"}} type="number" step="0.01" value={ed.amount||0} onChange={e=>sf("amount",e.target.value)}/><select value={ed.currency||"USD"} onChange={e=>sf("currency",e.target.value)} className="ri" style={{width:90}}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div></div>
    </div>

    {/* Remaining to allocate banner */}
    <div style={{margin:"0 22px 16px",padding:"14px 18px",background:Math.abs(remaining)<0.01?"linear-gradient(135deg,#ecfdf5,#d1fae5)":remaining<0?"linear-gradient(135deg,#fef2f2,#fee)":"linear-gradient(135deg,#eff6ff,#dbeafe)",border:`1px solid ${Math.abs(remaining)<0.01?"var(--gnbd)":remaining<0?"var(--rd)":"var(--ac)"}`,borderRadius:"var(--r2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:Math.abs(remaining)<0.01?"var(--gn)":"var(--tx2)"}}>{Math.abs(remaining)<0.01?"Fully Allocated":"Remaining to Allocate"}</span>
        <span className="mono" style={{fontSize:20,fontWeight:800,color:Math.abs(remaining)<0.01?"var(--gn)":remaining<0?"var(--rd)":"var(--ac)"}}>{usd(remaining)}</span>
      </div>
      <div style={{height:8,background:"rgba(0,0,0,.08)",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(allocPct*100,100)}%`,background:Math.abs(remaining)<0.01?"var(--gn)":"var(--ac)",borderRadius:4,transition:"width .3s ease"}}/></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--tx3)",marginTop:6}}><span>Allocated: <span className="mono" style={{fontWeight:700}}>{usd(allocTotal)}</span></span><span>{(allocPct*100).toFixed(0)}% of {usd(payAmt)}</span></div>
    </div>

    {/* Allocated items */}
    {allocs.length>0&&<div style={{padding:"0 22px 16px"}}>
      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--tx3)",marginBottom:8}}>Allocated ({allocs.length})</div>
      {allocs.map(a=><AllocCard key={a.lineId} a={a} onRemove={()=>rmAlloc(a.lineId)}/>)}
    </div>}

    {/* Search & select POs */}
    <div className="rs-t">Find & Allocate Purchase Orders</div>
    <div style={{padding:"0 22px 16px"}}>
      <input className="ri" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search PO ref, invoice #, supplier..." style={{width:"100%",marginBottom:12,fontSize:14}}/>

      {search.trim()&&groupedResults.length>0&&<div style={{border:"1px solid var(--bd)",borderRadius:"var(--r2)",overflow:"hidden",maxHeight:400,overflowY:"auto"}}>
        {groupedResults.map((g,gi)=><div key={g.id} style={{borderBottom:gi<groupedResults.length-1?"1px solid var(--bd)":"none"}}>
          {/* PO header */}
          <div style={{padding:"10px 14px",background:"var(--s2)",display:"flex",alignItems:"center",gap:8}}>
            <RegionBadge region={g.region}/>
            <span style={{fontWeight:700,fontSize:13}}>{g.ref}</span>
            <span style={{fontSize:11,color:"var(--tx3)"}}>{g.inv}</span>
            <span style={{fontSize:11,color:"var(--tx3)"}}>· {g.supplier}</span>
          </div>
          {/* Lines for this PO (unpaid + paid) */}
          {g.lines.map(l=>{
            const out=l.isPaid?l.lineAmtUSD:(l.outstanding||l.lineAmtUSD);
            const canPayFull=remaining>=0.01;
            const fullAmt=Math.min(remaining,l.isPaid?l.lineAmtUSD:out);
            const isExpanded=expandedPartial===l.lineId;
            return <div key={l.lineId} style={{padding:"10px 14px 10px 28px",borderTop:"1px solid var(--s3)",opacity:l.isPaid?.85:1}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <LineBadge type={l.lineType}/>
                {l.isPaid?<><span className="badge badge-green" style={{fontSize:10}}>paid</span><span className="mono" style={{fontWeight:700,fontSize:14,color:"var(--tx2)"}}>{usd(l.lineAmtUSD)}</span></>
                :<><span style={{fontSize:12,color:"var(--tx2)"}}>Outstanding:</span><span className="mono" style={{fontWeight:700,fontSize:14,color:"var(--am)"}}>{usd(out)}</span></>}
                <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                  {canPayFull&&<button onClick={()=>quickPayFull(l)} style={{fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:6,border:"none",cursor:"pointer",background:l.isPaid?"var(--ac)":"var(--gn)",color:"#fff",fontFamily:"'DM Sans',sans-serif"}}>{l.isPaid?"Allocate":"Pay Full"} {usd(fullAmt)}</button>}
                  <button onClick={()=>{if(isExpanded){setExpandedPartial(null);setPartialAmt("");}else{setExpandedPartial(l.lineId);setPartialAmt("");}}} style={{fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:6,border:"1px solid var(--ac)",cursor:"pointer",background:isExpanded?"var(--acl)":"transparent",color:"var(--ac)",fontFamily:"'DM Sans',sans-serif"}}>{isExpanded?"Cancel":"Partial"}</button>
                </div>
              </div>
              {isExpanded&&<div style={{marginTop:10,display:"flex",gap:8,alignItems:"flex-end"}}>
                <div style={{flex:1}}><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4,fontWeight:600}}>Amount to allocate (max {usd(Math.min(remaining,l.isPaid?l.lineAmtUSD:out))})</div><input type="number" step="0.01" value={partialAmt} onChange={e=>setPartialAmt(e.target.value)} className="ri" style={{width:"100%",fontFamily:"'JetBrains Mono',monospace",fontWeight:700}} placeholder="0.00" autoFocus/></div>
                <button onClick={()=>applyPartial(l)} className="btn btn-primary" style={{padding:"9px 16px",fontSize:12}} disabled={!(+(partialAmt)>0)}>Apply</button>
              </div>}
            </div>;
          })}
        </div>)}
      </div>}

      {search.trim()&&groupedResults.length===0&&<div style={{textAlign:"center",padding:20,color:"var(--tx3)",fontSize:13}}>No matching POs found</div>}
      {!search.trim()&&allocs.length===0&&<div style={{textAlign:"center",padding:32,color:"var(--tx3)",background:"var(--s2)",borderRadius:"var(--r)",border:"1px dashed var(--bd2)"}}>Search for a PO reference to start allocating this remittance</div>}
    </div>

    {/* Footer */}
    <div style={{padding:"16px 22px",background:Math.abs(remaining)>0.01?"linear-gradient(135deg,#fef2f2,#fee)":"var(--s2)",borderTop:Math.abs(remaining)>0.01?"2px solid var(--rd)":"1px solid var(--bd)"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:6}}><span style={{fontWeight:600}}>Total Allocated:</span><span className="mono" style={{fontWeight:700}}>{usd(allocTotal)}</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:14}}><span style={{fontWeight:600}}>Remaining:</span><span className="mono" style={{fontWeight:700,color:Math.abs(remaining)<0.01?"var(--gn)":"var(--rd)"}}>{usd(remaining)}</span></div>
      {Math.abs(remaining)>0.01&&remaining>0&&<div style={{fontSize:11,color:"var(--rd)",marginTop:6,fontWeight:600}}>Must allocate full payment amount to confirm</div>}
    </div>

    <div className="rc-act"><button className="btn btn-ghost" onClick={onCancel}>{cancelLabel||"Cancel"}</button><button className="btn btn-primary" onClick={handleConfirm} disabled={allocs.length===0||Math.abs(remaining)>0.01}>Confirm & Save</button></div>
  </div>;
}

// ReviewScreen
function ReviewScreen({parsed,ed,setEd,docType,onChangeDocType,onConfirm,onCancel,cancelLabel,fileName,orders,payments}){
  const sf=(k,v)=>setEd(p=>({...p,[k]:v}));const cd=parsed?.confidence_details||{};const oc=parsed?.confidence||"medium";
  const switchDocType=newType=>{
    if(newType===docType)return;
    // Remap fields between doc types
    const d={...ed};
    if(newType==="purchase_order"){
      // Map from invoice/remittance fields into PO fields
      // No total_value — only deposit and release amounts matter
      if(!d.po_reference&&d.reference)d.po_reference=d.reference;
      if(!d.po_reference&&d.po_references?.[0])d.po_reference=d.po_references[0];
      if(!d.po_date&&d.payment_date)d.po_date=d.payment_date;
      if(!d.po_date&&d.invoice_date)d.po_date=d.invoice_date;
      if(d.po_date&&!d.deposit_due){d.deposit_due=d.po_date;const rd=new Date(d.po_date);rd.setDate(rd.getDate()+21);d.release_due=rd.toISOString().slice(0,10);}
      if(!d.destination_region&&d.source_entity)d.destination_region=d.source_entity;
    }else if(newType==="remittance"){
      // Never auto-fill amount from total_value — remittances pay deposit OR release, not total
      if(!d.payment_date&&d.po_date)d.payment_date=d.po_date;
      if(!d.po_references){const ref=d.po_reference||"";d.po_references=[ref];}
      if(!d.source_entity&&d.destination_region)d.source_entity=d.destination_region;
    }else{
      if(!d.total_amount&&d.total_value)d.total_amount=d.total_value;
      if(!d.total_amount&&d.amount)d.total_amount=d.amount;
      if(!d.po_reference&&d.po_references?.[0])d.po_reference=d.po_references[0];
    }
    setEd(d);
    if(onChangeDocType)onChangeDocType(newType);
  };
  const[multiPO,setMultiPO]=useState(false);const[allocs,setAllocs]=useState([]);
  const addAlloc=o=>{if(allocs.find(a=>a.orderId===o.id))return;setAllocs(p=>[...p,{orderId:o.id,ref:o.ref,amount:0}]);};
  const rmAlloc=oid=>setAllocs(p=>p.filter(a=>a.orderId!==oid));
  const setAllocAmt=(oid,amt)=>setAllocs(p=>p.map(a=>a.orderId===oid?{...a,amount:+(amt)||0}:a));
  const allocTotal=allocs.reduce((s,a)=>s+a.amount,0);const allocRemain=(+(ed?.amount)||0)-allocTotal;
  const[multiSearch,setMultiSearch]=useState("");const[showSearch,setShowSearch]=useState(false);
  const multiMatches=useMemo(()=>multiSearch.trim()?fuzzyMatchPO(multiSearch,orders,payments):[],[multiSearch,orders,payments]);
  const Row=({label,field,conf,children,attn,attnLabel})=>{const c=conf||cd[field]||oc;const cls="rr"+(attn==="dest"?" rr-attn rr-attn-dest":attn?" rr-attn":"");return <div className={cls}><div className="rr-s">{attn?<div style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>👁</div>:<ConfIcon level={c}/>}</div><div className="rr-l">{label}{attnLabel&&<span className="attn-label" style={{background:attn==="dest"?"var(--rdb)":"var(--amb)",color:attn==="dest"?"var(--rd)":"var(--am)"}}>{attnLabel}</span>}</div><div className="rr-i">{children}</div></div>;};
  const refInput=ed?.po_references?.[0]||ed?.reference||ed?.po_reference||"";
  const matches=useMemo(()=>(docType==="remittance"||docType==="commercial_invoice"||docType==="freight_invoice")?fuzzyMatchPO(refInput,orders,payments):[],[refInput,orders,payments,docType]);
  const handleConfirm=()=>{if(multiPO&&allocs.length>0){const merged={...ed,_multiAllocs:allocs};setEd(p=>({...p,_multiAllocs:allocs}));onConfirm(merged);}else onConfirm();};

  return <div className="rc">
    <div className="rc-h"><div><div className="rc-t">Review Extracted Data</div><div className="rc-f">{fileName}</div></div><div className={`rc-c rc-c-${oc}`}>{oc==="high"?"✓ High Confidence":oc==="medium"?"? Check Fields":"⚠ Needs Review"}</div></div>
    <div className="rs-t">Document Type</div>
    <div className="rr"><div className="rr-s"><ConfIcon level="high"/></div><div className="rr-l">Type</div><div className="rr-i">{onChangeDocType?<select value={docType} onChange={e=>switchDocType(e.target.value)} className="ri">{DOC_TYPES.map(d=><option key={d.id} value={d.id}>{d.icon} {d.label}</option>)}</select>:<span className="badge badge-blue">{DOC_TYPES.find(d=>d.id===docType)?.icon} {DOC_TYPES.find(d=>d.id===docType)?.label}</span>}</div></div>

    {(docType==="purchase_order"||docType==="commercial_invoice")&&<>
      <div className="rs-t">Order Details</div>
      <Row label="Supplier" field="supplier"><StaticVal value={ed.supplier} displayValue={ed.supplier||""}><select value={ed.supplier||""} onChange={e=>sf("supplier",e.target.value)} className="ri"><option value="">Select...</option>{SUPPLIERS.map(s=><option key={s}>{s}</option>)}</select></StaticVal></Row>
      <Row label="PO Reference" field="po_reference"><StaticVal value={ed.po_reference}><input className="ri" value={ed.po_reference||""} onChange={e=>sf("po_reference",e.target.value)} placeholder="PO-215"/></StaticVal></Row>
      <Row label="Invoice #" field="invoice_number"><StaticVal value={ed.invoice_number}><input className="ri" value={ed.invoice_number||""} onChange={e=>sf("invoice_number",e.target.value)}/></StaticVal></Row>
      <Row label="PO Date" field="po_date"><StaticVal value={ed.po_date} displayValue={ed.po_date?fmtDate(ed.po_date):""}><input className="ri" type="date" value={ed.po_date||""} onChange={e=>{const v=e.target.value;sf("po_date",v);if(v){sf("deposit_due",v);const rd=new Date(v);rd.setDate(rd.getDate()+21);sf("release_due",rd.toISOString().slice(0,10));}}}/></StaticVal></Row>
      <Row label="Destination" field="destination_region" attn="dest" attnLabel="Verify"><select value={ed.destination_region||""} onChange={e=>sf("destination_region",e.target.value)} className="ri" style={{borderColor:"var(--rd)",background:"#fff"}}><option value="">Select...</option>{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></Row>
      <div className="rs-t">Financials</div>
      <Row label="Currency" field="currency"><StaticVal value={ed.currency||"USD"}><select value={ed.currency||"USD"} onChange={e=>sf("currency",e.target.value)} className="ri ri-sm">{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></StaticVal></Row>
      <Row label="Deposit" field="deposit_amount"><StaticVal value={ed.deposit_amount} displayValue={+(ed.deposit_amount)>0?usd(+(ed.deposit_amount)):"$0.00"} mono><input className="ri ri-n" type="number" step="0.01" value={ed.deposit_amount||0} onChange={e=>sf("deposit_amount",e.target.value)} placeholder="0 if single-payment PO"/></StaticVal></Row>
      <Row label="Deposit Due" conf={ed.deposit_due?"high":"low"} attn attnLabel="Check"><input className="ri" type="date" value={ed.deposit_due||""} onChange={e=>sf("deposit_due",e.target.value)} style={{borderColor:"var(--am)"}}/></Row>
      <Row label="Release" field="release_amount" conf="high"><StaticVal value={ed.release_amount} displayValue={+(ed.release_amount)>0?usd(+(ed.release_amount)):"$0.00"} mono><input className="ri ri-n" type="number" step="0.01" value={ed.release_amount||0} onChange={e=>sf("release_amount",e.target.value)}/></StaticVal></Row>
      <Row label="Release Due" attn attnLabel="Estimate"><div style={{display:"flex",gap:8,alignItems:"center"}}><input className="ri" type="date" value={ed.release_due||""} onChange={e=>sf("release_due",e.target.value)} style={{flex:1,borderColor:"var(--am)"}}/>{ed.release_due&&ed.po_date&&<span style={{fontSize:10,color:"var(--am)",fontWeight:600,whiteSpace:"nowrap"}}>+3 wks</span>}</div></Row>
      <Row label="Notes" attn attnLabel="Optional"><input className="ri" value={ed.notes||""} onChange={e=>sf("notes",e.target.value)} placeholder="e.g. supplier name" style={{borderColor:"var(--am)"}}/></Row>
    </>}

    {docType==="remittance"&&<>
      <div className="rs-t">Payment Source</div>
      <Row label="Bank Account" field="bank_account_hint"><select value={ed.bank_account_hint||""} onChange={e=>sf("bank_account_hint",e.target.value)} className="ri"><option value="">Auto-detect...</option>{BANKS.map(b=><option key={b.id} value={b.hint}>{b.label}</option>)}</select></Row>
      <Row label="Paying Entity" field="source_entity"><select value={ed.source_entity||""} onChange={e=>sf("source_entity",e.target.value)} className="ri"><option value="">Select...</option>{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></Row>
      <div className="rs-t">Payment Details</div>
      <Row label="Amount" field="amount"><div className="ri-g"><input className="ri ri-n" type="number" step="0.01" value={ed.amount||0} onChange={e=>sf("amount",e.target.value)}/><select value={ed.currency||"USD"} onChange={e=>sf("currency",e.target.value)} className="ri ri-sm">{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div></Row>
      <Row label="Payment Date" field="payment_date"><input className="ri" type="date" value={ed.payment_date||""} onChange={e=>sf("payment_date",e.target.value)}/></Row>
      <Row label="Type" conf="high"><select value={ed.payment_type||"Deposit"} onChange={e=>sf("payment_type",e.target.value)} className="ri">{PAYMENT_TYPES.map(t=><option key={t}>{t}</option>)}</select></Row>
      {(()=>{const payAmt=+(ed.amount)||0;const bestMatch=matches.length>0&&matches[0].score>=75?matches[0]:null;if(!bestMatch||payAmt<100)return null;const depMatch=bestMatch.depUnpaid&&bestMatch.depAmtUSD>0.01&&Math.abs(payAmt-bestMatch.depAmtUSD)/bestMatch.depAmtUSD<0.15;const relMatch=bestMatch.relUnpaid&&bestMatch.relAmtUSD>0.01&&Math.abs(payAmt-bestMatch.relAmtUSD)/bestMatch.relAmtUSD<0.15;if(depMatch||relMatch){return <div style={{margin:"6px 22px 10px 66px",padding:"10px 14px",background:"linear-gradient(135deg,#eff4ff,#e0eaff)",border:"1px solid var(--ac)",borderRadius:"var(--r)",fontSize:12,color:"var(--ac)",fontWeight:600}}><span style={{marginRight:6}}>💡</span>{depMatch&&`Suggestion: Select "Deposit" — amount matches ${usd(bestMatch.depAmtUSD)}`}{!depMatch&&relMatch&&`Suggestion: Select "Release" — amount matches ${usd(bestMatch.relAmtUSD)}`}</div>;}return null;})()}
      <div className="rs-t">Match to Purchase Order</div>
      <Row label="PO Reference" field="po_references"><input className="ri" value={refInput} onChange={e=>sf("po_references",[e.target.value])} placeholder="Type PO# to search..."/></Row>
      {refInput.trim()&&matches.length>0&&<div className="mr">{matches.map(m=>{const payAmt=+(ed.amount)||0;const depClose=m.depUnpaid&&m.depAmtUSD>0.01&&payAmt>0&&Math.abs(payAmt-m.depAmtUSD)/m.depAmtUSD<0.15;const relClose=m.relUnpaid&&m.relAmtUSD>0.01&&payAmt>0&&Math.abs(payAmt-m.relAmtUSD)/m.relAmtUSD<0.15;return <div key={m.id} className={`mr-row ${m.score>=85?"mr-best":""}`} onClick={()=>sf("po_references",[m.ref])}><div className="mr-sw">{m.score>=85?<span className="ci ci-h">✓</span>:<span className="ci ci-m">⚠</span>}</div><div className="mr-info"><div className="mr-ref">{m.ref}</div><div className="mr-det">{m.inv} · {m.supplier} · <RegionBadge region={m.region}/></div><div style={{fontSize:10,color:"var(--tx3)",marginTop:3}}>{m.depUnpaid&&m.depAmtUSD>0.01&&<span style={{color:depClose?"var(--gn)":"var(--am)",fontWeight:600}}>Deposit {usd(m.depAmtUSD)}{depClose?" ✓":""}</span>}{m.depUnpaid&&m.depAmtUSD>0.01&&m.relUnpaid&&m.relAmtUSD>0.01&&" · "}{m.relUnpaid&&m.relAmtUSD>0.01&&<span style={{color:relClose?"var(--gn)":"var(--am)",fontWeight:600}}>Release {usd(m.relAmtUSD)}{relClose?" ✓":""}</span>}{!m.depUnpaid&&!m.relUnpaid&&<span style={{color:"var(--gn)"}}>Fully paid</span>}</div></div><div className="mr-amt">{m.hasBalance?<div className="mr-out" style={{fontWeight:700,fontSize:13}}>Owed: {usd(m.outstanding)}</div>:<div className="mr-fp">Fully paid</div>}</div><div className="mr-pct">{m.score}%</div></div>})}</div>}
      <Row label="Notes" conf="high"><input className="ri" value={ed.notes||""} onChange={e=>sf("notes",e.target.value)} placeholder="Optional"/></Row>
    </>}

    {docType==="freight_invoice"&&<>
      <div className="rs-t">Invoice Details</div>
      <Row label="Invoice #" field="invoice_number"><input className="ri" value={ed.invoice_number||""} onChange={e=>sf("invoice_number",e.target.value)}/></Row>
      <Row label="PO Reference" field="po_reference"><input className="ri" value={ed.po_reference||""} onChange={e=>sf("po_reference",e.target.value)}/></Row>
      <Row label="Amount" field="total_amount"><div className="ri-g"><input className="ri ri-n" type="number" step="0.01" value={ed.total_amount||0} onChange={e=>sf("total_amount",e.target.value)}/><select value={ed.currency||"USD"} onChange={e=>sf("currency",e.target.value)} className="ri ri-sm">{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div></Row>
      <Row label="Region" field="destination_region"><select value={ed.destination_region||""} onChange={e=>sf("destination_region",e.target.value)} className="ri"><option value="">Select...</option>{ENTITIES.map(e=><option key={e}>{e}</option>)}</select></Row>
      <Row label="Notes" conf="high"><input className="ri" value={ed.notes||""} onChange={e=>sf("notes",e.target.value)}/></Row>
    </>}
    <div className="rc-act"><button className="btn btn-ghost" onClick={onCancel}>{cancelLabel||"Cancel"}</button><button className="btn btn-primary" onClick={handleConfirm}>✓ Confirm & Save</button></div>
  </div>;
}

// InlineUploader — supports multi-file upload with parallel parsing + sequential review
function InlineUploader({orders,setOrders,payments,setPayments,defaultDocType,onRefresh}){
  const loading=useLoading();
  // Queue: [{file, status:"parsing"|"ready"|"reviewing"|"saving"|"done"|"error", parsed, ed, docType, error}]
  const[queue,setQueue]=useState([]);
  const[activeIdx,setActiveIdx]=useState(-1); // which item is being reviewed
  const[st,setSt]=useState("idle"); // "idle"|"processing"|"review"|"done"
  const[error,setError]=useState(null);
  const[lastRemittance,setLastRemittance]=useState(null); // stores data for email confirmation
  const empty=dt=>(dt==="purchase_order"||dt==="commercial_invoice")?{doc_type:dt,supplier:"",po_reference:"",invoice_number:"",po_date:"",destination_region:"",currency:"USD",deposit_amount:0,release_amount:0,notes:"",confidence:"low"}:dt==="remittance"?{doc_type:"remittance",bank_account_hint:"",source_entity:"",payment_date:"",amount:0,currency:"USD",po_references:[""],payment_type:"Deposit",reference:"",notes:"",confidence:"low"}:{doc_type:dt||"freight_invoice",supplier:"",invoice_number:"",po_reference:"",destination_region:"",currency:"USD",total_amount:0,notes:"",confidence:"low"};

  // Extract short PO number from long reference strings
  // e.g. "HABU20260227HA211" → "PO-211", "GB-241" → "PO-241", "BUR-005" → "PO-005"
  const extractShortRef=(ref)=>{
    if(!ref)return ref;
    if(/^PO-\d+$/i.test(ref))return ref; // already short format
    // Try to find the last occurrence of a letter prefix + digits pattern
    const m=ref.match(/(?:HA|GB|US|CA|AU|BUR|E)[\s-]?(\d{2,5})\s*$/i);
    if(m)return "PO-"+m[1];
    // Fallback: extract trailing digits if there's a reasonable number
    const dm=ref.match(/(\d{2,5})\s*$/);
    if(dm&&ref.length>6)return "PO-"+dm[1];
    return ref;
  };

  const prepareEdData=(r,dt)=>{
    const edData={...r};
    if((dt==="purchase_order"||dt==="commercial_invoice")&&(r.po_date||r.invoice_date)&&!r.deposit_due){
      const d=r.po_date||r.invoice_date;if(!edData.po_date)edData.po_date=d;edData.deposit_due=d;
      const rd=new Date(d);rd.setDate(rd.getDate()+21);edData.release_due=rd.toISOString().slice(0,10);
    }
    const matchedSupplier=SUPPLIERS.find(s=>s.toLowerCase()===(r.supplier||"").toLowerCase())||"";
    if(matchedSupplier)edData.supplier=matchedSupplier;
    if(r.doc_type!=="remittance")edData.notes=matchedSupplier||r.supplier||"";
    // Ensure short PO ref + full string in invoice
    if(dt==="purchase_order"||dt==="commercial_invoice"){
      const rawRef=r.po_reference||"";
      const shortRef=extractShortRef(rawRef);
      if(shortRef!==rawRef){
        edData.po_reference=shortRef;
        if(!edData.invoice_number)edData.invoice_number=rawRef;
      }
    }
    return edData;
  };

  const handleFiles=async files=>{
    if(!files.length)return;
    setError(null);
    const items=Array.from(files).map(f=>({file:f,status:"parsing",parsed:null,ed:null,docType:defaultDocType,error:null}));
    setQueue(items);
    setSt("processing");
    // Parse all files in parallel
    const results=await Promise.allSettled(items.map(async(item)=>{
      const r=await parseDoc(item.file);
      return r;
    }));
    const updated=items.map((item,i)=>{
      if(results[i].status==="fulfilled"){
        const r=results[i].value;
        const dt=r.doc_type||defaultDocType;
        return{...item,status:"ready",parsed:r,docType:dt,ed:prepareEdData(r,dt)};
      }else{
        return{...item,status:"ready",parsed:null,docType:defaultDocType,ed:empty(defaultDocType),error:"Parse failed: "+results[i].reason?.message};
      }
    });
    setQueue(updated);
    // Start reviewing first item
    setActiveIdx(0);
    setSt("review");
  };

  const confirmCurrent=async(edOverride)=>{
    const item=queue[activeIdx];
    if(!item)return;
    const dt=item.docType,d=edOverride||item.ed,file=item.file;
    // Update queue status
    setQueue(q=>q.map((x,i)=>i===activeIdx?{...x,status:"saving"}:x));
    loading.show("Saving "+file.name+"...");
    try{
      if(dt==="purchase_order"||dt==="commercial_invoice"){
        const orderPromise=apiPost("/api/orders",{region:d.destination_region||"US",ref:d.po_reference||"",inv:d.invoice_number||"",supplier:d.supplier||"",currency:d.currency||"USD",depositAmt:+(d.deposit_amount)||0,depositStatus:+(d.deposit_amount)>0?"due":"paid",depositDue:d.deposit_due||"",releaseAmt:+(d.release_amount)||0,releaseStatus:"unpaid",releaseDue:d.release_due||"",poDate:d.po_date||"",notes:d.notes||""});
        // Start upload in parallel with save
        const uploadPromise=file&&d.po_reference?apiUploadFile(file,d.po_reference,{docType:dt,docDate:d.po_date||new Date().toISOString().slice(0,10),entity:d.destination_region||""}).catch(()=>null):Promise.resolve(null);
        await Promise.all([orderPromise,uploadPromise]);
      }
      else if(dt==="remittance"){
        const bm={"AU-NAB":"au-nab","UK-HSBC":"uk-hsbc","US-Chase":"us-chase","CA-RBC":"ca-rbc"};
        const allocs=d._allocations||[];
        const orderIds=[...new Set(allocs.map(a=>a.orderId))];
        const allocations={};
        allocs.forEach(a=>{if(!allocations[a.orderId])allocations[a.orderId]={deposit:0,release:0};allocations[a.orderId][a.lineType||"release"]+=a.amount;});
        const lineTypes=[...new Set(allocs.map(a=>a.lineType).filter(Boolean))];
        const paymentType=lineTypes.length>1?"Mixed":lineTypes[0]==="deposit"?"Deposit":"Release";
        const pmtResult=await apiPost("/api/payments",{orderIds,allocations,bankAccount:bm[d.bank_account_hint]||"us-chase",sourceEntity:d.source_entity||"US",amount:+(d.amount)||0,currency:d.currency||"USD",date:d.payment_date||new Date().toISOString().slice(0,10),type:paymentType,notes:d.notes||"",docName:file?.name});
        if(pmtResult?.warnings?.length>0){alert("Payment saved but some order updates failed:\n"+pmtResult.warnings.map(w=>`${w.oid}: ${w.error}`).join("\n"));}
        if(file&&allocs.length>0){
          const uploadMeta={docType:"remittance",docDate:d.payment_date||new Date().toISOString().slice(0,10),entity:d.source_entity||"",bankLabel:d.bank_account_hint||""};
          // Upload remittance to each unique PO folder — use driveFolderId from order data when available
          const seen=new Set();const uploads=[];
          allocs.forEach(a=>{if(!seen.has(a.orderId)){seen.add(a.orderId);const o=orders.find(x=>x.id===a.orderId);uploads.push({ref:a.ref,folderId:o?.driveFolderId||""});}});
          const uploadResults=await Promise.all(uploads.map(u=>apiUploadFile(file,u.ref,{...uploadMeta,folderId:u.folderId}).catch(e=>({error:true,ref:u.ref,msg:e.message}))));
          const failedUploads=uploadResults.filter(r=>r?.error);
          if(failedUploads.length>0){alert("Some remittance uploads failed:\n"+failedUploads.map(f=>`${f.ref}: ${f.msg}`).join("\n"));}
        }
        // Store remittance details for email confirmation
        const poRefs=[...new Set(allocs.map(a=>a.ref))];
        const supplierNames=[...new Set(allocs.map(a=>a.supplier).filter(Boolean))];
        setLastRemittance({poRefs,amount:+(d.amount)||0,currency:d.currency||"USD",paymentDate:d.payment_date||"",reference:d.reference||"",supplier:supplierNames.join(", ")});
      }
      else{if(file&&d.po_reference)try{await apiUploadFile(file,d.po_reference,{docType:dt||"freight_invoice",docDate:d.invoice_date||d.po_date||new Date().toISOString().slice(0,10)});}catch(e){}}
      setQueue(q=>q.map((x,i)=>i===activeIdx?{...x,status:"done"}:x));
    }catch(e){
      setQueue(q=>q.map((x,i)=>i===activeIdx?{...x,status:"ready",error:"Save failed: "+e.message}:x));
      loading.hide();
      return; // stay on this item so user can retry
    }
    loading.hide();
    // Move to next item or finish
    const nextIdx=queue.findIndex((x,i)=>i>activeIdx&&x.status!=="done"&&x.status!=="skipped");
    if(nextIdx>=0){setActiveIdx(nextIdx);}
    else{
      // All done — refresh and reset
      if(onRefresh)await onRefresh();
      setSt("done");
      // If no remittance was saved, auto-dismiss after 2s
      const hasRemittance=queue.some(x=>x.docType==="remittance"&&x.status==="done");
      if(!hasRemittance)setTimeout(()=>{setSt("idle");setQueue([]);setActiveIdx(-1);setError(null);setLastRemittance(null);},2000);
    }
  };

  const skipCurrent=()=>{
    const updated=queue.map((x,i)=>i===activeIdx?{...x,status:"skipped"}:x);
    setQueue(updated);
    const nextIdx=updated.findIndex((x,i)=>i>activeIdx&&x.status!=="done"&&x.status!=="skipped");
    if(nextIdx>=0){setActiveIdx(nextIdx);}
    else{
      // All done/skipped — if any were saved, refresh
      const savedCount=updated.filter(x=>x.status==="done").length;
      if(savedCount>0){(async()=>{if(onRefresh)await onRefresh();setSt("done");})();}
      else{setSt("idle");setQueue([]);setActiveIdx(-1);}
    }
  };
  const cancelRemaining=async()=>{
    // Skip all unsaved items, keep saved ones
    const savedCount=queue.filter(x=>x.status==="done").length;
    if(savedCount>0){if(onRefresh)await onRefresh();setSt("done");}
    else{setSt("idle");setQueue([]);setActiveIdx(-1);setLastRemittance(null);}
  };

  const setActiveEd=updater=>setQueue(q=>q.map((x,i)=>i===activeIdx?{...x,ed:typeof updater==='function'?updater(x.ed):updater}:x));
  const setActiveDocType=dt=>setQueue(q=>q.map((x,i)=>i===activeIdx?{...x,docType:dt}:x));

  const reset=()=>{setSt("idle");setQueue([]);setActiveIdx(-1);setError(null);setLastRemittance(null);};

  if(st==="idle")return <DropZone compact onFiles={handleFiles} label="Drop POs / invoices here — select or drop multiple files at once"/>;

  if(st==="processing")return <div>
    <div className="mq"><div className="mq-h"><div className="spinner"/>Parsing {queue.length} document{queue.length>1?"s":""}...</div>
    {queue.map((item,i)=><div key={i} className="mq-item"><div className={"mq-icon "+(item.status==="ready"?"mq-done":"mq-active")}>{item.status==="ready"?"✓":"…"}</div><div className="mq-name">{item.file.name}</div><div className="mq-status">{item.status==="ready"?"Ready":"Parsing..."}</div></div>)}
    </div>
  </div>;

  if(st==="done"){
    const doneCount=queue.filter(x=>x.status==="done").length;
    const skippedCount=queue.filter(x=>x.status==="skipped").length;
    const summary=doneCount>0?`${doneCount} saved`+(skippedCount>0?`, ${skippedCount} skipped`:""):"No documents saved";
    const dismissAll=()=>{setSt("idle");setQueue([]);setActiveIdx(-1);setError(null);setLastRemittance(null);};
    if(lastRemittance){
      const emailUrl=buildPaymentEmailUrl(lastRemittance);
      return <div style={{padding:16,background:"var(--s2)",borderRadius:"var(--r2)",border:"1px solid var(--bd)"}}>
        <div className="il-d" style={{marginBottom:12}}><span className="ci ci-h" style={{width:28,height:28,fontSize:16}}>✓</span><span>{summary}</span></div>
        <div style={{padding:14,background:"var(--wh)",borderRadius:"var(--r)",border:"1px solid var(--bd)",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:8,color:"var(--tx)"}}>Send payment confirmation email?</div>
          <div style={{fontSize:12,color:"var(--tx2)",marginBottom:4}}>PO{lastRemittance.poRefs.length>1?"s":""}: <span style={{fontWeight:600}}>{lastRemittance.poRefs.join(", ")}</span></div>
          <div style={{fontSize:12,color:"var(--tx2)",marginBottom:4}}>Amount: <span className="mono" style={{fontWeight:600}}>{lastRemittance.currency} {Number(lastRemittance.amount).toLocaleString("en-US",{minimumFractionDigits:2})}</span></div>
          {lastRemittance.reference&&<div style={{fontSize:12,color:"var(--tx2)",marginBottom:4}}>Ref: <span style={{fontWeight:600}}>{lastRemittance.reference}</span></div>}
          {lastRemittance.supplier&&<div style={{fontSize:12,color:"var(--tx2)"}}>Supplier: <span style={{fontWeight:600}}>{lastRemittance.supplier}</span></div>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <a href={emailUrl} target="_blank" rel="noopener noreferrer" className="btn btn-primary" style={{flex:1,textAlign:"center",textDecoration:"none"}} onClick={()=>setTimeout(dismissAll,500)}>Draft Email in Gmail</a>
          <button className="btn" onClick={dismissAll} style={{flex:0,padding:"8px 16px",background:"var(--s2)",border:"1px solid var(--bd)",borderRadius:6,cursor:"pointer"}}>Done</button>
        </div>
      </div>;
    }
    if(!lastRemittance)setTimeout(dismissAll,2500);
    return <div className="il-d"><span className="ci ci-h" style={{width:28,height:28,fontSize:16}}>✓</span><span>{summary}</span></div>;
  }

  if(st==="review"){
    const item=queue[activeIdx];
    if(!item)return null;
    const doneCount=queue.filter(x=>x.status==="done").length;
    const skippedCount=queue.filter(x=>x.status==="skipped").length;
    const totalCount=queue.length;
    const remainingCount=totalCount-doneCount-skippedCount;
    const multiHeader=totalCount>1?<div className="mq" style={{marginBottom:12}}>
      <div className="mq-h" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>Reviewing {doneCount+skippedCount+1} of {totalCount}{doneCount>0?` · ${doneCount} saved`:""}</span>
        {remainingCount>1&&<button onClick={cancelRemaining} style={{background:"none",border:"1px solid var(--bd)",borderRadius:4,padding:"3px 10px",fontSize:11,color:"var(--tx3)",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Cancel remaining ({remainingCount-1})</button>}
      </div>
      {queue.map((q,i)=><div key={i} className="mq-item" style={{background:i===activeIdx?"var(--acl)":"inherit",opacity:q.status==="skipped"?.5:1}}>
        <div className={"mq-icon "+(q.status==="done"?"mq-done":q.status==="skipped"?"mq-wait":i===activeIdx?"mq-active":q.error?"mq-err":"mq-wait")}>{q.status==="done"?"✓":q.status==="skipped"?"—":i===activeIdx?"▸":q.error?"!":"·"}</div>
        <div className="mq-name" style={{fontWeight:i===activeIdx?700:400,textDecoration:q.status==="skipped"?"line-through":"none"}}>{q.file.name}</div>
        <div className="mq-status">{q.status==="done"?"Saved":q.status==="skipped"?"Skipped":q.status==="saving"?"Saving...":i===activeIdx?"Reviewing":q.error?"Error":"Waiting"}</div>
      </div>)}
    </div>:null;

    if(item.docType==="remittance")return <>{multiHeader}{item.error&&<div className="err">{item.error}</div>}<RemittanceAllocationUI parsed={item.parsed} ed={item.ed} setEd={setActiveEd} onConfirm={confirmCurrent} onCancel={totalCount>1?skipCurrent:reset} cancelLabel={totalCount>1?"Skip this":"Cancel"} fileName={item.file?.name} orders={orders} payments={payments}/></>;
    return <>{multiHeader}{item.error&&<div className="err">{item.error}</div>}<ReviewScreen parsed={item.parsed} ed={item.ed} setEd={setActiveEd} docType={item.docType} onChangeDocType={setActiveDocType} onConfirm={confirmCurrent} onCancel={totalCount>1?skipCurrent:reset} cancelLabel={totalCount>1?"Skip this":"Cancel"} fileName={item.file?.name} orders={orders} payments={payments}/></>;
  }
  return null;
}

// RowUploadModal — per-PO upload: doc goes to Drive, optional payment record
function RowUploadModal({order,onClose,onRefresh}){
  const loadingOv=useLoading();
  const[st,setSt]=useState("pick");const[file,setFile]=useState(null);const[docType,setDocType]=useState("document");
  const[parsing,setParsing]=useState(false);const[saving,setSaving]=useState(false);const[error,setError]=useState(null);
  const[payForm,setPayForm]=useState({amount:0,currency:order.currency||"USD",date:"",type:"Deposit",source:order.region||"",bank:"",reference:""});
  const[createPayment,setCreatePayment]=useState(!(order.depositStatus==="paid"&&order.releaseStatus==="paid"));
  const fRef=useRef();
  const pf=(k,v)=>setPayForm(p=>({...p,[k]:v}));
  const selectedLinePaid=payForm.type==="Release"?order.releaseStatus==="paid":payForm.type==="Full Amount"?(order.depositStatus==="paid"&&order.releaseStatus==="paid"):order.depositStatus==="paid";

  const handleFile=async f=>{
    setFile(f);
    if(docType==="remittance"){
      setParsing(true);setError(null);
      try{
        const r=await parseDoc(f);
        setPayForm(p=>({...p,amount:+(r.amount)||p.amount,currency:r.currency||p.currency,date:r.payment_date||p.date,source:r.source_entity||p.source,type:r.payment_type||p.type,reference:r.reference||p.reference}));
      }catch(e){/* AI parse failed, user fills manually */}
      setParsing(false);
    }
    setSt("confirm");
  };

  const upload=async()=>{
    setSaving(true);setError(null);loadingOv.show("Uploading to "+order.ref+"...");
    try{
      // Always upload file to this PO's Drive folder
      if(file&&order.ref){
        const uploadMeta={docType:docType||"document",docDate:new Date().toISOString().slice(0,10),entity:order.region||"",folderId:order.driveFolderId||""};
        if(docType==="remittance"){uploadMeta.entity=payForm.source||order.region||"";uploadMeta.bankLabel=payForm.bank||"";}
        await apiUploadFile(file,order.ref,uploadMeta);
      }

      // If remittance, optionally record payment (supporting-doc-only mode avoids duplicate entries)
      if(docType==="remittance"&&createPayment){
        const bm={"AU-NAB":"au-nab","UK-HSBC":"uk-hsbc","US-Chase":"us-chase","CA-RBC":"ca-rbc"};
        const bankId=bm[payForm.bank]||BANKS.find(b=>b.entity===payForm.source)?.id||"us-chase";
        const pmtAmt=+(payForm.amount)||0;
        const alloc={};
        if(payForm.type==="Full Amount"){alloc[order.id]={deposit:pmtAmt,release:0};}
        else if(payForm.type==="Release"){alloc[order.id]={deposit:0,release:pmtAmt};}
        else{alloc[order.id]={deposit:pmtAmt,release:0};}
        await apiPost("/api/payments",{
          orderIds:[order.id],allocations:alloc,
          bankAccount:bankId,sourceEntity:payForm.source||order.region||"US",
          amount:+(payForm.amount)||0,currency:payForm.currency||"USD",
          date:payForm.date||new Date().toISOString().slice(0,10),
          type:payForm.type,notes:"",docName:file?.name
        });
      }
      if(onRefresh)await onRefresh();
      if(docType==="remittance"&&createPayment){setSt("email");setSaving(false);}else{onClose();}
    }catch(e){setError("Upload failed: "+e.message);setSaving(false);}finally{loadingOv.hide();}
  };

  return <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={onClose}>
    <div style={{background:"var(--wh)",borderRadius:"var(--r2)",maxWidth:480,width:"90%",padding:24}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><div style={{fontWeight:700,fontSize:15}}>Upload to {order.ref}</div><div style={{fontSize:12,color:"var(--tx3)"}}>{order.supplier} · <RegionBadge region={order.region}/></div></div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"var(--tx3)"}}>✕</button>
      </div>

      {error&&<div className="err">{error}</div>}

      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--tx3)",marginBottom:6}}>Upload Type</div>
        <div style={{display:"flex",gap:8}}>

// Convert orders to payment line items
function ordersToLineItems(orders){
  const items=[];
  orders.forEach(o=>{
    const hasDep=o.depositAmt>0;
    const hasRel=o.releaseAmt>0;
    // For manually-marked-paid orders, paidAmt may be 0 in payment records
    // but status is "paid" — treat as fully paid
    const depPaidAmt=o.depositStatus==="paid"?Math.max(+(o.depositPaidAmt)||0,o.depositAmt||0):(+(o.depositPaidAmt)||0);
    const relPaidAmt=o.releaseStatus==="paid"?Math.max(+(o.releasePaidAmt)||0,o.releaseAmt||0):(+(o.releasePaidAmt)||0);
    const depOutstanding=o.depositStatus==="paid"?0:Math.max(o.depositAmt-depPaidAmt,0);
    const relOutstanding=o.releaseStatus==="paid"?0:Math.max(o.releaseAmt-relPaidAmt,0);
    if(hasDep&&hasRel){
      items.push({...o,lineType:"Deposit",lineAmount:o.depositAmt,lineStatus:o.depositStatus,lineDue:o.depositDue,linePaid:o.depositPaid,lineKey:o.id+"-dep",linePaidAmt:depPaidAmt,lineOutstanding:depOutstanding});
      items.push({...o,lineType:"Release",lineAmount:o.releaseAmt,lineStatus:o.releaseStatus,lineDue:o.releaseDue,linePaid:o.releasePaid,lineKey:o.id+"-rel",linePaidAmt:relPaidAmt,lineOutstanding:relOutstanding});
    }else if(hasDep){
      items.push({...o,lineType:"Deposit",lineAmount:o.depositAmt,lineStatus:o.depositStatus,lineDue:o.depositDue,linePaid:o.depositPaid,lineKey:o.id+"-dep",linePaidAmt:depPaidAmt,lineOutstanding:depOutstanding});
    }else if(hasRel){
      items.push({...o,lineType:"Release",lineAmount:o.releaseAmt,lineStatus:o.releaseStatus,lineDue:o.releaseDue,linePaid:o.releasePaid,lineKey:o.id+"-rel",linePaidAmt:relPaidAmt,lineOutstanding:relOutstanding});
    }else{
      const totPaidAmt=o.releaseStatus==="paid"?Math.max(+(o.releasePaidAmt)||0,o.totalValue||0):(+(o.releasePaidAmt)||0);
      items.push({...o,lineType:"Release",lineAmount:o.totalValue,lineStatus:o.releaseStatus||"unpaid",lineDue:o.releaseDue||"",linePaid:o.releasePaid||"",lineKey:o.id+"-rel",linePaidAmt:totPaidAmt,lineOutstanding:o.releaseStatus==="paid"?0:Math.max(o.totalValue-totPaidAmt,0)});
    }
  });
  return items;
}

// Tabs
function OrdersTab({orders,payments,onRefresh}){
  const loading=useLoading();

  const[sort,setSort]=useState({key:"ref",dir:"asc"});const[showUp,setShowUp]=useState(false);const[showPaid,setShowPaid]=useState(false);

    // Don't interfere with clicks on inputs, buttons, links, selects
    if(e.target.closest("input,button,a,select,textarea,.inline-edit-cell"))return;

    const mode=selected.has(item.lineKey)?"deselect":"select";

      // Shift+click: range select
      const keys=items.map(i=>i.lineKey);
      const a=keys.indexOf(lastClickRef.current),b=keys.indexOf(item.lineKey);
      if(a!==-1&&b!==-1){const[lo,hi]=[Math.min(a,b),Math.max(a,b)];setSelected(s=>{const n=new Set(s);for(let i=lo;i<=hi;i++)n.add(keys[i]);return n;});return;}
    }
    setSelected(s=>{const n=new Set(s);mode==="select"?n.add(item.lineKey):n.delete(item.lineKey);return n;});
  };
  const onRowMouseEnter=(e,item)=>{
    if(!dragRef.current.active)return;
    setSelected(s=>{const n=new Set(s);dragRef.current.mode==="select"?n.add(item.lineKey):n.delete(item.lineKey);return n;});

  const deleteOrder=async(order)=>{if(!confirm(`Delete order ${order.ref}? This cannot be undone.`))return;loading.show("Deleting "+order.ref+"...");try{await apiDelete(`/api/orders/${encodeURIComponent(order.id)}`);await onRefresh();}catch(e){alert("Delete failed: "+e.message);}finally{loading.hide();}};
  const inlineSave=useCallback(async(orderId,field,value)=>{

  },[onRefresh]);
  const toggleSelect=(key,e,items)=>{

      const keys=items.map(i=>i.lineKey);

      if(a!==-1&&b!==-1){const[lo,hi]=[Math.min(a,b),Math.max(a,b)];setSelected(s=>{const n=new Set(s);for(let i=lo;i<=hi;i++)n.add(keys[i]);return n;});lastClickRef.current=key;return;}

  const csvHeaders=["Region","Ref","Invoice","Pmt Type","Currency","Inv Amount","USD Equiv","Paid","Outstanding","Due Date","Paid Date","PO Date","Status","Supplier","Notes"];
  const itemToCsvRow=i=>[i.region,i.ref,i.inv,i.lineType,i.currency,(i.lineAmount||0),usd(toUSD(i.lineAmount,i.currency)),usd(toUSD(i.linePaidAmt||0,i.currency)),usd(toUSD(i.lineOutstanding||0,i.currency)),i.lineDue||"",i.linePaid||"",i.poDate||"",i.lineStatus,i.supplier,i.notes||""];
  const toCsv=items=>{const esc=v=>{const s=String(v??"");return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s;};return[csvHeaders.map(esc).join(","),...items.map(i=>itemToCsvRow(i).map(esc).join(","))].join("\n");};
  const exportCsv=()=>{const items=selected.size>0?[...unpaidSorted,...paidSorted].filter(i=>selected.has(i.lineKey)):unpaidSorted;const blob=new Blob([toCsv(items)],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="purchase-orders.csv";a.click();};
  const copySelected=()=>{const items=[...unpaidSorted,...paidSorted].filter(i=>selected.has(i.lineKey));if(!items.length)return;navigator.clipboard.writeText(toCsv(items));};
  const allItems=ordersToLineItems(orders).map(i=>i.id in priorityOverrides?{...i,priority:priorityOverrides[i.id]}:i);
  const baseFiltered=allItems.filter(item=>{if(fAge!=="all"){const months=fAge==="1M"?1:fAge==="3M"?3:fAge==="1Y"?12:6;const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-months);const dateToCheck=item.poDate||item.lineDue;if(dateToCheck){const itemDate=new Date(dateToCheck);if(itemDate<cutoff)return false;}}if(fR!=="all"&&item.region!==fR)return false;if(fS!=="all"&&item.supplier!==fS)return false;if(search)return(item.ref+item.inv+item.notes+item.supplier).toLowerCase().includes(search.toLowerCase());return true;});

function PaymentsTab({orders,payments,onRefresh}){

  const fl=payments.filter(p=>{if(fPeriod!=="all"){const months=fPeriod==="1M"?1:fPeriod==="3M"?3:fPeriod==="1Y"?12:6;const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-months);const pDate=p.date?new Date(p.date):null;if(pDate&&pDate<cutoff)return false;}if(fR!=="all"&&p.sourceEntity!==fR)return false;if(search){const refs=(p.orderIds||[]).map(id=>go(id)?.ref||"").join(" ");return(refs+" "+(p.docName||"")+" "+(p.notes||"")).toLowerCase().includes(search.toLowerCase());}return true;});
  const sorted=[...fl].sort((a,b)=>{const d=sort.dir==="asc"?1:-1;if(sort.key==="date")return(new Date(a.date||0)-new Date(b.date||0))*d;if(sort.key==="amount")return(toUSD(a.amount,a.currency)-toUSD(b.amount,b.currency))*d;if(sort.key==="source")return((a.sourceEntity||"")>(b.sourceEntity||"")?1:-1)*d;if(sort.key==="type")return((a.type||"")>(b.type||"")?1:-1)*d;if(sort.key==="po"){const ar=(a.orderIds||[]).map(id=>go(id)?.ref||"").join(",");const br=(b.orderIds||[]).map(id=>go(id)?.ref||"").join(",");return(ar>br?1:-1)*d;}if(sort.key==="bank")return((a.bankAccount||"")>(b.bankAccount||"")?1:-1)*d;if(sort.key==="ic"){const aIC=(a.orderIds||[]).some(oid=>{const o=go(oid);return o&&a.sourceEntity!==o.region;});const bIC=(b.orderIds||[]).some(oid=>{const o=go(oid);return o&&b.sourceEntity!==o.region;});return((aIC?1:0)-(bIC?1:0))*d;}return 0;});

  const ts=key=>setSort(s=>({key,dir:s.key===key&&s.dir==="asc"?"desc":"asc"}));

    {editPayment&&<EditPaymentModal payment={editPayment} orders={orders} onSave={async()=>{await onRefresh();setEditPayment(null);}} onClose={()=>setEditPayment(null)}/>}
  </>;

function IntercompanyTab({orders,payments}){
  const[sort,setSort]=useState({key:"date",dir:"desc"});
  const ts=key=>setSort(s=>({key,dir:s.key===key&&s.dir==="asc"?"desc":"asc"}));
  const si=key=>sort.key===key?(sort.dir==="asc"?" ↑":" ↓"):"";
  const sortTxns=txns=>[...txns].sort((a,b)=>{const d=sort.dir==="asc"?1:-1;if(sort.key==="date")return((a.date||"")>(b.date||"")?1:-1)*d;if(sort.key==="po")return((a.poRef||"")>(b.poRef||"")?1:-1)*d;if(sort.key==="from")return((a.sourceEntity||"")>(b.sourceEntity||"")?1:-1)*d;if(sort.key==="to")return((a.dest||"")>(b.dest||"")?1:-1)*d;if(sort.key==="amount")return((a.amount||0)-(b.amount||0))*d;return 0;});
  const icMap={};payments.forEach(p=>{if(!p.sourceEntity||!p.orderIds)return;(p.orderIds||[]).forEach(oid=>{const o=orders.find(x=>x.id===oid);if(!o||!o.region||!p.sourceEntity||p.sourceEntity===o.region)return;const k=[p.sourceEntity,o.region].sort().join("-");if(!icMap[k])icMap[k]={e1:p.sourceEntity<o.region?p.sourceEntity:o.region,e2:p.sourceEntity<o.region?o.region:p.sourceEntity,net:0,txns:[]};const rawAmt=(p.allocations||{})[oid];const amt=(typeof rawAmt==="object"&&rawAmt!==null)?((+rawAmt.deposit||0)+(+rawAmt.release||0)):(+rawAmt||p.amount);icMap[k].net+=amt*(p.sourceEntity<o.region?1:-1);icMap[k].txns.push({date:p.date,poRef:o.ref,sourceEntity:p.sourceEntity,dest:o.region,amount:amt});});});
  const pairs=Object.values(icMap);const totalIC=pairs.reduce((s,p)=>s+Math.abs(p.net),0);
  return <>
    <div className="ph"><div><h2>Intercompany Clearing</h2><p className="ps">Auto-detected when payment source ≠ PO destination</p></div></div>
    <div className="sg"><div className="sc"><div className="sl">IC Pairs</div><div className="sv">{pairs.length}</div></div><div className="sc"><div className="sl">Total Exposure</div><div className="sv mono amber">{usd(totalIC)}</div></div></div>
    {!pairs.length?<div className="es"><div style={{fontSize:36,marginBottom:12}}>🔄</div><p>No intercompany clearing needed</p></div>
    :pairs.map((pr,i)=><div key={i} className="icc"><div className="ic-p"><RegionBadge region={pr.e1}/><span className="ic-a">{pr.net>=0?"→ owes →":"← owed ←"}</span><RegionBadge region={pr.e2}/><span className="ic-amt mono">{usd(Math.abs(pr.net))}</span></div>
    <table><thead><tr><th className="srt" onClick={()=>ts("date")}>Date{si("date")}</th><th className="srt" onClick={()=>ts("po")}>PO{si("po")}</th><th className="srt" onClick={()=>ts("from")}>From{si("from")}</th><th className="srt" onClick={()=>ts("to")}>To{si("to")}</th><th className="srt" onClick={()=>ts("amount")}>Amount{si("amount")}</th></tr></thead><tbody>{sortTxns(pr.txns).map((t,j)=><tr key={j}><td>{fmtDate(t.date)}</td><td className="cb">{t.poRef}</td><td><RegionBadge region={t.sourceEntity}/></td><td><RegionBadge region={t.dest}/></td><td className="mono">{usd(t.amount)}</td></tr>)}</tbody></table></div>)}
  </>;
}

function ForecastTab({orders}){
  const weeks={};orders.forEach(o=>{const add=(d,a,paidAmt,st,label)=>{if(!d)return;const u=toUSD(a,o.currency);const paid=toUSD(paidAmt,o.currency);const outstanding=Math.max(u-paid,0);const wk=weekKey(d);if(!weeks[wk])weeks[wk]={paid:0,due:0,over:0,total:0,items:[]};weeks[wk].total+=u;if(st==="paid")weeks[wk].paid+=u;else{weeks[wk].paid+=paid;if(new Date(d)<new Date())weeks[wk].over+=outstanding;else weeks[wk].due+=outstanding;}weeks[wk].items.push({ref:o.ref,region:o.region,amount:u,paidAmt:paid,outstanding,status:st,label,date:d});};add(o.depositDue,o.depositAmt,+(o.depositPaidAmt)||0,o.depositStatus,"Deposit");add(o.releaseDue,o.releaseAmt,+(o.releasePaidAmt)||0,o.releaseStatus,"Release");});
  const sortedWeeks=Object.entries(weeks).sort(([a],[b])=>a.localeCompare(b));let cumul=0;
  const withCumul=sortedWeeks.map(([wk,d])=>{cumul+=d.total;return[wk,d,cumul];});
  const[expanded,setExpanded]=useState({});const toggle=wk=>setExpanded(p=>({...p,[wk]:!p[wk]}));
  return <>
    <div className="ph"><div><h2>Cash Forecast</h2><p className="ps">Weekly payment obligations</p></div></div>
    <div className="fw">{withCumul.map(([wk,d,cum])=><div key={wk} className="wk-row">
      <div className="wk-header" onClick={()=>toggle(wk)} style={{cursor:"pointer"}}><div className="wk-date">{fmtWeek(wk)} <span className="wk-count">({d.items.length})</span></div><div className="wk-nums"><span className="mono">{usd(d.total)}</span><span className="wk-cum mono">Σ {usd(cum)}</span></div></div>
      <div className="bt"><div className="bf bg" style={{width:d.total>0?pct(d.paid/d.total):"0%"}}/><div className="bf br" style={{width:d.total>0?pct(d.over/d.total):"0%"}}/><div className="bf ba" style={{width:d.total>0?pct(d.due/d.total):"0%"}}/></div>
      <div className="fl"><span><span className="dot dg"/>Paid: {usd(d.paid)}</span>{d.over>0&&<span><span className="dot dr"/>Overdue: {usd(d.over)}</span>}<span><span className="dot da"/>Due: {usd(d.due)}</span></div>
      {expanded[wk]&&<div className="wk-items">{d.items.sort((a,b)=>a.date.localeCompare(b.date)).map((it,i)=><div key={i} className="wk-item"><RegionBadge region={it.region}/><span className="cb" style={{flex:1}}>{it.ref}</span><span className="badge badge-grey" style={{fontSize:10}}>{it.label}</span><StatusBadge status={it.status} dueDate={it.date}/><span className="mono" style={{minWidth:90,textAlign:"right"}}>{usd(it.amount)}</span>{it.status!=="paid"&&it.paidAmt>0.01&&<span className="mono" style={{minWidth:90,textAlign:"right",color:"var(--rd)",fontSize:11}}>({usd(it.outstanding)} due)</span>}</div>)}</div>}
    </div>)}</div>
  </>;
}

// App
function App(){
  const overlay=useLoading();
  const[tab,setTab]=useState("orders");const[orders,setOrders]=useState([]);const[payments,setPayments]=useState([]);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);const[sideUpload,setSideUpload]=useState(false);const[lastRefresh,setLastRefresh]=useState(null);const[showHelp,setShowHelp]=useState(false);
  const loadData=useCallback(async()=>{try{setLoading(true);setError(null);const data=await apiGet("/api/all");setOrders(data.orders||[]);setPayments(data.payments||[]);setLastRefresh(new Date());}catch(e){setError(e.message);}finally{setLoading(false);};},[]);
  useEffect(()=>{loadData();},[loadData]);
  const refresh=useCallback(async()=>{overlay.show("Refreshing data...");try{const data=await apiGet("/api/all");setOrders(data.orders||[]);setPayments(data.payments||[]);setLastRefresh(new Date());}catch(e){console.error("Refresh failed:",e);}finally{overlay.hide();}},[overlay]);
  if(loading)return <div className="loading-screen"><div className="spinner"/><span style={{fontSize:15,color:"var(--tx2)"}}>Loading Bureau Ops...</span></div>;
  if(error)return <div className="loading-screen"><div style={{fontSize:48}}>⚠️</div><div style={{fontSize:15,color:"var(--rd)",maxWidth:400,textAlign:"center"}}>{error}</div><button className="btn btn-primary" onClick={loadData}>Retry</button></div>;
  return <div className="app">
    <div className="sidebar"><div className="sidebar-logo"><h1>Bureau Ops</h1><span>Logistics & Payments</span></div>
    <nav className="sidebar-nav">{TABS.map(t=><button key={t.id} className={`ni ${tab===t.id?"act":""}`} onClick={()=>setTab(t.id)}><span className="nic">{t.icon}</span><span>{t.label}</span></button>)}</nav>
    <div className="sidebar-upload"><button className="sidebar-upload-btn" onClick={()=>setSideUpload(!sideUpload)}><span style={{fontSize:18}}>⬆</span><span>Upload Doc</span></button></div>
    <div className="sf"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{orders.length} POs · {payments.length} payments</span><div style={{display:"flex",gap:6,alignItems:"center"}}><a href="https://docs.google.com/spreadsheets/d/1a_j_qCDWF9y8LUfT3iq-R5ZzydID-A36/edit?gid=17854855#gid=17854855&fvid=547760767" target="_blank" rel="noopener" style={{background:"#34a853",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,fontSize:13,cursor:"pointer",fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",textDecoration:"none"}} title="Open Google Sheet">📊</a><button onClick={()=>setShowHelp(true)} style={{background:"var(--ac)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,fontSize:14,cursor:"pointer",fontWeight:700}} title="Backend guide & troubleshooting">?</button></div></div>{lastRefresh&&<div style={{marginTop:4,cursor:"pointer"}} onClick={refresh} title="Click to refresh">🔄 {lastRefresh.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</div>}</div></div>
    <main className="mn">
      {sideUpload&&<div className="us" style={{marginBottom:24}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontWeight:700,fontSize:14}}>Quick Upload</span><button className="btn btn-ghost" style={{padding:"4px 10px",fontSize:11}} onClick={()=>setSideUpload(false)}>✕ Close</button></div><InlineUploader orders={orders} payments={payments} defaultDocType="purchase_order" onRefresh={refresh}/></div>}
      {tab==="orders"&&<OrdersTab orders={orders} payments={payments} onRefresh={refresh}/>}
      {tab==="payments"&&<PaymentsTab orders={orders} payments={payments} onRefresh={refresh}/>}
      {tab==="clearing"&&<IntercompanyTab orders={orders} payments={payments}/>}
      {tab==="forecast"&&<ForecastTab orders={orders}/>}
    </main>
    {showHelp&&<HelpModal onClose={()=>setShowHelp(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<LoadingOverlayProvider><App/></LoadingOverlayProvider>);
</script>
</body>
</html>
