<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useRef, useMemo, useEffect, useCallback } = React;

const API = "";  // Same-origin — Pages Function proxies /api/* to the Worker
const ENTITIES = ["AU", "UK", "US", "CA"];
const SUPPLIERS = ["Soundbox", "Hecor", "Dawon", "Sunon"];
const CURRENCIES = ["USD", "RMB", "AUD", "CAD", "GBP", "EUR"];
const PAYMENT_TYPES = ["Deposit", "Release", "Full Amount"];
const DOC_TYPES = [
  { id: "purchase_order", label: "Purchase Order", icon: "📄" },
  { id: "commercial_invoice", label: "Commercial Invoice", icon: "🧾" },
  { id: "remittance", label: "Bank Remittance", icon: "🏦" },
  { id: "freight_invoice", label: "Freight Invoice", icon: "🚢" },
];
const BANKS = [
  { id: "au-nab", label: "AU – NAB", entity: "AU", hint: "AU-NAB" },
  { id: "uk-hsbc", label: "UK – HSBC", entity: "UK", hint: "UK-HSBC" },
  { id: "us-chase", label: "US – Chase", entity: "US", hint: "US-Chase" },
  { id: "ca-rbc", label: "CA – RBC", entity: "CA", hint: "CA-RBC" },
];
const FX = { RMB: 6.91, USD: 1, AUD: 0.71, CAD: 0.73, GBP: 1.37, EUR: 1.19 };
const GDRIVE_BASE = "https://drive.google.com/drive/folders/";
const TABS = [
  { id: "outstanding", label: "POs Outstanding", icon: "🔴" },
  { id: "allpos", label: "All POs", icon: "📦" },
  { id: "payments", label: "Payments", icon: "💳" },
  { id: "clearing", label: "Intercompany", icon: "🔄" },
  { id: "forecast", label: "Cash Forecast", icon: "📊" },
];
const usd = v => "$" + Number(v || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = d => d ? new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "—";
const toUSD = (a, c) => c === "USD" ? a : a * (FX[c] || 1);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const pct = v => (v * 100).toFixed(1) + "%";
const getWeekStart = d => { const dt = new Date(d); const day = dt.getDay(); const diff = dt.getDate() - day + (day === 0 ? -6 : 1); dt.setDate(diff); dt.setHours(0,0,0,0); return dt; };
const fmtWeek = d => { const s = getWeekStart(d); const e = new Date(s); e.setDate(e.getDate() + 6); return `${s.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})} – ${e.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}`; };
const weekKey = d => getWeekStart(d).toISOString().slice(0, 10);

// API helpers
async function apiGet(path) { const r = await fetch(API+path); if(!r.ok) throw new Error("API "+r.status); return r.json(); }
async function apiPost(path, body) { const r = await fetch(API+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); if(!r.ok) throw new Error("API "+r.status+": "+(await r.text())); return r.json(); }
async function apiPatch(path, body) { const r = await fetch(API+path,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); if(!r.ok) throw new Error("API "+r.status); return r.json(); }
async function apiDelete(path) { const r = await fetch(API+path,{method:"DELETE"}); if(!r.ok) throw new Error("API "+r.status+": "+(await r.text())); return r.json(); }
async function apiUploadFile(file, poRef) { const f = new FormData(); f.append("file",file); f.append("poRef",poRef); const r = await fetch(API+"/api/drive/upload",{method:"POST",body:f}); if(!r.ok) throw new Error("Upload failed"); return r.json(); }

// Fuzzy match existing payment for remittance upload
function fuzzyMatchPayment(remittanceData, payments) {
  const amt = +(remittanceData.amount) || 0;
  const date = remittanceData.payment_date;
  const source = remittanceData.source_entity;
  if (!amt || !date || !source) return null;

  const dateObj = new Date(date);
  const matches = payments.filter(p => {
    // Match source entity
    if (p.sourceEntity !== source) return false;

    // Match amount (±5% tolerance)
    const pAmt = toUSD(p.amount, p.currency);
    const amtDiff = Math.abs(amt - pAmt) / pAmt;
    if (amtDiff > 0.05) return false;

    // Match date (±7 days tolerance)
    if (p.date) {
      const pDate = new Date(p.date);
      const daysDiff = Math.abs((dateObj - pDate) / (1000 * 60 * 60 * 24));
      if (daysDiff > 7) return false;
    }

    // Prefer payments without documents (docName not set)
    return true;
  });

  // Sort by closeness: first by amount difference, then by date difference
  matches.sort((a, b) => {
    const aDiff = Math.abs(amt - toUSD(a.amount, a.currency));
    const bDiff = Math.abs(amt - toUSD(b.amount, b.currency));
    return aDiff - bDiff;
  });

  return matches.length > 0 ? matches[0] : null;
}

// Fuzzy match
function fuzzyMatchPO(input, orders, payments) {
  if (!input||!input.trim()) return [];
  const clean=s=>(s||"").replace(/[\s\-_\.#,/\\()]+/g,"").toLowerCase(), extractNums=s=>(s||"").match(/\d+/g)||[];
  const q=clean(input),qNums=extractNums(input), cutoff=new Date(); cutoff.setMonth(cutoff.getMonth()-3);
  const paidMap={}; (payments||[]).forEach(p=>Object.entries(p.allocations||{}).forEach(([oid,amt])=>{paidMap[oid]=(paidMap[oid]||0)+amt;}));
  return orders.map(o=>{
    let score=0,reason="";const rc=clean(o.ref),ic=clean(o.inv);
    if(rc===q||ic===q){score=100;reason="Exact";}
    else if(rc.includes(q)||ic.includes(q)){score=85;reason="Contains";}
    else if(q.includes(rc)||q.includes(ic)){score=80;reason="In input";}
    else if(qNums.length>0){const an=[...extractNums(o.ref),...extractNums(o.inv)];if(qNums.some(n=>an.includes(n))){score=75;reason="PO#";}}
    const tot=toUSD(o.totalValue,o.currency),pd=paidMap[o.id]||0,out=tot-pd,bal=out>0.01;
    // Add deposit/release breakdown
    const depAmtUSD=toUSD(o.depositAmt,o.currency);
    const relAmtUSD=toUSD(o.releaseAmt,o.currency);
    const depUnpaid=o.depositStatus!=="paid";
    const relUnpaid=o.releaseStatus!=="paid";
    if(score>0&&bal)score+=5;
    return{...o,score,reason,outstanding:out,paid:pd,totalUSD:tot,hasBalance:bal,depAmtUSD,relAmtUSD,depUnpaid,relUnpaid};
  }).filter(o=>o.score>0).sort((a,b)=>b.score-a.score).slice(0,8);
}

// Doc parser — calls Worker /api/parse (server-side Anthropic call)
async function parseDoc(file) {
  const b64=await new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result.split(",")[1]);x.onerror=()=>j(new Error("fail"));x.readAsDataURL(file);});
  const mediaType=file.type||"application/pdf";
  const res=await fetch(API+"/api/parse",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:b64,media_type:mediaType})});
  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Parse error (${res.status}): ${errText}`);
  }
  return res.json();
}

// InlineUploader
function InlineUploader({orders,setOrders,payments,setPayments,defaultDocType,onRefresh}){
  const[st,setSt]=useState("idle");const[file,setFile]=useState(null);const[parsed,setParsed]=useState(null);const[ed,setEd]=useState(null);const[docType,setDocType]=useState(defaultDocType);const[error,setError]=useState(null);
  const empty=dt=>dt==="purchase_order"?{doc_type:"purchase_order",supplier:"",po_reference:"",invoice_number:"",po_date:"",destination_region:"",currency:"USD",total_value:0,deposit_amount:0,release_amount:0,notes:"",confidence:"low"}:dt==="remittance"?{doc_type:"remittance",bank_account_hint:"",source_entity:"",payment_date:"",amount:0,currency:"USD",po_references:[""],payment_type:"Deposit",reference:"",notes:"",confidence:"low"}:{doc_type:dt||"commercial_invoice",supplier:"",invoice_number:"",po_reference:"",destination_region:"",currency:"USD",total_amount:0,notes:"",confidence:"low"};
  const handleFiles=async files=>{if(!files.length)return;const f=files[0];setFile(f);setSt("parsing");setError(null);try{const r=await parseDoc(f);setDocType(r.doc_type||defaultDocType);setParsed(r);setEd(r);setSt("review");}catch(e){setError("Parse failed: "+e.message);setDocType(defaultDocType);setEd(empty(defaultDocType));setSt("review");}};
  const confirm=async()=>{const dt=docType,d=ed;setSt("saving");try{
    if(dt==="purchase_order"){await apiPost("/api/orders",{region:d.destination_region||"US",ref:d.po_reference||"",inv:d.invoice_number||"",supplier:d.supplier||"",currency:d.currency||"USD",totalValue:+(d.total_value)||0,depositAmt:+(d.deposit_amount)||0,depositStatus:"due",releaseAmt:+(d.release_amount)||(+(d.total_value)-+(d.deposit_amount))||0,releaseStatus:"unpaid",poDate:d.po_date||"",notes:d.notes||""});if(file&&d.po_reference)try{await apiUploadFile(file,d.po_reference);}catch(e){}}
    else if(dt==="remittance"){const bm={"AU-NAB":"au-nab","UK-HSBC":"uk-hsbc","US-Chase":"us-chase","CA-RBC":"ca-rbc"};const ref=(d.po_references?.[0]||d.reference||"").trim();const existingPayment=fuzzyMatchPayment(d,payments);if(existingPayment&&!existingPayment.docName){const confirmMsg=`Found existing payment:\n• Date: ${existingPayment.date}\n• Amount: $${existingPayment.amount.toLocaleString()}\n• From: ${existingPayment.sourceEntity}\n\nAttach this remittance to the existing payment?`;if(confirm(confirmMsg)){await apiPatch(`/api/payments/${encodeURIComponent(existingPayment.id)}`,{docName:file?.name,notes:(existingPayment.notes||"")+(d.notes?"\n"+d.notes:"")});if(file&&ref)try{await apiUploadFile(file,ref);}catch(e){}if(onRefresh)await onRefresh();setSt("done");setTimeout(()=>{setSt("idle");setFile(null);setParsed(null);setEd(null);setError(null);},2000);return;}}const ms=fuzzyMatchPO(ref,orders,payments),m=ms.length>0&&ms[0].score>=75?ms[0]:null;if(m){const payAmt=+(d.amount)||0;let isPartial=false,partialMsg="";if(d.payment_type==="Full Amount"){const poTotal=m.totalUSD||0,pctDiff=Math.abs(payAmt-poTotal)/poTotal;if(pctDiff>0.05){if(payAmt<poTotal){isPartial=true;partialMsg=`This appears to be a PARTIAL payment:\n• Payment: ${usd(payAmt)}\n• PO ${m.ref} Total: ${usd(poTotal)}\n• Difference: ${usd(poTotal-payAmt)} (${(pctDiff*100).toFixed(0)}% short)\n\nProceed with partial payment?`;}else{throw new Error(`Payment ${usd(payAmt)} exceeds PO ${m.ref} total ${usd(poTotal)}. Check amount or PO.`);}}}else if(d.payment_type==="Deposit"){const depAmt=m.depAmtUSD||toUSD(m.depositAmt,m.currency),pctDiff=depAmt>0?Math.abs(payAmt-depAmt)/depAmt:1;if(depAmt>0&&pctDiff>0.05){if(payAmt<depAmt){isPartial=true;partialMsg=`This appears to be a PARTIAL deposit payment:\n• Payment: ${usd(payAmt)}\n• PO ${m.ref} Deposit: ${usd(depAmt)}\n• Difference: ${usd(depAmt-payAmt)} (${(pctDiff*100).toFixed(0)}% short)\n\nProceed with partial payment?`;}else if(pctDiff>0.1){throw new Error(`Payment ${usd(payAmt)} exceeds PO ${m.ref} deposit ${usd(depAmt)}. Check payment type or amount.`);}}}else if(d.payment_type==="Release"){const relAmt=m.relAmtUSD||toUSD(m.releaseAmt,m.currency),pctDiff=relAmt>0?Math.abs(payAmt-relAmt)/relAmt:1;if(relAmt>0&&pctDiff>0.05){if(payAmt<relAmt){isPartial=true;partialMsg=`This appears to be a PARTIAL release payment:\n• Payment: ${usd(payAmt)}\n• PO ${m.ref} Release: ${usd(relAmt)}\n• Difference: ${usd(relAmt-payAmt)} (${(pctDiff*100).toFixed(0)}% short)\n\nProceed with partial payment?`;}else if(pctDiff>0.1){throw new Error(`Payment ${usd(payAmt)} exceeds PO ${m.ref} release ${usd(relAmt)}. Check payment type or amount.`);}}}if(isPartial&&!confirm(partialMsg))return;}await apiPost("/api/payments",{orderIds:m?[m.id]:[],allocations:m?{[m.id]:+(d.amount)||0}:{},bankAccount:bm[d.bank_account_hint]||"us-chase",sourceEntity:d.source_entity||"US",amount:+(d.amount)||0,currency:d.currency||"USD",date:d.payment_date||new Date().toISOString().slice(0,10),type:d.payment_type||"Deposit",notes:d.notes||"",docName:file?.name});if(file&&ref)try{await apiUploadFile(file,ref);}catch(e){}}
    else{if(file&&d.po_reference)try{await apiUploadFile(file,d.po_reference);}catch(e){}}
    if(onRefresh)await onRefresh();setSt("done");setTimeout(()=>{setSt("idle");setFile(null);setParsed(null);setEd(null);setError(null);},2000);
  }catch(e){setError("Save failed: "+e.message);setSt("review");}};
  const reset=()=>{setSt("idle");setFile(null);setParsed(null);setEd(null);};
  if(st==="idle")return <DropZone compact onFiles={handleFiles} label="Drop a document to upload and parse"/>;
  if(st==="parsing")return <div className="il-p"><div className="spinner"/><span>Parsing {file?.name}...</span></div>;
  if(st==="saving")return <div className="il-p"><div className="spinner"/><span>Saving...</span></div>;
  if(st==="done")return <div className="il-d"><span className="ci ci-h" style={{width:28,height:28,fontSize:16}}>✓</span><span>Saved</span></div>;
  return <>{error&&<div className="err">{error}</div>}<ReviewScreen parsed={parsed} ed={ed} setEd={setEd} docType={docType} onConfirm={confirm} onCancel={reset} fileName={file?.name} orders={orders} payments={payments}/></>;
}

// Convert orders to payment line items
function ordersToLineItems(orders){
  const items=[];
  orders.forEach(o=>{
    const hasDep=o.depositAmt>0;
    const hasRel=o.releaseAmt>0;
    if(hasDep&&hasRel){
      items.push({...o,lineType:"Deposit",lineAmount:o.depositAmt,lineStatus:o.depositStatus,lineDue:o.depositDue,linePaid:o.depositPaid,lineKey:o.id+"-dep"});
      items.push({...o,lineType:"Release",lineAmount:o.releaseAmt,lineStatus:o.releaseStatus,lineDue:o.releaseDue,linePaid:o.releasePaid,lineKey:o.id+"-rel"});
    }else if(hasDep){
      items.push({...o,lineType:"Deposit",lineAmount:o.depositAmt,lineStatus:o.depositStatus,lineDue:o.depositDue,linePaid:o.depositPaid,lineKey:o.id+"-dep"});
    }else if(hasRel){
      items.push({...o,lineType:"Release",lineAmount:o.releaseAmt,lineStatus:o.releaseStatus,lineDue:o.releaseDue,linePaid:o.releasePaid,lineKey:o.id+"-rel"});
    }else{
      items.push({...o,lineType:"Full Amount",lineAmount:o.totalValue,lineStatus:"unpaid",lineDue:"",linePaid:"",lineKey:o.id+"-full"});
    }
  });
  return items;
}

  const allItems=ordersToLineItems(orders);
  const fl=allItems.filter(item=>{if(showOnlyUnpaid&&item.lineStatus==="paid")return false;if(fAge!=="all"){const months=fAge==="1M"?1:fAge==="3M"?3:fAge==="1Y"?12:6;const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-months);const dateToCheck=item.poDate||item.lineDue;if(dateToCheck){const itemDate=new Date(dateToCheck);if(itemDate<cutoff)return false;}}if(fR!=="all"&&item.region!==fR)return false;if(fS!=="all"&&item.supplier!==fS)return false;if(fSt==="paid"&&item.lineStatus!=="paid")return false;if(fSt==="unpaid"&&item.lineStatus==="paid")return false;if(search)return(item.ref+item.inv+item.notes+item.supplier).toLowerCase().includes(search.toLowerCase());return true;});
  const sorted=[...fl].sort((a,b)=>{const d=sort.dir==="asc"?1:-1;if(sort.key==="amount")return(toUSD(a.lineAmount,a.currency)-toUSD(b.lineAmount,b.currency))*d;if(sort.key==="due")return((a.lineDue||"")>(b.lineDue||"")?1:-1)*d;if(sort.key==="supplier")return((a.supplier||"")>(b.supplier||"")?1:-1)*d;if(sort.key==="inv")return((a.inv||"")>(b.inv||"")?1:-1)*d;if(sort.key==="poDate")return((a.poDate||"")>(b.poDate||"")?1:-1)*d;return((a[sort.key]||"")>(b[sort.key]||"")?1:-1)*d;});
  const tv=fl.reduce((s,i)=>s+toUSD(i.lineAmount,i.currency),0);
  const tp=fl.filter(i=>i.lineStatus==="paid").reduce((s,i)=>s+toUSD(i.lineAmount,i.currency),0);
  const ts=key=>setSort(s=>({key,dir:s.key===key&&s.dir==="asc"?"desc":"asc"}));

    <div className="ph"><div><h2>{showOnlyUnpaid?"Outstanding Purchase Orders":"All Purchase Orders"}</h2><p className="ps">{fl.length} of {allItems.length} line items{showOnlyUnpaid?" (unpaid only)":""}</p></div><button className="btn btn-primary" onClick={()=>setShowUp(!showUp)}>{showUp?"Hide":"📎 Upload PO"}</button></div>
    {showUp&&<div className="us"><InlineUploader orders={orders} payments={payments} defaultDocType="purchase_order" onRefresh={onRefresh}/></div>}
    <div className="sg"><div className="sc"><div className="sl">Line Items</div><div className="sv">{fl.length}</div></div><div className="sc"><div className="sl">Total Value</div><div className="sv mono">{usd(tv)}</div></div><div className="sc"><div className="sl">Paid</div><div className="sv mono green">{usd(tp)}</div></div><div className="sc"><div className="sl">Outstanding</div><div className="sv mono amber">{usd(tv-tp)}</div></div></div>
    <div className="filter-bar">
      <input placeholder="Search PO, invoice..." value={search} onChange={e=>setSearch(e.target.value)} className="filter-search"/>
      <div className="filter-section"><span className="filter-label">Period</span><BtnGroup options={["1M","3M","6M","1Y"]} value={fAge} onChange={setFAge} allLabel="All"/></div>
      <div className="filter-section"><span className="filter-label">Region</span><BtnGroup options={ENTITIES} value={fR} onChange={setFR} allLabel="All"/></div>
      <div className="filter-section"><span className="filter-label">Supplier</span><BtnGroup options={SUPPLIERS} value={fS} onChange={setFS} allLabel="All"/></div>
      {!showOnlyUnpaid&&<div className="filter-section"><span className="filter-label">Status</span><BtnGroup options={["paid","unpaid"]} value={fSt} onChange={setFSt} allLabel="All"/></div>}
    </div>
    <div className="tw"><div className="tsc"><table><thead><tr><th></th><th>Region</th><th className="srt" onClick={()=>ts("ref")}>PO Ref{si("ref")}</th><th className="srt" onClick={()=>ts("inv")}>Invoice{si("inv")}</th><th className="srt" onClick={()=>ts("supplier")}>Supplier{si("supplier")}</th><th>Type</th><th>Currency</th><th className="srt" onClick={()=>ts("amount")}>Amount{si("amount")}</th><th>USD Equiv</th><th className="srt" onClick={()=>ts("due")}>Due Date{si("due")}</th><th>Paid Date</th><th>Drive</th><th>Actions</th></tr></thead>
    <tbody>{sorted.map(item=>{const pmts=payments.filter(p=>(p.orderIds||[]).includes(item.id));const isPaid=item.lineStatus==="paid";const isOverdue=!isPaid&&item.lineDue&&new Date(item.lineDue)<new Date();return <tr key={item.lineKey} style={{background:isPaid?"#f0fdf4":isOverdue?"#fef2f2":"inherit"}}><td style={{textAlign:"center"}}>{isPaid?"✓":isOverdue?"🔴":"⚪"}</td><td><RegionBadge region={item.region}/></td><td className="cb">{item.ref}</td><td className="mono">{item.inv}</td><td>{item.supplier}</td><td><span className="badge badge-blue">{item.lineType}</span></td><td>{item.currency}</td><td className="mono">{(item.lineAmount||0).toLocaleString()}</td><td className="mono">{usd(toUSD(item.lineAmount,item.currency))}</td><td className="cm">{fmtDate(item.lineDue)}</td><td className="cm">{fmtDate(item.linePaid)}</td>
      <td>{item.driveFolderId?<a href={GDRIVE_BASE+item.driveFolderId} target="_blank" rel="noopener" className="drive-link" title="Open in Drive">📁</a>:<span className="cm">—</span>}</td><td><button onClick={()=>setEditOrder(item)} style={{fontSize:14,background:"none",border:"none",cursor:"pointer",padding:"4px 6px"}} title="Edit">✏️</button><button onClick={()=>deleteOrder(item)} style={{fontSize:14,background:"none",border:"none",cursor:"pointer",padding:"4px 6px",color:"var(--rd)"}} title="Delete">🗑️</button></td></tr>})}

function PaymentsTab({orders,payments,onRefresh}){
  const[showUp,setShowUp]=useState(false);const[fR,setFR]=useState("all");const[search,setSearch]=useState("");const[fPeriod,setFPeriod]=useState("6M");

  const fl=payments.filter(p=>{if(fPeriod!=="all"){const months=fPeriod==="1M"?1:fPeriod==="3M"?3:fPeriod==="1Y"?12:6;const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-months);const pDate=p.date?new Date(p.date):null;if(pDate&&pDate<cutoff)return false;}if(fR!=="all"&&p.sourceEntity!==fR)return false;if(search){const refs=(p.orderIds||[]).map(id=>go(id)?.ref||"").join(" ");return(refs+" "+(p.docName||"")+" "+(p.notes||"")).toLowerCase().includes(search.toLowerCase());}return true;});
  const sorted=[...fl].sort((a,b)=>{const d=sort.dir==="asc"?1:-1;if(sort.key==="date")return(new Date(a.date||0)-new Date(b.date||0))*d;if(sort.key==="amount")return(toUSD(a.amount,a.currency)-toUSD(b.amount,b.currency))*d;if(sort.key==="source")return((a.sourceEntity||"")>(b.sourceEntity||"")?1:-1)*d;if(sort.key==="type")return((a.type||"")>(b.type||"")?1:-1)*d;return 0;});
  const tot=sorted.reduce((s,p)=>s+toUSD(p.amount,p.currency),0);
  const ic=sorted.filter(p=>{if(!p.sourceEntity||!p.orderIds||p.orderIds.length===0)return false;return p.orderIds.some(oid=>{const o=go(oid);return o&&o.region&&p.sourceEntity!==o.region;});});
  const ts=key=>setSort(s=>({key,dir:s.key===key&&s.dir==="asc"?"desc":"asc"}));

    <div className="ph"><div><h2>Payment Ledger</h2><p className="ps">{fl.length} of {payments.length} payments</p></div><button className="btn btn-primary" onClick={()=>setShowUp(!showUp)}>{showUp?"Hide":"📎 Upload Remittance"}</button></div>
    {showUp&&<div className="us"><InlineUploader orders={orders} payments={payments} defaultDocType="remittance" onRefresh={onRefresh}/></div>}
    <div className="sg"><div className="sc"><div className="sl">Payments</div><div className="sv">{fl.length}</div></div><div className="sc"><div className="sl">Total Paid</div><div className="sv mono green">{usd(tot)}</div></div><div className="sc"><div className="sl">Intercompany</div><div className="sv amber">{ic.length}</div></div></div>
    <div className="filter-bar">

      <div className="filter-section"><span className="filter-label">Source</span><BtnGroup options={ENTITIES} value={fR} onChange={setFR} allLabel="All"/></div>
    </div>
    <div className="tw"><div className="tsc"><table><thead><tr><th className="srt" onClick={()=>ts("date")}>Date{si("date")}</th><th>PO(s)</th><th className="srt" onClick={()=>ts("source")}>Source{si("source")}</th><th>Bank</th><th className="srt" onClick={()=>ts("amount")}>Amount{si("amount")}</th><th className="srt" onClick={()=>ts("type")}>Type{si("type")}</th><th>IC?</th><th>Actions</th></tr></thead>
    <tbody>{sorted.map(p=>{const oids=p.orderIds||[];const firstO=go(oids[0]);const isIC=p.sourceEntity&&oids.length>0&&oids.some(oid=>{const o=go(oid);return o&&o.region&&p.sourceEntity!==o.region;});return <tr key={p.id}><td>{fmtDate(p.date)}</td><td className="cb">{oids.length>1?oids.length+" POs":(firstO?.ref||"—")}</td><td><RegionBadge region={p.sourceEntity}/></td><td>{BANKS.find(b=>b.id===p.bankAccount)?.label||p.bankAccount}</td><td className="mono">{usd(p.amount)}</td><td><span className="badge badge-green">{p.type}</span></td><td>{isIC?<span className="badge badge-amber">⚠ IC</span>:"—"}</td><td><button onClick={()=>deletePayment(p)} style={{fontSize:14,background:"none",border:"none",cursor:"pointer",padding:"4px 6px",color:"var(--rd)"}} title="Delete">🗑️</button></td></tr>;})}

function IntercompanyTab({orders,payments}){
  const icMap={};payments.forEach(p=>{if(!p.sourceEntity||!p.orderIds)return;(p.orderIds||[]).forEach(oid=>{const o=orders.find(x=>x.id===oid);if(!o||!o.region||!p.sourceEntity||p.sourceEntity===o.region)return;const k=[p.sourceEntity,o.region].sort().join("-");if(!icMap[k])icMap[k]={e1:p.sourceEntity<o.region?p.sourceEntity:o.region,e2:p.sourceEntity<o.region?o.region:p.sourceEntity,net:0,txns:[]};const amt=(p.allocations||{})[oid]||p.amount;icMap[k].net+=amt*(p.sourceEntity<o.region?1:-1);icMap[k].txns.push({date:p.date,poRef:o.ref,sourceEntity:p.sourceEntity,dest:o.region,amount:amt});});});
  const pairs=Object.values(icMap);const totalIC=pairs.reduce((s,p)=>s+Math.abs(p.net),0);
  return <>
    <div className="ph"><div><h2>Intercompany Clearing</h2><p className="ps">Auto-detected when payment source ≠ PO destination</p></div></div>
    <div className="sg"><div className="sc"><div className="sl">IC Pairs</div><div className="sv">{pairs.length}</div></div><div className="sc"><div className="sl">Total Exposure</div><div className="sv mono amber">{usd(totalIC)}</div></div></div>
    {!pairs.length?<div className="es"><div style={{fontSize:36,marginBottom:12}}>🔄</div><p>No intercompany clearing needed</p></div>
    :pairs.map((pr,i)=><div key={i} className="icc"><div className="ic-p"><RegionBadge region={pr.e1}/><span className="ic-a">{pr.net>=0?"→ owes →":"← owed ←"}</span><RegionBadge region={pr.e2}/><span className="ic-amt mono">{usd(Math.abs(pr.net))}</span></div>
    <table><thead><tr><th>Date</th><th>PO</th><th>From</th><th>To</th><th>Amount</th></tr></thead><tbody>{pr.txns.map((t,j)=><tr key={j}><td>{fmtDate(t.date)}</td><td className="cb">{t.poRef}</td><td><RegionBadge region={t.sourceEntity}/></td><td><RegionBadge region={t.dest}/></td><td className="mono">{usd(t.amount)}</td></tr>)}</tbody></table></div>)}
  </>;
}

function ForecastTab({orders}){
  const weeks={};orders.forEach(o=>{const add=(d,a,st,label)=>{if(!d)return;const u=toUSD(a,o.currency);const wk=weekKey(d);if(!weeks[wk])weeks[wk]={paid:0,due:0,over:0,total:0,items:[]};weeks[wk].total+=u;if(st==="paid")weeks[wk].paid+=u;else if(new Date(d)<new Date())weeks[wk].over+=u;else weeks[wk].due+=u;weeks[wk].items.push({ref:o.ref,region:o.region,amount:u,status:st,label,date:d});};add(o.depositDue,o.depositAmt,o.depositStatus,"Deposit");add(o.releaseDue,o.releaseAmt,o.releaseStatus,"Release");});
  const sortedWeeks=Object.entries(weeks).sort(([a],[b])=>a.localeCompare(b));let cumul=0;
  const withCumul=sortedWeeks.map(([wk,d])=>{cumul+=d.total;return[wk,d,cumul];});
  const[expanded,setExpanded]=useState({});const toggle=wk=>setExpanded(p=>({...p,[wk]:!p[wk]}));
  return <>
    <div className="ph"><div><h2>Cash Forecast</h2><p className="ps">Weekly payment obligations</p></div></div>
    <div className="fw">{withCumul.map(([wk,d,cum])=><div key={wk} className="wk-row">
      <div className="wk-header" onClick={()=>toggle(wk)} style={{cursor:"pointer"}}><div className="wk-date">{fmtWeek(wk)} <span className="wk-count">({d.items.length})</span></div><div className="wk-nums"><span className="mono">{usd(d.total)}</span><span className="wk-cum mono">Σ {usd(cum)}</span></div></div>
      <div className="bt"><div className="bf bg" style={{width:d.total>0?pct(d.paid/d.total):"0%"}}/><div className="bf br" style={{width:d.total>0?pct(d.over/d.total):"0%"}}/><div className="bf ba" style={{width:d.total>0?pct(d.due/d.total):"0%"}}/></div>
      <div className="fl"><span><span className="dot dg"/>Paid: {usd(d.paid)}</span>{d.over>0&&<span><span className="dot dr"/>Overdue: {usd(d.over)}</span>}<span><span className="dot da"/>Due: {usd(d.due)}</span></div>
      {expanded[wk]&&<div className="wk-items">{d.items.sort((a,b)=>a.date.localeCompare(b.date)).map((it,i)=><div key={i} className="wk-item"><RegionBadge region={it.region}/><span className="cb" style={{flex:1}}>{it.ref}</span><span className="badge badge-grey" style={{fontSize:10}}>{it.label}</span><StatusBadge status={it.status} dueDate={it.date}/><span className="mono" style={{minWidth:90,textAlign:"right"}}>{usd(it.amount)}</span></div>)}</div>}
    </div>)}</div>
  </>;
}

// App
function App(){
  const[tab,setTab]=useState("outstanding");const[orders,setOrders]=useState([]);const[payments,setPayments]=useState([]);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);const[sideUpload,setSideUpload]=useState(false);const[lastRefresh,setLastRefresh]=useState(null);const[showHelp,setShowHelp]=useState(false);
  const loadData=useCallback(async()=>{try{setLoading(true);setError(null);const data=await apiGet("/api/all");setOrders(data.orders||[]);setPayments(data.payments||[]);setLastRefresh(new Date());}catch(e){setError(e.message);}finally{setLoading(false);};},[]);
  useEffect(()=>{loadData();},[loadData]);
  const refresh=useCallback(async()=>{try{const data=await apiGet("/api/all");setOrders(data.orders||[]);setPayments(data.payments||[]);setLastRefresh(new Date());}catch(e){console.error("Refresh failed:",e);}},[]);
  if(loading)return <div className="loading-screen"><div className="spinner"/><span style={{fontSize:15,color:"var(--tx2)"}}>Loading Bureau Ops...</span></div>;
  if(error)return <div className="loading-screen"><div style={{fontSize:48}}>⚠️</div><div style={{fontSize:15,color:"var(--rd)",maxWidth:400,textAlign:"center"}}>{error}</div>{error.includes("401")&&<div style={{fontSize:12,color:"var(--tx2)",maxWidth:440,textAlign:"left",margin:"12px 0",padding:"14px 18px",background:"var(--s2)",borderRadius:8,lineHeight:1.6}}>
    <b>401 = Service key mismatch between Pages and Worker.</b><br/>
    1. Check <code>BUREAU_SERVICE_KEY</code> is set in <b>both</b> Cloudflare Pages and Worker secrets<br/>
    2. Values must match exactly (no trailing spaces/newlines)<br/>
    3. After changing Pages secrets, <b>redeploy</b> (Deployments → Retry deployment)<br/>
    4. Debug: visit <a href="/api/debug-proxy" target="_blank" style={{color:"var(--ac)"}}>/api/debug-proxy</a> to check key status
  </div>}<button className="btn btn-primary" onClick={loadData}>Retry</button></div>;
  return <div className="app">
    <div className="sidebar"><div className="sidebar-logo"><h1>Bureau Ops</h1><span>Logistics & Payments</span></div>
    <nav className="sidebar-nav">{TABS.map(t=><button key={t.id} className={`ni ${tab===t.id?"act":""}`} onClick={()=>setTab(t.id)}><span className="nic">{t.icon}</span><span>{t.label}</span></button>)}</nav>
    <div className="sidebar-upload"><button className="sidebar-upload-btn" onClick={()=>setSideUpload(!sideUpload)}><span style={{fontSize:18}}>⬆</span><span>Upload Doc</span></button></div>
    <div className="sf"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{orders.length} POs · {payments.length} payments</span><button onClick={()=>setShowHelp(true)} style={{background:"var(--ac)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,fontSize:14,cursor:"pointer",fontWeight:700}} title="Backend guide & troubleshooting">?</button></div>{lastRefresh&&<div style={{marginTop:4,cursor:"pointer"}} onClick={refresh} title="Click to refresh">🔄 {lastRefresh.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</div>}</div></div>
    <main className="mn">
      {sideUpload&&<div className="us" style={{marginBottom:24}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontWeight:700,fontSize:14}}>Quick Upload</span><button className="btn btn-ghost" style={{padding:"4px 10px",fontSize:11}} onClick={()=>setSideUpload(false)}>✕ Close</button></div><InlineUploader orders={orders} payments={payments} defaultDocType="purchase_order" onRefresh={refresh}/></div>}
      {tab==="outstanding"&&<OrdersTab orders={orders} payments={payments} onRefresh={refresh} showOnlyUnpaid={true}/>}
      {tab==="allpos"&&<OrdersTab orders={orders} payments={payments} onRefresh={refresh} showOnlyUnpaid={false}/>}
      {tab==="payments"&&<PaymentsTab orders={orders} payments={payments} onRefresh={refresh}/>}
      {tab==="clearing"&&<IntercompanyTab orders={orders} payments={payments}/>}
      {tab==="forecast"&&<ForecastTab orders={orders}/>}
    </main>
    {showHelp&&<HelpModal onClose={()=>setShowHelp(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
